function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Returns CSS filter to make white SVG icons readable on any background colour */
function _iconContrast(color){
  if(!color||color.startsWith('var(--s')||color==='transparent') return ''; // dark bg — keep white
  // Parse hex
  let r,g,b;
  if(color.startsWith('#')){
    const h=color.length===4?color.replace(/#(.)(.)(.)/,'#$1$1$2$2$3$3'):color;
    r=parseInt(h.slice(1,3),16); g=parseInt(h.slice(3,5),16); b=parseInt(h.slice(5,7),16);
  } else if(color.startsWith('rgb')){
    const m=color.match(/[\d.]+/g); if(!m||m.length<3) return '';
    [r,g,b]=[+m[0],+m[1],+m[2]];
  } else return '';
  // Perceived luminance (ITU-R BT.709)
  const lum=0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255);
  return lum>0.45?'filter:invert(1) brightness(0.1);':'';
}

function qItemHTML(id,data){
  const colors={note:'var(--blue)',todo:'var(--green)',image:'var(--pink)',video:'var(--red)',music:'var(--amber)'};
  const icons={
    note:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    todo:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
    image:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    video:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
    music:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
  };
  const color=(data.color&&(data.type==='note'||data.type==='todo'))?data.color:(colors[data.type]||'var(--purple)');
  const icon=icons[data.type]||'';
  const label={note:'Quick Note',todo:'Quick To-Do',image:'Image',video:'Video',music:'Music'}[data.type]||data.type;
  const onclick=data.type==='note'?`openQuickNote('${id}')`:data.type==='todo'?`openQuickTodo('${id}')`:data.type==='music'?'':'';
  const handleDiv=`<div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.ccard'),'quick','${id}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.ccard'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.ccard'),event)">${H6}</div>`;
  let body='';
  if(data.type==='note'){
    const plain=(data.content||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,120);
    if(plain) body=`<div class="qcard-preview">${escHtml(plain)}</div>`;
  } else if(data.type==='todo'){
    const items=(data.content||[]).slice(0,4);
    const done=(data.content||[]).filter(t=>t.done).length,total=(data.content||[]).length;
    if(items.length) body=`<div class="qtodo-preview">${items.map(t=>`<div class="qtodo-row"><div class="qtodo-check${t.done?' done':''}"></div><span style="${t.done?'text-decoration:line-through;color:var(--t3)':''}">${escHtml(t.text)}</span></div>`).join('')}${total>4?`<div style="font-size:11px;color:var(--t3);padding-top:2px">+${total-4} more</div>`:''}</div>`;
    if(total) body+=`<div style="padding:0 14px 10px;font-size:11px;color:var(--t3)">${done}/${total} done</div>`;
  } else if(data.type==='image'){
    body=`<div style="padding:8px"><img src='${data.src}' style="border-radius:9px;width:100%;height:auto;display:block;" onload="this.closest('.ccard').style.height='auto'"></div>`;
  } else if(data.type==='video'){
    body=`<div style="padding:8px"><video src='${data.src}' style="border-radius:9px;width:100%;height:auto;display:block;" playsinline controls onloadedmetadata="this.closest('.ccard').style.height='auto'"></video></div>`;
  } else if(data.type==='music'){
    body=`<div class="qcard-audio" id="qaud-${id}">
      <button class="qaudio-btn" onclick="toggleQAudio('${id}',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <div class="qaudio-info"><div class="qaudio-name">${escHtml(data.title||'Audio')}</div>
      <div class="qaudio-progress" onclick="seekQAudio('${id}',event,this)"><div class="qaudio-fill" id="qfill-${id}" style="width:0%"></div></div>
      <div class="qaudio-time" id="qtime-${id}">0:00 / 0:00</div></div>
      <audio id="qaudio-${id}" src="${data.src}" onended="resetQAudio('${id}')" ontimeupdate="updateQAudioProgress('${id}')"></audio>
      ${handleDiv}
    </div>`;
  }
  const header=data.type==='music'?'':`<div class="qcard-header">
    <div style="position:relative;flex-shrink:0"><div class="qcard-icon" style="background:${color}">${icon}</div>${data.pinned?`<div class="pin-badge" style="color:var(--purple)">${PIN_SVG}</div>`:''}</div>
    <div style="flex:1;min-width:0;"><div class="qcard-title">${escHtml(data.title||label)}</div><div class="qcard-meta">${label} · ${relTime(data.lastEdited)}</div></div>
    ${handleDiv}
  </div>`;
  return `<div class="ccard" onclick="${onclick}" data-qid="${id}"
    ontouchstart="_qCardTouchStart('${id}',event)" ontouchmove="_qCardTouchMove(event)" ontouchend="_qCardTouchEnd(event)"
    style="padding:0;flex-direction:column;align-items:stretch;position:relative;${data.cardColor?'background:'+data.cardColor+';border-color:'+data.cardColor+';':''}">
    ${header}${body}
  </div>`;
}

let _homeAnimate=false;
function renderHome(){
  const home=document.getElementById('home');
  // Apply or remove animation class before re-render
  if(_homeAnimate){
    home.classList.add('home-animate');
    // Remove after animations complete so future in-place renders don't reanimate
    setTimeout(()=>home.classList.remove('home-animate'),600);
    _homeAnimate=false;
  } else {
    home.classList.remove('home-animate');
  }
  // save open state of folders before re-render
  const openFolders=new Set([...document.querySelectorAll('.folder.open')].map(f=>f.id));
  const list=document.getElementById('homeList');

  // Build all items: folders + standalone canvases + quick items
  const allItems=[];
  Object.entries(folderDB).forEach(([fid,f])=> allItems.push({id:fid,data:f,kind:'folder'}));
  Object.entries(canvasDB).filter(([,v])=>!v.folder).forEach(([id,d])=> allItems.push({id,data:d,kind:'canvas'}));
  Object.entries(quickDB).forEach(([id,d])=> allItems.push({id,data:d,kind:'quick'}));

  // Sort: pinned first, then by order
  allItems.sort((a,b)=>{
    const pa=a.data.pinned?0:1, pb=b.data.pinned?0:1;
    return pa-pb || (a.data.order||0)-(b.data.order||0);
  });

  const folderHTML=(fid,folder)=>{
    const kids=Object.entries(canvasDB).filter(([,v])=>v.folder===fid).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const kHTML=kids.map(([name,data])=>`
      <div class="crow" onclick="openCanvas('${esc(name)}')"
        ontouchstart="_ccardTouchStart('${esc(name)}',event)" ontouchmove="_ccardTouchMove(event)" ontouchend="_ccardTouchEnd(event)"
        oncontextmenu="event.preventDefault();showHomeMenu('canvas','${esc(name)}',event.clientX,event.clientY,this)">
        <div class="cdot" style="background:${data.color||'var(--purple)'}"></div>
        <div class="cinfo"><div class="cname">${esc(name)}</div>
        <div class="cmeta">${data.cards.length} card${data.cards.length!==1?'s':''} · ${relTime(data.lastEdited)}</div></div>
        <div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.crow'),'canvas','${esc(name)}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.crow'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.crow'),event)">${H6}</div>
      </div>`).join('');
    return `<div class="folder${openFolders.has('folder-'+fid)?' open':''}" id="folder-${fid}">
      <div class="frow" onclick="document.getElementById('folder-${fid}').classList.toggle('open')"
        ontouchstart="_folderTouchStart('${fid}',event)" ontouchmove="_folderTouchMove(event)" ontouchend="_folderTouchEnd('${fid}',event)"
        oncontextmenu="event.preventDefault();showHomeMenu('folder','${fid}',event.clientX,event.clientY,this)">
        <div style="position:relative;flex-shrink:0"><div class="ficon" style="background:${folder.color||'var(--s3)'}; border-radius:8px"><span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;${_iconContrast(folder.color||'')}">${folder.icon||FOLDER_ICONS[0]}</span></div>${folder.pinned?`<div class="pin-badge" style="color:var(--purple)">${PIN_SVG}</div>`:''} </div>
        <span class="fname">${esc(folder.name)}</span>
        <span class="fcount">${kids.length}</span>
        <svg class="fchev" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        <div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.folder'),'folder','${fid}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.folder'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.folder'),event)">${H6}</div>
      </div>
      <div class="fkids">${kHTML}</div>
    </div>`;
  };

  const ccardHTML=({id,data,kind})=>{
    if(kind==='folder') return folderHTML(id,data);
    if(kind==='quick') return qItemHTML(id,data);
    return `<div class="ccard" onclick="openCanvas('${esc(id)}')" style="position:relative;"
      ontouchstart="_ccardTouchStart('${esc(id)}',event)" ontouchmove="_ccardTouchMove(event)" ontouchend="_ccardTouchEnd(event)"

function saveCanvas(){
  if(!currentCanvas) return;
  const cards = [];
  document.querySelectorAll('#world .card').forEach(card=>{

    const title = card.querySelector('[data-title]')?.textContent || '';

  });

function extractContent(card, type){
  if(type==='note') return {
    text: card.querySelector('.note-content')?.innerHTML||card.querySelector('textarea')?.value||'',
    font: card.style.getPropertyValue('--note-font')||'',
    size: card.style.getPropertyValue('--note-size')||'',
  };
  if(type==='link') return {url: card.querySelector('.link-inp')?.value||'', previewHTML: card.querySelector('.link-preview')?.innerHTML||''};
  if(type==='todo'){
    const cols=[];
    card.querySelectorAll('.todocol').forEach(col=>{
      const header=col.querySelector('.todocolh')?.textContent||'';
      const chips=[...col.querySelectorAll('.todochip')].map(c=>({text:c.textContent.trim(),color:c.style.borderLeftColor}));
      cols.push({header,chips});
    });
    return {cols};
  }
  if(type==='music'){
    const player=card.querySelector('.music-player');
    if(player) return {name:card.querySelector('.must')?.textContent||'', source:card.querySelector('.musa')?.textContent||''};
  }
  if(type==='image'){ const img=card.querySelector('img'); return img?{src:img.src}:{}; }
  if(type==='video'){ const vid=card.querySelector('video'); return vid?{src:vid.src}:{}; }
  if(type==='countdown'){
    return {
      mode: card.dataset.cdMode||'countdown',
      targetTs: card.dataset.cdTarget||'',
      swRunning: card.dataset.swRunning==='true',
      swAccum: parseFloat(card.dataset.swAccum||0),
      swStartTs: card.dataset.swStartTs||''
    };
  }
  if(type==='gallery'){
    const items=[];
    const grid=card.querySelector('.gallery-grid');
    grid?.querySelectorAll('.gallery-item').forEach(item=>{
      const img=item.querySelector('img'), vid=item.querySelector('video');
      if(img) items.push({type:'image',src:img.src});
      else if(vid) items.push({type:'video',src:vid.src});
    });
    const addHidden=card.querySelector('.gallery-add')?.classList.contains('hidden')||false;
    return {items, addHidden};
  }
  if(type==='code'){
    const ta=card.querySelector('.code-textarea');
    const btn=card.querySelector('.code-lang-btn');
    return {code:ta?.value||'', lang:btn?.dataset.lang||'javascript', font:card.style.getPropertyValue('--code-font')||'', size:card.style.getPropertyValue('--code-size')||''};
  }
  if(type==='sheet'){
    const table=card.querySelector('.sheet-table');
    if(table) _shReadData(table, card);
    const data=card._shData||[];
    const cols=table?[...table.querySelectorAll('tr:first-child .sheet-th')].filter(t=>!t.classList.contains('row-th')).length:5;
    const colWidths=table?[...table.querySelectorAll('colgroup col')].slice(1).map(c=>parseInt(c.style.width)||SH.COL_W):[];
    return {data,cols,colWidths};
  }
  if(type==='draw'){
    const cv=card.querySelector('.draw-canvas');
    // Use cached dataURL if canvas image hasn't loaded yet (async restore in progress)
    const dataURL=(cv&&cv._drawReady)?cv.toDataURL():(card._drawLastDataURL||'');
    if(cv&&cv._drawReady) card._drawLastDataURL=dataURL;
    return {dataURL, tool:card._drawTool||'pen', color:card._drawColor||'#ffffff', size:card._drawSize||2};
  }
  return {};
}

/* ── Restore canvas state ── */
function restoreCanvas(name){
  const data = canvasDB[name];
  ribbonDB=[];
  clearRibbonSvg();
  if(!data || data.cards.length===0){
    wx=20; wy=20; ws=1; applyWNow();
    return;
  }
  wx=data.wx; wy=data.wy; ws=data.ws; applyWNow();
  [...data.cards].sort((a,b)=>a.zIndex-b.zIndex).forEach(c=>{
    cid++;
    const card=document.createElement('div');
    card.className='card'; card.dataset.type=c.type;
    card.style.left=c.x+'px'; card.style.top=c.y+'px';
    card.style.width=c.w+'px'; card.style.height=c.h+'px';
    card.style.zIndex=c.zIndex; ztop=Math.max(ztop,c.zIndex);
    card.dataset.cardId=c.cardId||('c'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
    card.innerHTML=buildCard(c.type,cid);
    const titleEl=card.querySelector('[data-title]');
    if(titleEl && c.title) titleEl.textContent=c.title;
    if(c.dotColor){
      const dot=card.querySelector('.cbardot'); if(dot) dot.style.background=c.dotColor;
      card.querySelector('.rh')?.style.setProperty('--rh-color', c.dotColor);
      card.style.setProperty('--card-color', c.dotColor);
    }
    if(c.locked){ card.dataset.locked='true'; card.classList.add('locked'); }
    if(c.flipped){ card.dataset.flipped='true'; card.querySelector('.cbar')?.classList.add('flipped'); }
    restoreContent(card, c.type, c.content||{});
    world.appendChild(card);
    makeDrag(card); makeResize(card,c.type); initCardTitles(card); initDotEvents(card);
    if(c.type==='note') initNoteScroll(card);
    if(c.type==='todo'){ card.querySelectorAll('.todochip').forEach(attachChipEvents); card.querySelectorAll('.todocol').forEach(initTodoCol); fitTodoCard(card); }
    if(c.type==='sheet') initSheet(card, (c.content||{}).data||[], (c.content||{}).cols||5);
    if(c.type==='gallery'){ const gid=card.querySelector('.gallery-wrap')?.id?.replace('gw',''); if(gid) _galleryUpdate(gid); }
    if(c.type==='draw'){ const did=card.querySelector('.draw-canvas')?.id?.replace('dc-',''); if(did){ if(c.content?.tool) card._drawTool=c.content.tool; if(c.content?.color) card._drawColor=c.content.color; if(c.content?.size) card._drawSize=c.content.size; initDrawCanvas(did,c.content?.dataURL||null); } }
  });
  // Restore ribbons — cards must be in DOM first
  ribbonDB=(data.ribbons||[]).map(r=>({...r}));
  renderAllRibbons();
}

function restoreContent(card, type, content){
  if(type==='note' && content.text){
    const nc=card.querySelector('.note-content');
    if(nc) nc.innerHTML=content.text;
    // Legacy: also handle old saves that used textarea
    const ta=card.querySelector('textarea'); if(ta) ta.value='';
  }
  if(type==='note'){
    if(content.font) card.style.setProperty('--note-font',content.font);
    if(content.size) card.style.setProperty('--note-size',content.size);
  }
  if(type==='link' && content.url){
    const inp=card.querySelector('.link-inp'); if(inp) inp.value=content.url;
    const preview=card.querySelector('.link-preview');
    if(preview && content.previewHTML) preview.innerHTML=content.previewHTML;
  }
  if((type==='image'||type==='video') && content.src){
    const wrap=card.querySelector('.music-add-area')||card.querySelector('.media-wrap');
    if(wrap){ wrap.className='media-wrap'; wrap.innerHTML = type==='image' ? `<img src="${content.src}" onload="setAR(this)">` : `<video src="${content.src}" playsinline controls style="width:100%;height:100%;object-fit:contain;"></video>`; }
  }
  if(type==='todo' && content.cols){
    const colsEl=card.querySelector('.todocols'); if(!colsEl) return;
    colsEl.innerHTML='';
    content.cols.forEach(col=>{
      const div=document.createElement('div');
      div.innerHTML=makeTodoCol(col.header, col.chips.map(c=>[c.text,c.color]));
      const colEl=div.firstElementChild; colsEl.appendChild(colEl);
      colEl.querySelectorAll('.todochip').forEach(attachChipEvents);
      initTodoCol(colEl);
    });
    fitTodoCard(card);
  }
  if(type==='countdown') initCountdownCard(card, content);
  if(type==='gallery'){
    if(content.items) restoreGallery(card, content.items);
    const gid=card.querySelector('.gallery-wrap')?.id?.replace('gw','');
    if(content.addHidden){
      const btn=gid?document.getElementById('ga'+gid):card.querySelector('.gallery-add');
      if(btn) btn.classList.add('hidden');
    }
    if(gid) _galleryUpdate(gid);
  }
  if(type==='code'){
    const ta=card.querySelector('.code-textarea');
    const btn=card.querySelector('.code-lang-btn');
    if(ta && content.code!==undefined) ta.value=content.code;
    if(btn && content.lang){ btn.dataset.lang=content.lang; btn.textContent=content.lang; }
    if(content.font) card.style.setProperty('--code-font',content.font);
    if(content.size) card.style.setProperty('--code-size',content.size);
    const id=card.querySelector('.code-textarea')?.id?.replace('ct','');
    if(id) codeHighlight(id);
  }
  if(type==='sheet'){
    if(content.data) card._shData=content.data.map(r=>[...r]);
    initSheet(card, content.data||[], content.cols||5, content.colWidths||[]);
  }
  if(type==='draw'){
    const id=card.querySelector('.draw-canvas')?.id?.replace('dc-','');
    if(id){
      if(content.tool) card._drawTool=content.tool;
      if(content.color) card._drawColor=content.color;
      if(content.size) card._drawSize=content.size;
      initDrawCanvas(id, content.dataURL||null);
    }
  }
}

/* ── Context menu (shared) ── */
function showCtxMenu(items, cx, cy){
  const menu=document.getElementById('ctxMenu');
  const back=document.getElementById('ctxBackdrop');
  menu.innerHTML='';
  items.forEach(it=>{
    if(it==='sep'){ const d=document.createElement('div'); d.className='ctx-sep'; menu.appendChild(d); return; }
    if(it.type==='colors'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Colour'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.className='ctx-colors';
      PALETTE.forEach(c=>{ const d=document.createElement('div'); d.className='ctx-dot'+(it.current===c?' sel':''); d.style.background=c; d.onclick=()=>{ closeCtxMenu(); it.fn(c); }; row.appendChild(d); });
      menu.appendChild(row); return;
    }
    if(it.type==='icons'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Icon'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.className='ctx-colors';
      it.icons.forEach(ic=>{
        const d=document.createElement('div');
        d.style.cssText='width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .12s;';
        d.innerHTML=ic;
        d.onmouseenter=()=>d.style.background='rgba(255,255,255,0.12)';
        d.onmouseleave=()=>d.style.background='';
        d.onclick=()=>{ closeCtxMenu(); it.fn(ic); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    if(it.type==='fonts'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Font'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.style.cssText='display:flex;flex-wrap:wrap;gap:4px;padding:2px 8px 7px;';
      it.fonts.forEach(f=>{
        const d=document.createElement('div');
        const sel=it.current===f.val;
        d.style.cssText=`font-family:${f.val};font-size:11px;padding:3px 7px;border-radius:6px;cursor:pointer;border:1px solid ${sel?'rgba(255,255,255,.35)':'var(--b2)'};background:${sel?'rgba(255,255,255,.1)':'transparent'};color:var(--t1);white-space:nowrap;display:flex;align-items:center;justify-content:center;`;
        d.textContent=f.label;
        d.onclick=()=>{ closeCtxMenu(); it.fn(f.val); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    if(it.type==='sizes'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Size'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.style.cssText='display:flex;gap:4px;padding:2px 8px 7px;flex-wrap:wrap;';
      it.sizes.forEach(s=>{
        const d=document.createElement('div');
        const sel=it.current===s;
        d.style.cssText=`width:32px;height:32px;border-radius:7px;cursor:pointer;border:1px solid ${sel?'rgba(255,255,255,.35)':'var(--b2)'};background:${sel?'rgba(255,255,255,.1)':'transparent'};color:var(--t1);display:flex;align-items:center;justify-content:center;font-size:${Math.min(s,13)}px;font-weight:500;`;
        d.textContent=s;
        d.onclick=()=>{ closeCtxMenu(); it.fn(s); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    const el=document.createElement('div');
    el.className='ctx-item'+(it.danger?' danger':'')+(it.disabled?' disabled':'');
    if(it.icon){ el.innerHTML=`<span style="display:flex;align-items:center;opacity:.7">${it.icon}</span><span>${it.label}</span>`; }
    else { el.textContent=it.label; }
    if(it.disabled){ el.style.opacity='0.35'; el.style.pointerEvents='none'; }
    else el.onclick=()=>{ closeCtxMenu(); it.fn(); };
    menu.appendChild(el);
  });
  // Position: render offscreen first to get real dimensions, then clamp
  menu.style.visibility='hidden';
  menu.style.maxHeight='';
  menu.style.display='block';
  back.style.display='block';
  requestAnimationFrame(()=>{
    const mw=menu.offsetWidth||210;
    const vw=window.innerWidth;
    const vh=window.innerHeight;
    const pad=8;
    const x=Math.min(Math.max(pad,cx),vw-mw-pad);
    // Clamp y so menu never goes off top, and cap height so it never goes off bottom
    const y=Math.max(pad,Math.min(cy,vh-pad-20));
    const maxH=vh-y-pad;
    menu.style.maxHeight=maxH+'px';
    menu.style.left=x+'px';
    menu.style.top=y+'px';
    menu.style.visibility='visible';
  });
}

  const NOTE_SIZES=[11,13,14,16,18,20];

      const flipped=card.dataset.flipped==='true';

function duplicateCard(card){
  const type=card.dataset.type;
  const x=parseFloat(card.style.left)+20;
  const y=parseFloat(card.style.top)+20;
  cid++;
  const copy=document.createElement('div');
  copy.className='card'; copy.dataset.type=type;
  copy.dataset.cardId='c'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  copy.style.left=x+'px'; copy.style.top=y+'px';
  copy.style.width=card.style.width; copy.style.height=card.style.height;
  copy.style.zIndex=++ztop;
  copy.innerHTML=buildCard(type,cid);
  // copy title
  const srcTitle=card.querySelector('[data-title]')?.textContent;
  const dstTitle=copy.querySelector('[data-title]');
  if(srcTitle && dstTitle) dstTitle.textContent=srcTitle;
  // copy dot colour
  const srcDot=card.querySelector('.cbardot')?.style.background;
  if(srcDot){ const d=copy.querySelector('.cbardot'); if(d) d.style.background=srcDot; copy.querySelector('.rh').style.setProperty('--rh-color',srcDot); copy.style.setProperty('--card-color',srcDot); }
  // copy content
  restoreContent(copy, type, extractContent(card, type));
  world.appendChild(copy);
  makeDrag(copy); makeResize(copy,type); initCardTitles(copy); initDotEvents(copy);
  if(type==='todo'){ copy.querySelectorAll('.todochip').forEach(attachChipEvents); copy.querySelectorAll('.todocol').forEach(initTodoCol); fitTodoCard(copy); }
  copy.style.opacity='0'; copy.style.transform='scale(.9)';
  requestAnimationFrame(()=>{ copy.style.transition='opacity .18s,transform .18s'; copy.style.opacity='1'; copy.style.transform='scale(1)'; setTimeout(()=>copy.style.transition='',200); });
}

/* ── Home item drag-reorder ── */
let _hTimer=null, _hSX=0, _hSY=0, _hDragging=false, _hGhost=null, _hIndicator=null, _hKind=null, _hId=null, _hEl=null;
let _ccLpTimer=null, _ccLpSx=0, _ccLpSy=0, _ccLpMoved=false;

function _ccLpCancelIfMoved(e){ if(!_ccLpMoved&&Math.hypot(e.touches[0].clientX-_ccLpSx,e.touches[0].clientY-_ccLpSy)>6){_ccLpMoved=true;clearTimeout(_ccLpTimer);} }
function _ccardTouchStart(id,e){ if(e.target.closest('.home-drag-handle')) return; clearTimeout(_ccLpTimer); _ccLpMoved=false; _ccLpSx=e.touches[0].clientX; _ccLpSy=e.touches[0].clientY; const t=e.touches[0],el=e.currentTarget; _ccLpTimer=setTimeout(()=>{ if(!_ccLpMoved) showHomeMenu('canvas',id,t.clientX,t.clientY,el); },500); }
function _ccardTouchMove(e){ _ccLpCancelIfMoved(e); }
function _ccardTouchEnd(e){ clearTimeout(_ccLpTimer); }
function _qCardTouchStart(id,e){ if(e.target.closest('.home-drag-handle')) return; clearTimeout(_ccLpTimer); _ccLpMoved=false; _ccLpSx=e.touches[0].clientX; _ccLpSy=e.touches[0].clientY; const t=e.touches[0],el=e.currentTarget; _ccLpTimer=setTimeout(()=>{ if(!_ccLpMoved) showHomeMenu('quick',id,t.clientX,t.clientY,el); },500); }
function _qCardTouchMove(e){ _ccLpCancelIfMoved(e); }
function _qCardTouchEnd(e){ clearTimeout(_ccLpTimer); }
function _folderTouchStart(fid,e){ if(e.target.closest('.home-drag-handle')) return; clearTimeout(_ccLpTimer); _ccLpMoved=false; _ccLpSx=e.touches[0].clientX; _ccLpSy=e.touches[0].clientY; const t=e.touches[0],el=e.currentTarget; _ccLpTimer=setTimeout(()=>{ if(!_ccLpMoved) showHomeMenu('folder',fid,t.clientX,t.clientY,el); },500); }
function _folderTouchMove(e){ _ccLpCancelIfMoved(e); }
function _folderTouchEnd(fid,e){ clearTimeout(_ccLpTimer); }

function homeItemTouchStart(el,kind,id,e){
  _hKind=kind; _hId=id; _hEl=el;
  _hSX=e.touches[0].clientX; _hSY=e.touches[0].clientY;
  _hDragging=false;
  clearTimeout(_hTimer);
}
function homeItemTouchMove(el,e){
  const cx=e.touches[0].clientX, cy=e.touches[0].clientY;
  const dx=cx-_hSX, dy=cy-_hSY;
  if(!_hDragging && Math.hypot(dx,dy)>6){
    clearTimeout(_hTimer);
    _hDragging=true;
    _startHomeDrag(_hEl,_hKind,_hId,_hSX,_hSY);
  }
  if(_hDragging) _moveHomeDrag(cx,cy);
}
function homeItemTouchEnd(el,e){
  clearTimeout(_hTimer);
  if(_hDragging){
    const cx=e.changedTouches[0].clientX, cy=e.changedTouches[0].clientY;
    _dropHomeDrag(cx,cy);
  }
  _hDragging=false;
}

let _hOffX=0,_hOffY=0;
function _startHomeDrag(el,kind,id,sx,sy){
  const r=el.getBoundingClientRect();
  _hOffX=sx-r.left; _hOffY=sy-r.top;
  _hGhost=el.cloneNode(true);
  _hGhost.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;pointer-events:none;z-index:500;opacity:0.85;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:none;`;
  document.body.appendChild(_hGhost);
  el.style.opacity='0.3';
}
function _moveHomeDrag(cx,cy){
  if(!_hGhost) return;
  _hGhost.style.left=(cx-_hOffX)+'px';
  _hGhost.style.top=(cy-_hOffY)+'px';
  if(_hIndicator){_hIndicator.remove();_hIndicator=null;}
  const tgt=_findHomeDropTarget(cx,cy);
  if(tgt && tgt.type!=='folder-enter'){
    _hIndicator=document.createElement('div');
    _hIndicator.style.cssText='height:2px;background:rgba(220,220,220,0.85);border-radius:2px;margin:2px 0;transition:none;';
    tgt.parent.insertBefore(_hIndicator,tgt.before||null);
  } else if(tgt && tgt.type==='folder-enter'){
    tgt.el.style.outline='2px solid rgba(220,220,220,0.85)';
    tgt.el.style.borderRadius='14px';
  }
  document.querySelectorAll('.folder').forEach(f=>{ if(!tgt||tgt.el!==f){f.style.outline='';f.style.borderRadius='';} });
}
function _findHomeDropTarget(cx,cy){
  // Canvas inside a folder: reorder within folder, or drag above/below to exit
  if(_hKind==='canvas' && canvasDB[_hId]?.folder){
    const myFolder=canvasDB[_hId].folder;
    const folderEl=document.getElementById('folder-'+myFolder);
    if(folderEl){
      const fr=folderEl.getBoundingClientRect();
      if(cy < fr.top+10) return {type:'out-of-folder',before:folderEl,parent:folderEl.parentElement};
      if(cy > fr.bottom-10) return {type:'out-of-folder',before:folderEl.nextElementSibling||null,parent:folderEl.parentElement};
    }
    const crows=[...document.querySelectorAll('#folder-'+myFolder+' .crow')].filter(c=>c!==_hEl);
    for(let i=0;i<crows.length;i++){
      const r=crows[i].getBoundingClientRect();
      if(cy<r.top+r.height/2) return {type:'crow',parent:crows[i].parentElement,before:crows[i],idx:i};
    }
    return {type:'crow',parent:document.querySelector('#folder-'+myFolder+' .fkids'),before:null,idx:crows.length};
  }
  // Canvas dragged over a folder row → enter folder
  if(_hKind==='canvas'){
    for(const frow of document.querySelectorAll('.frow')){
      const r=frow.getBoundingClientRect();
      if(cx>=r.left&&cx<=r.right&&cy>r.top+8&&cy<r.bottom-8){
        const folderEl=frow.closest('[id^="folder-"]');
        const fid=folderEl?.id.replace('folder-','');
        if(fid) return {type:'folder-enter',el:folderEl,frow:frow,folderId:fid};
      }
    }
  }
  // Top-level reorder: all items in combined visual order
  const allItems=[...document.querySelectorAll('#homeList > *')]
    .filter(el=>el!==_hEl && !el.contains(_hEl));
  for(let i=0;i<allItems.length;i++){
    const r=allItems[i].getBoundingClientRect();
    if(r.width===0||r.height===0) continue;
    if(cy<r.top+r.height/2) return {type:'top',parent:allItems[i].parentElement,before:allItems[i]};
    if(i===allItems.length-1||cy<r.bottom+4) return {type:'top',parent:allItems[i].parentElement,before:allItems[i].nextElementSibling||null};
  }
  return null;
}

function _dropHomeDrag(cx,cy){
  if(_hGhost){_hGhost.remove();_hGhost=null;}
  if(_hIndicator){_hIndicator.remove();_hIndicator=null;}
  if(_hEl) _hEl.style.opacity='';
  document.querySelectorAll('.folder').forEach(f=>{f.style.outline='';f.style.borderRadius='';});
  const tgt=_findHomeDropTarget(cx,cy);
  if(!tgt){persistDB();renderHome();return;}

  if(tgt.type==='folder-enter'){
    canvasDB[_hId].folder=tgt.folderId;
    persistDB();renderHome();return;
  }
  if(tgt.type==='out-of-folder'){
    canvasDB[_hId].folder=null;
    persistDB();renderHome();return;
  }
  if(tgt.type==='crow'){
    const peers=_orderedCanvases(canvasDB[_hId].folder);
    const fi=peers.indexOf(_hId); if(fi!==-1) peers.splice(fi,1);
    peers.splice(tgt.idx,0,_hId);
    peers.forEach((n,i)=>{if(canvasDB[n])canvasDB[n].order=i;});
    persistDB();renderHome();return;
  }
  if(tgt.type==='top'){
    if(_hKind==='canvas') canvasDB[_hId].folder=null;
    // insert element to get visual order
    if(tgt.before) tgt.parent.insertBefore(_hEl,tgt.before);
    else tgt.parent.appendChild(_hEl);
    // reassign orders from DOM — skip pinned items (they stay at top naturally)
    let order=0;
    document.querySelectorAll('#homeList > *').forEach(el=>{
      const qid=el.dataset?.qid;
      const fid=el.id?.startsWith('folder-')?el.id.replace('folder-',''):null;
      if(qid&&quickDB[qid]){ quickDB[qid].order=order++; return; }
      if(fid&&folderDB[fid]){ folderDB[fid].order=order++; return; }
      const name=el.querySelector('.ccname')?.textContent;
      if(name&&canvasDB[name]){ canvasDB[name].order=order++; return; }
      order++;
    });
    persistDB();renderHome();return;
  }
}

function _orderedCanvases(folder){
  return Object.entries(canvasDB)
    .filter(([,v])=>v.folder===(folder||null))
    .sort((a,b)=>(a[1].order||0)-(b[1].order||0))
    .map(([k])=>k);
}
function _orderedFolders(){
  return Object.entries(folderDB)
    .sort((a,b)=>(a[1].order||0)-(b[1].order||0))
    .map(([k])=>k);
}

function duplicateCanvas(name){

  copy.cards=copy.cards.map(c=>({...c, cardId:'c'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}));

function moveCanvasToFolder(name){
  const fids=Object.keys(folderDB);
  if(!fids.length){ alert('Create a folder first.'); return; }
  const opts=fids.map((id,i)=>`${i+1}. ${folderDB[id].name}`).join('\n');
  const choice=prompt('Move to which folder?\n'+opts+'\n\n(type number, or 0 for no folder)');
  if(choice===null) return;
  const idx=parseInt(choice)-1;
  if(choice==='0'){ canvasDB[name].folder=null; }

/* Pan */
let panSx=0,panSy=0,panOx=0,panOy=0;

vp.addEventListener('touchstart',e=>{
  if(_moreCardsOpen){ toggleMoreCards(false); }
  if(e.touches.length===1&&!dragging&&!pinching&&!_rdActive&&!_ribbonMidDragging){
    const t=e.touches[0];
    const el=document.elementFromPoint(t.clientX,t.clientY);
    if(el?.closest('.card[data-type="note"]')) return;
    if(el?.closest('.card')) return;
    pan=true;panSx=t.clientX;panSy=t.clientY;panOx=wx;panOy=wy; _mmFadeOn();
  }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(pan&&!dragging&&!pinching&&e.touches.length===1){wx=panOx+(e.touches[0].clientX-panSx);wy=panOy+(e.touches[0].clientY-panSy);applyW();}
},{passive:true});
vp.addEventListener('touchend',()=>{pan=false; _mmFadeOff();});
// Deselect focused card on tap of empty canvas (no pan movement)
let _vpTapSx=0,_vpTapSy=0,_vpTapMoved=false;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===1){ _vpTapSx=e.touches[0].clientX;_vpTapSy=e.touches[0].clientY;_vpTapMoved=false; }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(Math.hypot(e.touches[0].clientX-_vpTapSx,e.touches[0].clientY-_vpTapSy)>8) _vpTapMoved=true;
},{passive:true});
vp.addEventListener('touchend',e=>{
  if(!_vpTapMoved&&!pinching&&!_msPinchJustEnded){
    const el=document.elementFromPoint(e.changedTouches[0].clientX,e.changedTouches[0].clientY);
    if(!el?.closest('.card')){
      document.querySelectorAll('.card.focus').forEach(c=>c.classList.remove('focus'));
      if(msMode && !_msMenuJustOpened) exitMsMode();
    }
  }
},{passive:true});
vp.addEventListener('mousedown',e=>{
  if(_moreCardsOpen) toggleMoreCards(false);
  if(e.target===vp||e.target===world){
    pan=true;panSx=e.clientX;panSy=e.clientY;panOx=wx;panOy=wy; _mmFadeOn();
  }
});
vp.addEventListener('click',e=>{
  if(e.target===vp||e.target===world){
    if(msMode && !_msMenuJustOpened) exitMsMode();
  }
});
document.addEventListener('mousemove',e=>{if(pan&&!dragging){wx=panOx+(e.clientX-panSx);wy=panOy+(e.clientY-panSy);applyW();}});
document.addEventListener('mouseup',()=>{ if(pan) { _mmFadeOff(); } pan=false; });

/* Pinch zoom */
let pinchD0=0,pinchS0=1,pinchMx=0,pinchMy=0;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===2&&!dragging){
    pinching=true;pan=false;
    pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchS0=ws;const r=vp.getBoundingClientRect();
    pinchMx=((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left;
    pinchMy=((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top;
  }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const ns=Math.min(3,Math.max(0.15,pinchS0*(d/pinchD0)));
    const ratio=ns/ws;wx=pinchMx-(pinchMx-wx)*ratio;wy=pinchMy-(pinchMy-wy)*ratio;ws=ns;applyW();
  }
},{passive:false});
vp.addEventListener('touchend',e=>{
  if(e.touches.length<2){
    if(pinching){ _msPinchJustEnded=true; setTimeout(()=>_msPinchJustEnded=false,350); }
    pinching=false; _mmFadeOff();
  }
},{passive:true});

/* ── Desktop: suppress browser context menu on canvas, handle wheel zoom ── */
vp.addEventListener('contextmenu',e=>e.preventDefault());
document.getElementById('canvas').addEventListener('contextmenu',e=>{
  // Only suppress on the canvas screen; let cards handle their own contextmenu
  if(e.target===vp||e.target===world||e.target.id==='vpGrid') e.preventDefault();
});

/* Wheel zoom (desktop/laptop trackpad) */
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const delta=e.deltaY>0?0.92:1.08;
  const ns=Math.min(3,Math.max(0.15,ws*delta));
  const ratio=ns/ws;
  wx=mx-(mx-wx)*ratio; wy=my-(my-wy)*ratio; ws=ns;
  applyW();
},{passive:false});

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  // Ignore if typing in an input or contenteditable
  const tag=document.activeElement?.tagName;
  const inInput=tag==='INPUT'||tag==='TEXTAREA'||document.activeElement?.isContentEditable;

  // Escape — close menus, exit MS mode
  if(e.key==='Escape'){
    closeCtxMenu();
    if(msMode) exitMsMode();
    closeSearch();
    return;
  }

  if(inInput) return;

  // Undo/Redo
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); applyUndo(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))){ e.preventDefault(); applyRedo(); return; }

  // Delete/Backspace — remove focused card
  if((e.key==='Delete'||e.key==='Backspace') && currentCanvas){
    const focused=document.querySelector('#world .card.focus');
    if(focused && !msMode){
      const btn=focused.querySelector('.cbarx');
      if(btn) btn.click();
    }
  }
});

/* Spawn */
function spawnCard(type){
  const r=vp.getBoundingClientRect();
  let x=(r.width/2-wx)/ws-120, y=(r.height/2-wy)/ws-80;
  // Nudge until no existing card is perfectly overlapping this spot
  const NUDGE=32;
  let safe=false;
  while(!safe){
    safe=true;
    document.querySelectorAll('#world .card').forEach(c=>{
      const cx=parseFloat(c.style.left)||0, cy=parseFloat(c.style.top)||0;
      if(Math.abs(cx-x)<8 && Math.abs(cy-y)<8){ safe=false; }
    });
    if(!safe){ x+=NUDGE; y+=NUDGE; }
  }
  spawnAt(type,x,y);
}
function spawnAt(type,x,y){
  pushUndo();
  const card=document.createElement('div');
  card.className='card';card.dataset.type=type;
  card.dataset.cardId='c'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  card.style.left=x+'px';card.style.top=y+'px';card.style.zIndex=++ztop;
  card.innerHTML=buildCard(type,cid);
  // Sync --card-color from the dot color chosen in buildCard
  const dotC=card.querySelector('.cbardot')?.style.background;
  if(dotC) card.style.setProperty('--card-color',dotC);
  world.appendChild(card);
  // Set inline width/height from rendered CSS so minimap and makeResize always have correct values
  if(!card.style.width) card.style.width=card.offsetWidth+'px';
  if(!card.style.height) card.style.height=card.offsetHeight+'px';
  makeDrag(card);makeResize(card,type);
  initCardTitles(card); initDotEvents(card);
  if(type==='note') initNoteScroll(card);
  if(type==='todo'){
    card.querySelectorAll('.todochip').forEach(attachChipEvents);
    card.querySelectorAll('.todocol').forEach(initTodoCol);
    fitTodoCard(card);
  }
  if(type==='countdown') initCountdownCard(card, {});
  if(type==='sheet') initSheet(card, [], 5);
  if(type==='gallery') _galleryUpdate(card.querySelector('.gallery-wrap')?.id?.replace('gw',''));
  if(type==='draw'){ const id=card.querySelector('.draw-canvas')?.id?.replace('dc-',''); if(id) initDrawCanvas(id,null); }
  card.style.opacity='0';card.style.transform='scale(.9)';
  requestAnimationFrame(()=>{
    card.style.transition='opacity .18s,transform .18s';
    card.style.opacity='1';card.style.transform='scale(1)';
    setTimeout(()=>card.style.transition='',200);
  });
}

function closeCard(btn){

/* Wire up column drag+tap — called after col is in DOM */
function initTodoCol(col){
  const bar=col.querySelector('[data-coldrag]');
  const titleEl=col.querySelector('[data-coltitle]');
  if(!bar||!titleEl||col._colDragInited) return;
  col._colDragInited=true;
  let on=false,moved=false,sx=0,sy=0,ghost=null,indicator=null;

  function start(cx,cy,t){
    if(t.tagName==='BUTTON') return;
    on=true; moved=false; sx=cx; sy=cy;
  }
  function move(cx,cy){
    if(!on) return;
    if(!moved && Math.hypot(cx-sx,cy-sy)>8){
      moved=true;
      dragging=true; pan=false;
      ghost=document.createElement('div');
      ghost.className='col-ghost';
      ghost.style.width=col.offsetWidth+'px';
      ghost.style.height=Math.min(col.offsetHeight,160)+'px';
      ghost.innerHTML=`<div style="padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)">${titleEl.textContent}</div>`;
      document.body.appendChild(ghost);
      col.classList.add('col-dragging');
    }
    if(moved && ghost){
      ghost.style.left=(cx-ghost.offsetWidth/2)+'px';
      ghost.style.top=(cy-20)+'px';
      updateColIndicator(cx,cy,col,indicator);
      // remove old indicator, get new
      if(indicator){indicator.remove();indicator=null;}
      const t2=findColDropTarget(cx,cy,col);
      if(t2){indicator=document.createElement('div');indicator.className='col-drop-indicator';t2.parent.insertBefore(indicator,t2.before||null);}
    }
  }
  function end(cx,cy){
    on=false;
    if(moved){
      if(ghost){ghost.remove();ghost=null;}
      col.classList.remove('col-dragging');
      if(indicator){indicator.remove();indicator=null;}
      dragging=false;
      const tgt=findColDropTarget(cx,cy,col);
      if(tgt) tgt.parent.insertBefore(col,tgt.before||null);
      // refit both source and target cards (may be same)
      const cards=new Set([...document.querySelectorAll('.todocols')].map(c=>c.closest('.card')));
      cards.forEach(c=>{ if(c) fitTodoCard(c); });
      col._colDragInited=false; initTodoCol(col);
    } else {
      // tap — if on title text, edit
      const hit=document.elementFromPoint(sx,sy);
      if(hit===titleEl||titleEl.contains(hit)){
        titleEl.contentEditable='true'; titleEl.focus(); selectAll(titleEl);
        titleEl.onblur=()=>{titleEl.contentEditable='false';if(!titleEl.textContent.trim())titleEl.textContent='Column';};
      }
    }
  }

  bar.addEventListener('touchstart',e=>{e.stopPropagation();start(e.touches[0].clientX,e.touches[0].clientY,e.target);},{passive:true});
  document.addEventListener('touchmove',e=>{if(on)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchend',e=>{if(on)end(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:true});
  bar.addEventListener('mousedown',e=>{if(e.button===0){e.stopPropagation();start(e.clientX,e.clientY,e.target);}});
  document.addEventListener('mousemove',e=>{if(on)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',e=>{if(on)end(e.clientX,e.clientY);});
}

function updateColIndicator(){}  // stub, logic inline above

function findColDropTarget(cx,cy,draggedCol){
  const containers=[...document.querySelectorAll('.todocols')];
  for(const container of containers){
    const cr=container.getBoundingClientRect();
    if(cx<cr.left-60||cx>cr.right+60||cy<cr.top-60||cy>cr.bottom+60) continue;
    const cols=[...container.children].filter(c=>c.classList.contains('todocol')&&c!==draggedCol&&!c.classList.contains('col-drop-indicator'));
    for(let i=0;i<cols.length;i++){
      const r=cols[i].getBoundingClientRect();
      if(cx<r.left+r.width/2) return {parent:container,before:cols[i]};
    }
    return {parent:container,before:null};
  }
  return null;
}

/* ── Fit todo card to content ──
   COL_W: fixed width per column (px in canvas space)
   GAP: gap between cols, PADX: left+right padding of todocols
   BAR_H: card title bar height
   COLBAR_H: column header bar height
   CHIP_H: height of one chip including margin
   CHIPS_PAD: top+bottom padding inside .todochips
   ADD_H: "+ Add" row height
   COLPAD_B: bottom padding of todocols container
*/
const TC = {
  COL_W:   120,   // each column width
  GAP:       8,   // gap between columns
  PADX:     10,   // todocols left+right padding (each side)
  BAR_H:    36,   // card title bar
  COLBAR_H: 30,   // column header
  CHIP_H:   34,   // one chip (padding 7+7 + font ~12 + margin-bottom 5)
  CHIPS_PAD: 0,   // .todochips has no vertical padding
  ADD_H:    28,   // "+ Add" row
  COLPAD_B: 10,   // todocols bottom padding
};

function fitTodoCard(card){
  const cols=[...card.querySelectorAll('.todocol')];
  if(!cols.length) return;
  const n=cols.length;
  const minW = TC.PADX*2 + n*TC.COL_W + (n-1)*TC.GAP;
  const maxChips = Math.max(...cols.map(c=>c.querySelectorAll('.todochip').length));
  const colH = TC.COLBAR_H + maxChips*TC.CHIP_H + TC.ADD_H + TC.COLPAD_B;
  const minH = TC.BAR_H + colH;
  const curW = parseFloat(card.style.width) || card.offsetWidth;
  const curH = parseFloat(card.style.height) || card.offsetHeight;
  const newW = Math.max(curW, minW);
  const newH = Math.max(curH, minH);
  card.style.width    = newW+'px';
  card.style.height   = newH+'px';
  card.style.minWidth = minW+'px';
  card.style.minHeight= minH+'px';
}

function initCountdownCard(card, content){
  const id=card.querySelector('.countdown-wrap')?.id?.replace('cdw','');

  if(content.mode==='stopwatch'){
    card.dataset.cdMode='stopwatch';

    card.querySelectorAll('.countdown-tab').forEach(t=>t.classList.remove('active'));

    if(cdPanel) cdPanel.style.display='none';
    if(swPanel) swPanel.style.display='';
  } else {
    card.dataset.cdMode='countdown';
  }
  if(content.targetTs) card.dataset.cdTarget=content.targetTs;
  if(content.swAccum)  card.dataset.swAccum=content.swAccum;
  if(content.swStartTs) card.dataset.swStartTs=content.swStartTs;
  if(content.swRunning==='true'||content.swRunning===true){
    card.dataset.swRunning='true';
    _swTick(id);

  if(content.targetTs) _cdTick(id);
}

  const card=btn.closest('.card'); if(!card) return;
  card.dataset.cdMode=mode;

  if(cdPanel) cdPanel.style.display=mode==='countdown'?'':'none';
  if(swPanel) swPanel.style.display=mode==='stopwatch'?'':'none';
  if(!silent) saveCanvas();
}

/* ── Drum picker (overlay) ── */
const _cdPicker={};
function _cdDrumItems(field, yr){
  if(field==='mo') return Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0'));
  if(field==='dy') return Array.from({length:31},(_,i)=>String(i+1).padStart(2,'0'));
  if(field==='yr'){ const y=yr||new Date().getFullYear(); return Array.from({length:11},(_,i)=>String(y-2+i)); }
  if(field==='hr') return Array.from({length:12},(_,i)=>String(i+1).padStart(2,'0'));
  if(field==='ampm') return ['AM','PM'];
  if(field==='mn') return Array.from({length:60},(_,i)=>String(i).padStart(2,'0'));
  return [];
}
function _cdOvDrumBuild(id, field){
  const el=document.getElementById('ov-cdp-'+field);
  const wrap=document.getElementById('ov-'+field+'-wrap');
  if(!el||!wrap) return;
  const items=_cdDrumItems(field, _cdPicker[id]?.yr);
  const cur=String(_cdPicker[id]?.[field]??'').padStart(field==='yr'?4:2,'0');
  const ITEM_H=40;
  const CONTAINER_H=130;
  const CENTER_OFFSET=CONTAINER_H/2-ITEM_H/2; // 45px
  el.innerHTML='';
  items.forEach(v=>{
    const d=document.createElement('div');
    d.style.cssText=`height:${ITEM_H}px;display:flex;align-items:center;justify-content:center;font-size:${v===cur?'20px':'15px'};font-weight:${v===cur?'700':'400'};font-family:'Outfit',sans-serif;color:${v===cur?'#f0f0f0':'#444'};width:100%;flex-shrink:0;transition:color .1s,font-size .1s;`;
    d.textContent=v; el.appendChild(d);
  });
  const idx=items.findIndex(v=>v===cur);
  el.style.transform=`translateY(${-(idx)*ITEM_H+CENTER_OFFSET}px)`;
  let startY, startTr, dragging=false, snapTimer=null;
  const getTransY=()=>{const m=el.style.transform.match(/translateY\((-?\d+)/); return m?parseInt(m[1]):0;};
  const snap=(y)=>{
    if(snapTimer) clearTimeout(snapTimer);
    const divs=el.querySelectorAll('div');
    const n=divs.length;
    const clamped=Math.max(-(n-1)*ITEM_H+CENTER_OFFSET,Math.min(CENTER_OFFSET,y));
    const i2=Math.max(0,Math.min(n-1,Math.round((CENTER_OFFSET-clamped)/ITEM_H)));
    el.style.transition='transform .2s cubic-bezier(.32,.72,0,1)';
    el.style.transform=`translateY(${-(i2)*ITEM_H+CENTER_OFFSET}px)`;
    divs.forEach((d,j)=>{
      d.style.fontSize=j===i2?'20px':'15px';
      d.style.fontWeight=j===i2?'700':'400';
      d.style.color=j===i2?'#f0f0f0':'#444';
    });
    _cdPicker[id][field]=isNaN(Number(items[i2]))?items[i2]:Number(items[i2]);
    snapTimer=setTimeout(()=>{ el.style.transition=''; snapTimer=null; },220);
  };
  wrap.addEventListener('touchstart',e=>{ e.stopPropagation(); if(snapTimer){ clearTimeout(snapTimer); el.style.transition=''; snapTimer=null; } dragging=true; startY=e.touches[0].clientY; startTr=getTransY(); },{passive:true});
  wrap.addEventListener('touchmove',e=>{ e.stopPropagation(); if(!dragging) return; el.style.transition='none'; el.style.transform=`translateY(${startTr+(e.touches[0].clientY-startY)}px)`; },{passive:true});
  wrap.addEventListener('touchend',e=>{ e.stopPropagation(); if(!dragging) return; dragging=false; snap(getTransY()); });
  wrap.addEventListener('mousedown',e=>{ if(snapTimer){ clearTimeout(snapTimer); el.style.transition=''; snapTimer=null; } dragging=true; startY=e.clientY; startTr=getTransY(); e.preventDefault(); });
  document.addEventListener('mousemove',e=>{ if(!dragging) return; el.style.transition='none'; el.style.transform=`translateY(${startTr+(e.clientY-startY)}px)`; });
  document.addEventListener('mouseup',e=>{ if(!dragging) return; dragging=false; snap(getTransY()); });
}
function _cdTick(id){
  clearInterval(_cdIntervals['cd_'+id]);
  _cdIntervals['cd_'+id]=setInterval(()=>{
    const card=document.getElementById('cdw'+id)?.closest('.card');
    if(!card){ clearInterval(_cdIntervals['cd_'+id]); return; }
    const target=parseFloat(card.dataset.cdTarget);
    if(!target){ clearInterval(_cdIntervals['cd_'+id]); return; }
    const diff=target-Date.now();
    const disp=document.getElementById('cd-disp-'+id);
    const sub=document.getElementById('cd-sub-'+id);
    if(diff<=0){
      clearInterval(_cdIntervals['cd_'+id]);
      if(disp) disp.textContent='00:00:00';
      if(sub) sub.textContent='time\'s up!';
      if('Notification' in window && Notification.permission==='granted'){
        const title=card.querySelector('[data-title]')?.textContent||'Timer';
        new Notification(title+' — Time\'s up! ⏰');
      }
      return;
    }
    const d=Math.floor(diff/86400000);
    const h=Math.floor((diff%86400000)/3600000);
    const m=Math.floor((diff%3600000)/60000);
    const s=Math.floor((diff%60000)/1000);
    if(disp) disp.textContent=d>0?`${d}d ${pad2(h)}:${pad2(m)}:${pad2(s)}`:`${pad2(h)}:${pad2(m)}:${pad2(s)}`;
    if(sub) sub.textContent='remaining';
  },1000);
}
function pad2(n){ return String(n).padStart(2,'0'); }

// Stopwatch
function swToggle(id){
  const card=document.getElementById('cdw'+id)?.closest('.card');
  if(!card) return;
  const running=card.dataset.swRunning==='true';
  if(running){
    // Pause: accumulate elapsed
    const start=parseFloat(card.dataset.swStartTs||0);
    const accum=parseFloat(card.dataset.swAccum||0);
    card.dataset.swAccum=accum+(Date.now()-start);
    card.dataset.swRunning='false';
    clearInterval(_cdIntervals['sw_'+id]);
    document.getElementById('sw-btn-'+id).textContent='Resume';
  } else {
    card.dataset.swStartTs=Date.now();
    card.dataset.swRunning='true';
    document.getElementById('sw-btn-'+id).textContent='Pause';
    _swTick(id);
  }
  saveCanvas();
}
function swReset(id){
  const card=document.getElementById('cdw'+id)?.closest('.card');
  if(card){ card.dataset.swAccum=0; card.dataset.swRunning='false'; card.dataset.swStartTs=''; }
  clearInterval(_cdIntervals['sw_'+id]);
  const disp=document.getElementById('sw-disp-'+id);
  if(disp) disp.textContent='00:00:00';
  const btn=document.getElementById('sw-btn-'+id);
  if(btn) btn.textContent='Start';
  saveCanvas();
}
function _swTick(id){
  clearInterval(_cdIntervals['sw_'+id]);
  _cdIntervals['sw_'+id]=setInterval(()=>{
    const card=document.getElementById('cdw'+id)?.closest('.card');
    if(!card||card.dataset.swRunning!=='true'){ clearInterval(_cdIntervals['sw_'+id]); return; }
    const accum=parseFloat(card.dataset.swAccum||0);
    const start=parseFloat(card.dataset.swStartTs||Date.now());
    const total=accum+(Date.now()-start);
    const h=Math.floor(total/3600000);
    const m=Math.floor((total%3600000)/60000);
    const s=Math.floor((total%60000)/1000);
    const disp=document.getElementById('sw-disp-'+id);
    if(disp) disp.textContent=`${pad2(h)}:${pad2(m)}:${pad2(s)}`;
  },1000);
}

/* ══════════════════════════════════════════
   GALLERY CARD
══════════════════════════════════════════ */
const G_COLS=3, G_CBAR=36, G_PAD=6, G_GAP=4;
// Min card width: 3 cells + 2 gaps + 2 pads. Cell min = 60px
const G_CELL_MIN=60;
const G_MIN_W=G_PAD*2+G_COLS*G_CELL_MIN+(G_COLS-1)*G_GAP; // ~218px → use 220
const G_MIN_H=245;

function _galleryCalcMinH(cardW, slots){
  const cellW=Math.floor((cardW-G_PAD*2-(G_COLS-1)*G_GAP)/G_COLS);
  const rows=Math.ceil(slots/G_COLS);
  return G_CBAR+G_PAD+rows*cellW+(rows-1)*G_GAP+G_PAD;
}

function _galleryUpdate(id){
  const wrap=document.getElementById('gw'+id); if(!wrap) return;
  const grid=document.getElementById('gg'+id); if(!grid) return;
  const addBtn=document.getElementById('ga'+id); if(!addBtn) return;
  const card=wrap.closest('.card'); if(!card) return;

  const items=grid.querySelectorAll('.gallery-item').length;
  const addHidden=addBtn.classList.contains('hidden');

  if(items===0){
    addBtn.classList.add('solo'); addBtn.classList.remove('grid-add');
    if(addBtn.parentElement!==wrap) wrap.appendChild(addBtn);
    grid.style.display='none';
    card.style.minWidth=G_MIN_W+'px';
    card.style.minHeight=G_MIN_H+'px';
    return;
  }

  addBtn.classList.remove('solo'); addBtn.classList.add('grid-add');
  grid.style.display='';
  if(!addHidden) grid.appendChild(addBtn);
  else if(addBtn.parentElement===grid) wrap.appendChild(addBtn);

  const slots=items+(addHidden?0:1);
  // Use actual rendered width (offsetWidth) so first-add works before style.width is set
  const cardW=card.offsetWidth||parseFloat(card.style.width)||G_MIN_W;
  const minH=_galleryCalcMinH(cardW, slots);

  card.style.minWidth=G_MIN_W+'px';
  card.style.minHeight=minH+'px';
  // Only expand height if currently smaller — don't fight user resize
  const curH=card.offsetHeight||parseFloat(card.style.height)||0;
  if(curH<minH) card.style.height=minH+'px';
}

// Lightbox state
let _lbItem=null, _lbId=null;
let _lbImgX=0, _lbImgY=0, _lbImgScale=1;
let _lbNatW=0, _lbNatH=0;
let _lbDragging=false, _lbDragSX=0, _lbDragSY=0, _lbDragIX=0, _lbDragIY=0;
let _lbPinchD0=0, _lbPinchS0=1;
let _lbBoxSize=0, _lbBoxX=0, _lbBoxY=0;

function galleryLightboxOpen(item, id){
  _lbItem=item; _lbId=id;
  const lb=document.getElementById('galleryLightbox');
  const layer=document.getElementById('glbImgLayer');
  layer.innerHTML='';

  const srcEl=item.querySelector('img,video');
  const isVideo=srcEl&&srcEl.tagName==='VIDEO';
  // Always load from original src — never from the cropped thumbnail
  const loadSrc=item._originalSrc||(srcEl?srcEl.src:'');
  const media=document.createElement(isVideo?'video':'img');
  media.id='glbMedia';
  if(isVideo){ media.src=loadSrc; media.muted=true; media.playsInline=true; }
  else media.src=loadSrc;
  media.draggable=false;
  media.style.cssText='position:absolute;top:0;left:0;user-select:none;-webkit-user-select:none;max-width:none;max-height:none;touch-action:none;';
  layer.appendChild(media);
  lb.classList.add('open');

  function _init(){
    _lbNatW=media.naturalWidth||media.videoWidth||300;
    _lbNatH=media.naturalHeight||media.videoHeight||300;
    const area=document.getElementById('glbCropArea');
    const aw=area.offsetWidth, ah=area.offsetHeight;
    _lbBoxSize=Math.round(Math.min(aw,ah)*0.78);
    _lbBoxX=(aw-_lbBoxSize)/2; _lbBoxY=(ah-_lbBoxSize)/2;
    _glbPositionBox();
    // Restore saved framing from item property (not dataset — survives crop)
    const saved=item._lbFrame;
    if(saved){ _lbImgScale=saved.s; _lbImgX=saved.x; _lbImgY=saved.y; }
    else {
      _lbImgScale=Math.max(_lbBoxSize/_lbNatW, _lbBoxSize/_lbNatH);
      _lbImgX=_lbBoxX+(_lbBoxSize-_lbNatW*_lbImgScale)/2;
      _lbImgY=_lbBoxY+(_lbBoxSize-_lbNatH*_lbImgScale)/2;
    }
    _glbClamp(); _glbApply();
  }
  if(isVideo){ if(media.readyState>=1) _init(); else media.onloadedmetadata=_init; }
  else { if(media.complete&&media.naturalWidth) _init(); else media.onload=_init; }
}

function _glbPositionBox(){
  const box=document.getElementById('glbSquareBox');
  box.style.cssText=`position:absolute;width:${_lbBoxSize}px;height:${_lbBoxSize}px;left:${_lbBoxX}px;top:${_lbBoxY}px;border:2px solid rgba(255,255,255,.85);box-shadow:0 0 0 9999px rgba(0,0,0,.6);box-sizing:border-box;pointer-events:none;`;
}

function _glbApply(){
  const m=document.getElementById('glbMedia'); if(!m) return;
  m.style.width=(_lbNatW*_lbImgScale)+'px';
  m.style.height=(_lbNatH*_lbImgScale)+'px';
  m.style.left=_lbImgX+'px';
  m.style.top=_lbImgY+'px';
}

// Drag / pinch on the crop area
const _glbLayer=()=>document.getElementById('glbImgLayer');
function _glbOnMD(e){ e.preventDefault(); _lbDragging=true; _lbDragSX=e.clientX; _lbDragSY=e.clientY; _lbDragIX=_lbImgX; _lbDragIY=_lbImgY;
  window.addEventListener('mousemove',_glbOnMM); window.addEventListener('mouseup',_glbOnMU,{once:true}); }
function _glbOnMM(e){ if(!_lbDragging) return; _lbImgX=_lbDragIX+(e.clientX-_lbDragSX); _lbImgY=_lbDragIY+(e.clientY-_lbDragSY); _glbApply(); }
function _glbOnMU(){ _lbDragging=false; window.removeEventListener('mousemove',_glbOnMM); }

function _glbOnTS(e){
  e.preventDefault(); e.stopPropagation();
  if(e.touches.length===1){
    _lbDragging=true; _lbDragSX=e.touches[0].clientX; _lbDragSY=e.touches[0].clientY; _lbDragIX=_lbImgX; _lbDragIY=_lbImgY;
  } else if(e.touches.length===2){
    _lbPinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    _lbPinchS0=_lbImgScale; _lbDragging=false;
  }
}
function _glbOnTM(e){
  e.preventDefault();
  if(e.touches.length===1&&_lbDragging){
    _lbImgX=_lbDragIX+(e.touches[0].clientX-_lbDragSX); _lbImgY=_lbDragIY+(e.touches[0].clientY-_lbDragSY); _glbApply();
  } else if(e.touches.length===2&&_lbPinchD0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const area=document.getElementById('glbCropArea').getBoundingClientRect();
    const pivotX=cx-area.left, pivotY=cy-area.top;
    const newScale=Math.max(0.3,Math.min(8,_lbPinchS0*(d/_lbPinchD0)));
    const ratio=newScale/_lbImgScale;
    _lbImgX=pivotX-(pivotX-_lbImgX)*ratio;
    _lbImgY=pivotY-(pivotY-_lbImgY)*ratio;
    _lbImgScale=newScale;
    _glbApply();
  }
}
function _glbOnTE(){ _lbDragging=false; _lbPinchD0=0; }

function _glbClamp(){
  // Clamp image position so the crop box is always fully inside the image
  const iw=_lbNatW*_lbImgScale, ih=_lbNatH*_lbImgScale;
  // Image right/bottom edge must be >= box right/bottom edge
  // Image left/top edge must be <= box left/top edge
  _lbImgX=Math.min(_lbBoxX, Math.max(_lbBoxX+_lbBoxSize-iw, _lbImgX));
  _lbImgY=Math.min(_lbBoxY, Math.max(_lbBoxY+_lbBoxSize-ih, _lbImgY));
}

function _glbOnMD(e){ e.preventDefault(); _lbDragging=true; _lbDragSX=e.clientX; _lbDragSY=e.clientY; _lbDragIX=_lbImgX; _lbDragIY=_lbImgY;
  window.addEventListener('mousemove',_glbOnMM); window.addEventListener('mouseup',_glbOnMU,{once:true}); }
function _glbOnMM(e){ if(!_lbDragging) return; _lbImgX=_lbDragIX+(e.clientX-_lbDragSX); _lbImgY=_lbDragIY+(e.clientY-_lbDragSY); _glbClamp(); _glbApply(); }
function _glbOnMU(){ _lbDragging=false; window.removeEventListener('mousemove',_glbOnMM); }

function _glbOnTS(e){
  e.preventDefault(); e.stopPropagation();
  if(e.touches.length===1){
    _lbDragging=true; _lbDragSX=e.touches[0].clientX; _lbDragSY=e.touches[0].clientY; _lbDragIX=_lbImgX; _lbDragIY=_lbImgY;
  } else if(e.touches.length===2){
    _lbPinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    _lbPinchS0=_lbImgScale; _lbDragging=false;
  }
}
function _glbOnTM(e){
  e.preventDefault();
  if(e.touches.length===1&&_lbDragging){
    _lbImgX=_lbDragIX+(e.touches[0].clientX-_lbDragSX); _lbImgY=_lbDragIY+(e.touches[0].clientY-_lbDragSY); _glbClamp(); _glbApply();
  } else if(e.touches.length===2&&_lbPinchD0){
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const cx=(e.touches[0].clientX+e.touches[1].clientX)/2;
    const cy=(e.touches[0].clientY+e.touches[1].clientY)/2;
    const area=document.getElementById('glbCropArea').getBoundingClientRect();
    const pivotX=cx-area.left, pivotY=cy-area.top;
    const newScale=Math.max(_lbBoxSize/Math.min(_lbNatW,_lbNatH), Math.min(8,_lbPinchS0*(d/_lbPinchD0)));
    const ratio=newScale/_lbImgScale;
    _lbImgX=pivotX-(pivotX-_lbImgX)*ratio;
    _lbImgY=pivotY-(pivotY-_lbImgY)*ratio;
    _lbImgScale=newScale;
    _glbClamp(); _glbApply();
  }
}
function _glbOnTE(){ _lbDragging=false; _lbPinchD0=0; }

document.getElementById('glbImgLayer').addEventListener('mousedown',_glbOnMD);
document.getElementById('glbImgLayer').addEventListener('touchstart',_glbOnTS,{passive:false});
document.getElementById('glbImgLayer').addEventListener('touchmove',_glbOnTM,{passive:false});
document.getElementById('glbImgLayer').addEventListener('touchend',_glbOnTE,{passive:true});

function galleryLightboxSave(){
  if(!_lbItem) return;
  const originalSrc=_lbItem._originalSrc||(document.getElementById('glbMedia')?.src||'');
  const isGif=originalSrc.startsWith('data:image/gif')||originalSrc.toLowerCase().includes('.gif');

  if(isGif){
    const el=_lbItem.querySelector('img');
    if(el){
      // Crop region in natural image coordinates
      const cropX=(_lbBoxX-_lbImgX)/_lbImgScale;
      const cropY=(_lbBoxY-_lbImgY)/_lbImgScale;
      const cropS=_lbBoxSize/_lbImgScale; // size of crop square in natural px

      // In the gallery item (overflow:hidden square container):
      // Scale img so cropS natural px fills 100% of container
      // → img width as % of container = natW / cropS * 100
      // → img height as % of container = natH / cropS * 100
      // → img left offset as % of container = -cropX / cropS * 100
      // → img top offset as % of container = -cropY / cropS * 100
      const wPct=(_lbNatW/cropS*100).toFixed(3)+'%';
      const hPct=(_lbNatH/cropS*100).toFixed(3)+'%';
      const lPct=(-cropX/cropS*100).toFixed(3)+'%';
      const tPct=(-cropY/cropS*100).toFixed(3)+'%';

      el.src=originalSrc;
      el.style.objectFit='unset';
      el.style.objectPosition='';
      el.style.transform='';
      el.style.transformOrigin='';
      el.style.position='absolute';
      el.style.width=wPct;
      el.style.height=hPct;
      el.style.left=lPct;
      el.style.top=tPct;
      // Ensure parent clips
      _lbItem.style.overflow='hidden';
    }
    _lbItem._lbFrame={s:_lbImgScale, x:_lbImgX, y:_lbImgY};
    saveCanvas();
    galleryLightboxClose();
    return;
  }

  const cropX=(_lbBoxX-_lbImgX)/_lbImgScale;
  const cropY=(_lbBoxY-_lbImgY)/_lbImgScale;
  const cropS=_lbBoxSize/_lbImgScale;
  const OUT=512;
  const cv=document.createElement('canvas'); cv.width=OUT; cv.height=OUT;
  const ctx=cv.getContext('2d');
  const tmpImg=new Image();
  tmpImg.onload=()=>{
    ctx.drawImage(tmpImg, cropX, cropY, cropS, cropS, 0, 0, OUT, OUT);
    const cropped=cv.toDataURL('image/jpeg',0.92);
    const el=_lbItem.querySelector('img');
    if(el){ el.src=cropped; el.style.objectFit='cover'; el.style.objectPosition='50% 50%'; }
    _lbItem._lbFrame={s:_lbImgScale, x:_lbImgX, y:_lbImgY};
    saveCanvas();
    galleryLightboxClose();
  };
  tmpImg.src=originalSrc;
}

function galleryLightboxReplace(){
  if(!_lbId) return;
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*,video/*';
  inp.onchange=e=>{
    const f=e.target.files[0]; if(!f) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const newSrc=ev.target.result;
      const el=_lbItem.querySelector('img,video');
      if(el){ el.src=newSrc; el.style.objectPosition=''; }
      _lbItem._originalSrc=newSrc; // update original to new file
      _lbItem._lbFrame=null;       // clear saved framing
      saveCanvas();
      galleryLightboxClose();
      setTimeout(()=>galleryLightboxOpen(_lbItem,_lbId),80);
    };
    reader.readAsDataURL(f);
  };
  inp.click();
}

function galleryLightboxDelete(){
  if(!_lbItem||!_lbId) return;
  _lbItem.remove(); _galleryUpdate(_lbId); saveCanvas(); galleryLightboxClose();
}

function galleryLightboxClose(){
  document.getElementById('galleryLightbox').classList.remove('open');
  document.getElementById('glbImgLayer').innerHTML='';
  _lbItem=null; _lbId=null; _lbDragging=false; _lbPinchD0=0;
}

function galleryAdd(id){
  const wrap=document.getElementById('gw'+id); if(!wrap) return;
  const inp=document.createElement('input');
  inp.type='file'; inp.accept='image/*,video/*'; inp.multiple=true;
  inp.onchange=e=>{ [...e.target.files].forEach(f=>_galleryAddFile(id,f)); };
  inp.click();
}
function galleryDrop(e, id){
  e.preventDefault();
  const wrap=document.getElementById('gw'+id); if(!wrap) return;
  wrap.classList.remove('drag-over');
  [...e.dataTransfer.files].forEach(f=>{ if(f.type.startsWith('image/')||f.type.startsWith('video/')) _galleryAddFile(id,f); });
}
function _galleryAddFile(id, file){
  const reader=new FileReader();
  reader.onload=ev=>{ _galleryAddSrc(id, ev.target.result, file.type.startsWith('video/')?'video':'image'); saveCanvas(); };
  reader.readAsDataURL(file);
}
function _galleryAddSrc(id, src, type){
  const grid=document.getElementById('gg'+id); if(!grid) return;
  const addBtn=document.getElementById('ga'+id);
  const item=document.createElement('div'); item.className='gallery-item';
  const el=document.createElement(type==='video'?'video':'img');
  el.src=src; if(type==='video'){ el.controls=false; el.playsInline=true; }
  item.appendChild(el);
  item._originalSrc=src; // preserve original for re-editing in modal
  item.addEventListener('click',e=>{ e.stopPropagation(); galleryLightboxOpen(item,id); });
  item.addEventListener('touchend',e=>{ if(e.changedTouches[0] && Math.abs(e.changedTouches[0].clientY-(item._ty||0))<8){ e.preventDefault(); e.stopPropagation(); galleryLightboxOpen(item,id); } });
  item.addEventListener('touchstart',e=>{ item._ty=e.touches[0].clientY; },{passive:true});
  if(addBtn && addBtn.parentElement===grid) grid.insertBefore(item, addBtn);
  else grid.appendChild(item);
  _galleryUpdate(id);
}
function restoreGallery(card, items){
  const id=card.querySelector('.gallery-wrap')?.id?.replace('gw',''); if(!id) return;
  items.forEach(it=>_galleryAddSrc(id, it.src, it.type));
}
function galleryToggleAdd(id){
  const addBtn=document.getElementById('ga'+id); if(!addBtn) return;
  const grid=document.getElementById('gg'+id);
  const items=grid?grid.querySelectorAll('.gallery-item').length:0;
  const hidden=addBtn.classList.contains('hidden');
  if(!hidden && items===0) return; // can't hide when empty
  addBtn.classList.toggle('hidden');
  _galleryUpdate(id);
  saveCanvas();
}

══════════════════════════════════════════ */
function codeHighlight(id){
  const ta=document.getElementById('ct'+id);
  const codeEl=document.getElementById('chc'+id);
  const btn=document.getElementById('cl'+id);
  if(!ta||!codeEl) return;
  const lang=btn?.dataset.lang||'javascript';
  try{
    const res=hljs.highlight(ta.value||'', {language:lang, ignoreIllegals:true});
    codeEl.innerHTML=res.value;
  } catch(e){
    codeEl.textContent=ta.value||'';
  }
  const pre=codeEl.closest('pre');
  if(pre) pre.scrollTop=ta.scrollTop;
}
const _CODE_LANGS_ALL=['javascript','typescript','python','java','c','cpp','csharp','go','rust','swift','kotlin','ruby','php','html','css','sql','bash','json','yaml','markdown','xml','r','scala','perl','dart','lua','haskell','elixir','clojure','vim'];
// Only keep languages actually available in the loaded hljs bundle
const _CODE_LANGS=_CODE_LANGS_ALL.filter(l=>{ try{ return !!hljs.getLanguage(l); }catch(e){ return false; } });
let _codeLangActiveId=null;
function codeLangToggle(id){
  _codeLangActiveId=id;
  const btn=document.getElementById('cl'+id);
  const cur=btn?.dataset.lang||'javascript';
  openPickerOverlay('Language', `
    <input id="langSearchInp" placeholder="Search language..." oninput="codeLangSearch('${id}',this.value)"
      style="width:100%;box-sizing:border-box;background:#1a1a1a;border:1px solid #2a2a2a;border-radius:10px;padding:10px 12px;color:#f0f0f0;font-family:'DM Sans',sans-serif;font-size:13px;outline:none;margin-bottom:10px;"
      ontouchstart="event.stopPropagation()">
    <div id="cll${id}" style="display:flex;flex-direction:column;gap:2px;max-height:55vh;overflow-y:auto;padding-right:4px;"></div>
  `);
  _codeLangRender(id, _CODE_LANGS, cur);
  setTimeout(()=>document.getElementById('langSearchInp')?.focus(), 100);
}
function _codeLangRender(id, langs, cur){
  const list=document.getElementById('cll'+id);
  if(!list) return;
  list.innerHTML='';
  langs.forEach(l=>{
    const d=document.createElement('div');
    const sel=l===cur;
    d.style.cssText=`padding:10px 12px;border-radius:9px;font-size:13px;font-family:'DM Sans',sans-serif;cursor:pointer;color:${sel?'#f0f0f0':'#888'};background:${sel?'rgba(124,92,252,.15)':'transparent'};border:1px solid ${sel?'rgba(124,92,252,.4)':'transparent'};transition:background .1s;`;
    d.textContent=l;
    let _ty=0;
    d.addEventListener('touchstart',e=>{ _ty=e.touches[0].clientY; },{passive:true});
    d.addEventListener('touchend',e=>{
      if(Math.abs(e.changedTouches[0].clientY-_ty)<8){ e.preventDefault(); codeLangSelect(id,l); }
    });
    d.addEventListener('mousedown',e=>{ e.preventDefault(); codeLangSelect(id,l); });
    list.appendChild(d);
  });
}
function codeLangSearch(id, q){
  const filtered=_CODE_LANGS.filter(l=>l.includes(q.toLowerCase()));
  const btn=document.getElementById('cl'+id);
  _codeLangRender(id, filtered, btn?.dataset.lang);
}
function codeLangSelect(id, lang){
  const btn=document.getElementById('cl'+id);
  if(btn){ btn.dataset.lang=lang; btn.textContent=lang; }
  closePickerOverlay();
  codeHighlight(id); saveCanvas();
}
function codeTab(e){
  if(e.key!=='Tab') return;
  e.preventDefault();
  const ta=e.target;
  const start=ta.selectionStart, end=ta.selectionEnd;
  ta.value=ta.value.substring(0,start)+'  '+ta.value.substring(end);
  ta.selectionStart=ta.selectionEnd=start+2;
  const id=ta.id.replace('ct','');
  codeHighlight(id);
}
