/* ══════════════════════════════════════════
   SPREADSHEET CARD
══════════════════════════════════════════ */
const SH={
  COL_W: 80, ROW_H: 26, HDR_W: 32, HDR_H: 24,
  CBAR: 36,  // card titlebar height
};

// Measure text width using canvas
const _shCanvas=document.createElement('canvas');
const _shCtx=_shCanvas.getContext('2d');
_shCtx.font='12px DM Sans,sans-serif';
function _shTextW(text){ return _shCtx.measureText(text||'').width; }

// Get current col widths array from colgroup inline styles (reliable before layout)
function _shGetColWidths(table){
  return [...table.querySelectorAll('colgroup col')].slice(1).map(c=>parseInt(c.style.width)||SH.COL_W);
}

// Return number of data rows/cols in table
function _shDims(table){
  const rows=table.querySelectorAll('tr').length-1; // minus header
  const cols=table.querySelectorAll('tr:first-child th').length-1; // minus row-th
  return {rows,cols};
}

// Build col header label: A..Z, AA..AZ, etc.
function _shColLabel(i){
  let s=''; i++;
  while(i>0){ s=String.fromCharCode(65+(i-1)%26)+s; i=Math.floor((i-1)/26); }
  return s;
}

// Rebuild table keeping data, target rows/cols
// Throttled version for use during live resize — skips rebuild if grid size unchanged
let _shSnapRafPending=false;
function _shSnapThrottled(card){
  if(_shSnapRafPending) return;
  _shSnapRafPending=true;
  requestAnimationFrame(()=>{
    _shSnapRafPending=false;
    _shSnap(card);
  });
}

function _shRebuild(table, colWidths, rows, cols, data){
  let html='<colgroup><col style="width:'+SH.HDR_W+'px">';
  for(let c=0;c<cols;c++) html+=`<col style="width:${colWidths[c]||SH.COL_W}px">`;
  html+='</colgroup><tr><th class="sheet-th row-th" style="width:'+SH.HDR_W+'px;height:'+SH.HDR_H+'px"></th>';
  for(let c=0;c<cols;c++) html+=`<th class="sheet-th" style="width:${colWidths[c]||SH.COL_W}px;height:${SH.HDR_H}px">${_shColLabel(c)}</th>`;
  html+='</tr>';
  for(let r=0;r<rows;r++){
    html+=`<tr><th class="sheet-th row-th" style="width:${SH.HDR_W}px;height:${SH.ROW_H}px">${r+1}</th>`;
    for(let c=0;c<cols;c++){
      const val=escHtml((data[r]&&data[r][c])||'');
      html+=`<td class="sheet-td" style="width:${colWidths[c]||SH.COL_W}px;height:${SH.ROW_H}px"><span class="sheet-cell" contenteditable="true">${val}</span></td>`;
    }
    html+='</tr>';
  }
  table.innerHTML=html;
}

// Snap card size to cell boundaries and fill with rows/cols
function _shSnap(card){
  const table=card.querySelector('.sheet-table'); if(!table) return;
  const colWidths=_shGetColWidths(table);
  const data=_shReadData(table,card);

  const bodyW=parseFloat(card.style.width)||380;
  const bodyH=parseFloat(card.style.height)||260;
  const availW=bodyW-SH.HDR_W-2;
  const availH=bodyH-SH.CBAR-SH.HDR_H-2;

  let usedW=0, newCols=0;
  const newColWidths=[];
  for(let c=0;;c++){
    const w=colWidths[c]||SH.COL_W;
    if(usedW+w>availW+SH.COL_W/2 && newCols>=1) break;
    newColWidths.push(w);
    usedW+=w; newCols++;
    if(usedW>=availW) break;
  }
  card.style.width=(SH.HDR_W+usedW+2)+'px';

  const newRows=Math.max(1, Math.round(availH/SH.ROW_H));
  card.style.height=(SH.CBAR+SH.HDR_H+newRows*SH.ROW_H+2)+'px';

  // Skip expensive rebuild if grid size hasn't changed
  const prevRows=card._shLastRows||0, prevCols=card._shLastCols||0;
  if(newRows===prevRows && newCols===prevCols) return;
  card._shLastRows=newRows; card._shLastCols=newCols;

  _shRebuild(table, newColWidths, newRows, newCols, data);
  _shAttach(table, card);
}

function _shReadData(table, card){
  // Read current DOM cells and merge into card._shData cache
  const domData=[];
  [...table.querySelectorAll('tr')].slice(1).forEach(tr=>{
    const row=[];
    tr.querySelectorAll('.sheet-cell').forEach(cell=>row.push(cell.textContent));
    domData.push(row);
  });
  if(card){
    if(!card._shData) card._shData=[];
    // Merge: update existing positions, preserve data outside current viewport
    domData.forEach((row,r)=>{
      if(!card._shData[r]) card._shData[r]=[];
      row.forEach((val,c)=>{ card._shData[r][c]=val; });
    });
    return card._shData;
  }
  return domData;
}

function _shAttach(table, card){
  // Use a flag to avoid adding duplicate listeners — remove old ones via cloning only the tbody area
  table._shKeydown && table.removeEventListener('keydown', table._shKeydown);
  table._shInput && table.removeEventListener('input', table._shInput);

  table._shKeydown=e=>{
    const cell=e.target; if(!cell.classList.contains('sheet-cell')) return;
    const cells=[...table.querySelectorAll('.sheet-cell')];
    const idx=cells.indexOf(cell);
    const {cols}=_shDims(table);
    if(e.key==='Tab'){
      e.preventDefault();
      if(idx===cells.length-1){ _shAddCol(card); return; }
      cells[idx+1]?.focus();
    }
    if(e.key==='Enter'){
      e.preventDefault();
      const rowIdx=Math.floor(idx/cols);
      const {rows}=_shDims(table);
      if(rowIdx===rows-1){ _shAddRow(card); return; }
      cells[idx+cols]?.focus();
    }
  };
  table._shInput=e=>{
    const cell=e.target; if(!cell.classList.contains('sheet-cell')) return;
    const td=cell.closest('td'); if(!td) return;
    const tr=td.parentElement;
    const colIdx=[...tr.children].indexOf(td)-1;
    if(colIdx<0) return;
    _shCheckColWidth(table, card, colIdx);
    saveCanvas();
  };
  table.addEventListener('keydown', table._shKeydown);
  table.addEventListener('input', table._shInput);

  // Attach wrap interaction once — touchend focuses cell, mousedown blocked to prevent ghost card-drag
  const wrap=card.querySelector('.sheet-wrap');
  if(wrap && !wrap._shTouchAttached){
    wrap._shTouchAttached=true;
    wrap.addEventListener('touchend',e=>{
      e.stopPropagation();
      const cell=e.target.closest('.sheet-cell');
      if(cell){
        e.preventDefault();
        cell.focus();
        try{
          const r=document.createRange();
          r.selectNodeContents(cell);
          r.collapse(false);
          window.getSelection()?.removeAllRanges();
          window.getSelection()?.addRange(r);
        }catch(_){}
      }
    });
    wrap.addEventListener('mousedown',e=>e.stopPropagation());
  }
}

function _shCheckColWidth(table, card, colIdx){
  // Find max text width in this column
  let maxW=SH.COL_W;
  [...table.querySelectorAll('tr')].slice(1).forEach(tr=>{
    const td=[...tr.querySelectorAll('td')][colIdx]; if(!td) return;
    const cell=td.querySelector('.sheet-cell'); if(!cell) return;
    const w=_shTextW(cell.textContent)+14; // 14px padding
    if(w>maxW) maxW=w;
  });
  maxW=Math.ceil(maxW/10)*10; // round to 10px
  // Get current col width
  const colEl=[...table.querySelectorAll('colgroup col')][colIdx+1]; if(!colEl) return;
  const curW=parseInt(colEl.style.width)||SH.COL_W;
  if(Math.abs(maxW-curW)<2) return; // no change needed
  // Update colgroup, header, and all cells in this column
  colEl.style.width=maxW+'px';
  const headerTh=[...table.querySelectorAll('tr:first-child .sheet-th')].filter(t=>!t.classList.contains('row-th'))[colIdx];
  if(headerTh) headerTh.style.width=maxW+'px';
  [...table.querySelectorAll('tr')].slice(1).forEach(tr=>{
    const td=[...tr.querySelectorAll('td')][colIdx]; if(!td) return;
    td.style.width=maxW+'px';
  });
  // Expand card width if needed
  const totalW=SH.HDR_W+[...table.querySelectorAll('colgroup col')].slice(1).reduce((s,c)=>s+(parseInt(c.style.width)||SH.COL_W),0)+2;
  const curCardW=parseFloat(card.style.width)||0;
  if(totalW>curCardW){ card.style.width=totalW+'px'; card.style.minWidth=totalW+'px'; }
}

function _shAddRow(card){
  const table=card.querySelector('.sheet-table'); if(!table) return;
  const {rows,cols}=_shDims(table);
  const colWidths=_shGetColWidths(table);
  const data=_shReadData(table,card);
  data.push(Array(cols).fill(''));
  _shRebuild(table,colWidths,rows+1,cols,data);
  _shAttach(table,card);
  // Focus last cell of new row
  const cells=table.querySelectorAll('.sheet-cell');
  cells[cells.length-1]?.focus();
  // Expand card height
  const newH=SH.CBAR+SH.HDR_H+(rows+1)*SH.ROW_H+2;
  if(parseFloat(card.style.height)<newH){ card.style.height=newH+'px'; card.style.minHeight=newH+'px'; }
  saveCanvas();
}

function _shAddCol(card){
  const table=card.querySelector('.sheet-table'); if(!table) return;
  const {rows,cols}=_shDims(table);
  const colWidths=_shGetColWidths(table);
  const data=_shReadData(table,card);
  colWidths.push(SH.COL_W);
  data.forEach(r=>r.push(''));
  _shRebuild(table,colWidths,rows,cols+1,data);
  _shAttach(table,card);
  const cells=table.querySelectorAll('.sheet-cell');
  cells[cells.length-1]?.focus();
  const newW=SH.HDR_W+colWidths.reduce((s,w)=>s+w,0)+2;
  if(parseFloat(card.style.width)<newW){ card.style.width=newW+'px'; card.style.minWidth=newW+'px'; }
  saveCanvas();
}

function initSheet(card, data, cols, savedColWidths){
  const table=card.querySelector('.sheet-table'); if(!table) return;
  card._shLastRows=0; card._shLastCols=0; // reset snap cache
  const cardW=parseFloat(card.style.width)||380;
  const cardH=parseFloat(card.style.height)||260;
  const availW=cardW-SH.HDR_W-2;
  const availH=cardH-SH.CBAR-SH.HDR_H-2;

  // Col widths: use saved, then fill remaining with default
  const savedLen=(savedColWidths&&savedColWidths.length)||0;
  const fitCols=Math.max(cols||savedLen||1, Math.floor(availW/SH.COL_W));
  const colWidths=Array.from({length:fitCols},(_,i)=>(savedColWidths&&savedColWidths[i])||SH.COL_W);

  const fitRows=Math.max((data&&data.length)||1, Math.floor(availH/SH.ROW_H));

  _shRebuild(table, colWidths, fitRows, fitCols, data||[]);
  _shAttach(table, card);

  const snappedW=SH.HDR_W+colWidths.reduce((s,w)=>s+w,0)+2;
  const snappedH=SH.CBAR+SH.HDR_H+fitRows*SH.ROW_H+2;
  card.style.width=snappedW+'px'; card.style.minWidth=(SH.HDR_W+SH.COL_W+2)+'px';
  card.style.height=snappedH+'px'; card.style.minHeight=(SH.CBAR+SH.HDR_H+SH.ROW_H+2)+'px';
}

/* ── Chip long-press / context menu ── */
let _chipTimer=null, _activeMenu=null;
const LONG_PRESS_MS=500;

function chipTouchStart(chip,e){
  e.stopPropagation();
  const t=e.touches[0];
  chip._csX=t.clientX; chip._csY=t.clientY; chip._cMoved=false;
  clearTimeout(_chipTimer);
  _chipTimer=setTimeout(()=>{ if(!chip._cMoved) showChipMenu(chip, chip._csX, chip._csY); }, LONG_PRESS_MS);
}
function chipTouchMove(chip,e){
  const t=e.touches[0];
  if(Math.hypot(t.clientX-chip._csX, t.clientY-chip._csY)>8){
    chip._cMoved=true; clearTimeout(_chipTimer);
  }
}
function chipTouchEnd(chip,e){
  clearTimeout(_chipTimer);
  if(!chip._cMoved && !_activeMenu){
    e.preventDefault();
    chip.contentEditable='true'; chip.focus(); selectAll(chip);
    chip.onblur=()=>{ chip.contentEditable='false'; if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);} };
  }
}
function chipMouseStart(chip,e){
  e.stopPropagation();
  chip._csX=e.clientX; chip._csY=e.clientY; chip._cMoved=false;
  clearTimeout(_chipTimer);
  _chipTimer=setTimeout(()=>{ if(!chip._cMoved) showChipMenu(chip, chip._csX, chip._csY); }, LONG_PRESS_MS);
}
function chipMouseMove(chip,e){
  if(Math.hypot(e.clientX-chip._csX, e.clientY-chip._csY)>8){
    chip._cMoved=true; clearTimeout(_chipTimer);
  }
}
function chipMouseEnd(chip,e){
  clearTimeout(_chipTimer);
  if(!chip._cMoved && !_activeMenu){
    chip.contentEditable='true'; chip.focus(); selectAll(chip);
    chip.onblur=()=>{ chip.contentEditable='false'; if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);} };
  }
}

function attachChipEvents(chip){
  chip.ontouchstart = e => chipTouchStart(chip, e);
  chip.ontouchmove  = e => chipTouchMove(chip, e);
  chip.ontouchend   = e => chipTouchEnd(chip, e);
  chip.onmousedown  = e => { if(e.button===2) return; chipMouseStart(chip, e); };
  chip.onmousemove  = e => chipMouseMove(chip, e);
  chip.onmouseup    = e => chipMouseEnd(chip, e);
  chip.oncontextmenu= e => { e.preventDefault(); e.stopPropagation(); showChipMenu(chip, e.clientX, e.clientY); };
}

function showChipMenu(chip, cx, cy){
  closeChipMenu();
  const menu=document.createElement('div');
  menu.className='chipmenu';
  const colorRow=document.createElement('div');
  colorRow.className='chipmenu-colors';
  CHIP_COLORS.forEach(c=>{
    const dot=document.createElement('div');
    dot.className='chipcolor';
    dot.style.background=c;
    dot.style.borderColor=chip.style.borderLeftColor===c?'#fff':'transparent';
    dot.ontouchend=dot.onclick=e=>{e.stopPropagation();chip.style.borderLeftColor=c;closeChipMenu();};
    colorRow.appendChild(dot);
  });
  menu.appendChild(colorRow);
  const actions=[
    {label:'Edit', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`, fn:()=>{ chip.contentEditable='true'; chip.focus(); selectAll(chip); chip.onblur=()=>{chip.contentEditable='false';if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);}};} },
    {label:'Add above', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,  fn:()=>insertChip(chip,'before')},
    {label:'Add below', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`,  fn:()=>insertChip(chip,'after')},
    {label:'Remove', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`, fn:()=>{ const c=chip.closest('.card'); chip.remove(); if(c)fitTodoCard(c); }, danger:true},
  ];
  actions.forEach(a=>{
    const item=document.createElement('div');
    item.className='chipmenu-item'+(a.danger?' danger':'');
    item.textContent=a.label;
    item.ontouchend=item.onclick=e=>{e.stopPropagation();closeChipMenu();a.fn();};
    menu.appendChild(item);
  });
  // position near touch point
  const x=Math.max(8, Math.min(cx, window.innerWidth-180));
  const y=Math.max(8, Math.min(cy+8, window.innerHeight-220));
  menu.style.left=x+'px';
  menu.style.top=y+'px';
  document.body.appendChild(menu);
  _activeMenu=menu;
  // Close only when tapping OUTSIDE the menu
  function onOutsideTouch(e){
    if(_activeMenu && !_activeMenu.contains(e.target)){
      closeChipMenu();
    } else if(_activeMenu){
      // tapped inside — let it propagate, re-arm listener
      setTimeout(()=>document.addEventListener('touchend',onOutsideTouch,{once:true,passive:true}),50);
    }
  }
  function onOutsideClick(e){
    if(_activeMenu && !_activeMenu.contains(e.target)) closeChipMenu();
    else if(_activeMenu) setTimeout(()=>document.addEventListener('click',onOutsideClick,{once:true}),50);
  }
  setTimeout(()=>{
    document.addEventListener('touchend',onOutsideTouch,{once:true,passive:true});
    document.addEventListener('click',onOutsideClick,{once:true});
  },300);
}

function closeChipMenu(){
  if(_activeMenu){_activeMenu.remove();_activeMenu=null;}
}

function insertChip(ref,where){
  const div=document.createElement('div');
  div.innerHTML=makeChipHTML('New task','var(--t3)');
  const chip=div.firstElementChild;
  attachChipEvents(chip);
  const chips=ref.closest('.todochips');
  if(where==='before') chips.insertBefore(chip,ref);
  else ref.after(chip);
  chip.contentEditable='true'; chip.focus(); selectAll(chip);
  chip.onblur=()=>{
    chip.contentEditable='false';
    if(!chip.textContent.trim()) chip.remove();
    fitTodoCard(chip.closest('.card'));
  };
  fitTodoCard(ref.closest('.card'));
}

/* ── Drag & drop media into existing card ── */
function cardMediaDrop(e, wrap, type){
  e.preventDefault(); e.stopPropagation();
  wrap.classList.remove('drag-over');
  const file=e.dataTransfer.files[0]; if(!file) return;
  const src=URL.createObjectURL(file);
  const name=file.name.replace(/\.[^.]+$/,'');
  if(type==='image'){
    wrap.className='media-wrap'; wrap.innerHTML=`<img src="${src}" onload="setAR(this)">`;
  } else if(type==='video'){
    wrap.className='media-wrap'; wrap.innerHTML=`<video src="${src}" controls onloadedmetadata="setAR(this)"></video>`;
  } else if(type==='music'){
    loadMusicSrc(wrap.id, src, name, 'File');
  }
  saveCanvas();
}

/* ── Drag & drop media onto empty canvas → auto-create card ── */
function _vpMediaType(file){
  if(file.type.startsWith('image/')) return 'image';
  if(file.type.startsWith('video/')) return 'video';
  if(file.type.startsWith('audio/')) return 'audio'; // maps to music card
  return null;
}
vp.addEventListener('dragover',e=>{
  if([...e.dataTransfer.items].some(i=>i.kind==='file')){
    e.preventDefault();
    vp.style.outline='2px dashed rgba(255,255,255,0.2)';
  }
});
vp.addEventListener('dragleave',e=>{ if(!e.relatedTarget||!vp.contains(e.relatedTarget)) vp.style.outline=''; });
vp.addEventListener('drop',e=>{
  e.preventDefault();
  vp.style.outline='';
  const file=e.dataTransfer.files[0]; if(!file) return;
  const mtype=_vpMediaType(file); if(!mtype) return;
  const cardType=mtype==='audio'?'music':mtype;

  // Convert drop screen position to world coordinates
  const vr=vp.getBoundingClientRect();
  const wx2=(e.clientX-vr.left-wx)/ws - 120;
  const wy2=(e.clientY-vr.top -wy)/ws - 80;

  // Check if drop landed inside an existing media card of the right type
  const el=document.elementFromPoint(e.clientX, e.clientY);
  const existingWrap=el?.closest('.media-wrap, .music-add-area');
  if(existingWrap){
    const src=URL.createObjectURL(file);
    const name=file.name.replace(/\.[^.]+$/,'');
    if(cardType==='music') loadMusicSrc(existingWrap.id, src, name, 'File');
    else existingWrap.innerHTML=cardType==='image'
      ?`<img src="${src}" onload="setAR(this)">`
      :`<video src="${src}" controls onloadedmetadata="setAR(this)"></video>`;
    saveCanvas(); return;
  }

  // No card at drop position — spawn one then load media
  pushUndo();
  const card=document.createElement('div');
  card.className='card'; card.dataset.type=cardType;
  card.dataset.cardId='c'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  card.style.left=wx2+'px'; card.style.top=wy2+'px'; card.style.zIndex=++ztop;
  card.innerHTML=buildCard(cardType,cid++);
  const dotC=card.querySelector('.cbardot')?.style.background;
  if(dotC) card.style.setProperty('--card-color',dotC);
  world.appendChild(card); makeDrag(card); makeResize(card,cardType); initCardTitles(card); initDotEvents(card);

  // Load media after card is in DOM
  const src=URL.createObjectURL(file);
  const name=file.name.replace(/\.[^.]+$/,'');
  if(cardType==='music'){
    const mc=card.querySelector('[id^="mc"]'); if(mc) loadMusicSrc(mc.id, src, name, 'File');
  } else {
    const mw=card.querySelector('[id^="mw"]');
    if(mw) mw.innerHTML=cardType==='image'
      ?`<img src="${src}" onload="setAR(this)">`
      :`<video src="${src}" controls onloadedmetadata="setAR(this)"></video>`;
  }

  // Animate in
  card.style.opacity='0'; card.style.transform='scale(.9)';
  requestAnimationFrame(()=>{ card.style.transition='opacity .18s,transform .18s'; card.style.opacity='1'; card.style.transform='scale(1)'; setTimeout(()=>card.style.transition='',200); });
  saveCanvas();
});
function setAR(el){
  const c=el.closest('.card');if(!c)return;
  const ar=el.tagName==='IMG'?el.naturalWidth/el.naturalHeight:(el.videoWidth/el.videoHeight||16/9);
  c.dataset.ar=ar.toFixed(4);
  const maxW=320, minW=180;
  const barH=36;
  let w=Math.min(maxW,Math.max(minW,parseFloat(c.style.width)||240));
  let h=Math.round(w/ar)+barH;
  if(h>420){h=420;w=Math.round((h-barH)*ar);}
  c.style.width=w+'px';c.style.height=h+'px';
}

/* Link */
function loadLink(inpId,previewId){
  let url=document.getElementById(inpId).value.trim(); if(!url) return;
  if(!url.startsWith('http')) url='https://'+url;
  // Update input with normalised URL
  document.getElementById(inpId).value=url;
  const p=document.getElementById(previewId);
  let embedUrl=url;
  let domain=''; try{domain=new URL(url).hostname.replace('www.','');}catch(e){}

  // Convert known URLs to embeddable versions
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt) embedUrl=`https://www.youtube.com/embed/${yt[1]}?autoplay=0`;
  const ytShort=url.match(/youtube\.com\/shorts\/([a-zA-Z0-9_-]{11})/);
  if(ytShort) embedUrl=`https://www.youtube.com/embed/${ytShort[1]}`;
  const vimeo=url.match(/vimeo\.com\/(\d+)/);
  if(vimeo) embedUrl=`https://player.vimeo.com/video/${vimeo[1]}`;
  const figma=url.match(/figma\.com\/(file|design|proto)\//);
  if(figma) embedUrl=`https://www.figma.com/embed?embed_host=slate&url=${encodeURIComponent(url)}`;
  const maps=url.match(/google\.com\/maps/);
  if(maps) embedUrl=url.replace('/maps/','/maps/embed/v1/place?key=AIzaSyD-9tSrke72PouQMnMX-a7eZSW0jkFMBWY&q=').replace('/@','/');
  const spotify=url.match(/open\.spotify\.com\/(track|album|playlist|episode)\/([a-zA-Z0-9]+)/);
  if(spotify) embedUrl=`https://open.spotify.com/embed/${spotify[1]}/${spotify[2]}`;
  const codepen=url.match(/codepen\.io\/([^/]+)\/pen\/([^/?]+)/);
  if(codepen) embedUrl=`https://codepen.io/${codepen[1]}/embed/${codepen[2]}?default-tab=result`;

  // Build iframe — detect load failure and show fallback
  const frameId='lf'+previewId;
  p.innerHTML=`<iframe id="${frameId}" class="link-iframe" src="${embedUrl}" allow="accelerometer;autoplay;clipboard-write;encrypted-media;gyroscope;picture-in-picture;fullscreen" sandbox="allow-scripts allow-same-origin allow-forms allow-popups allow-presentation"></iframe>`;
  const iframe=document.getElementById(frameId);

  // Timeout fallback — if iframe doesn't load in 5s, show blocked message
  const timer=setTimeout(()=>showLinkFallback(p,url,domain),5000);
  iframe.onload=()=>{
    clearTimeout(timer);
    // Try to detect blank/blocked frame
    try{ const d=iframe.contentDocument; if(d&&(d.body?.innerHTML===''||d.title==='')){ showLinkFallback(p,url,domain); } }
    catch(e){ /* cross-origin — assume it loaded fine */ }
    saveCanvas();
  };
  iframe.onerror=()=>{ clearTimeout(timer); showLinkFallback(p,url,domain); };
}

function showLinkFallback(p,url,domain){
  p.innerHTML=`<div class="link-blocked">
    <svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5" style="opacity:.3;color:var(--t2)"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
    <div class="link-blocked-domain">${domain}</div>
    <div class="link-blocked-msg">This site doesn't allow embedding. Open it in your browser instead.</div>
    <button class="link-open-btn" onclick="window.open('${url}','_blank')">Open in browser</button>
  </div>`;
}

/* ══════════════════════════════════════════
   DRAW CARD
══════════════════════════════════════════ */
const DRAW_RES=1024;
let _drawActive=null; // single global active draw state

document.addEventListener('mousemove',e=>{ if(_drawActive){ _drawActive.moved=true; _drawDoMove(e); } });
document.addEventListener('mouseup',()=>{ if(_drawActive){ const moved=_drawActive.moved; const card=_drawActive.card; _drawActive=null; if(moved){ saveCanvas(); _drawSyncUndoRedo(card); } } });
document.addEventListener('touchmove',e=>{ if(_drawActive){ e.stopPropagation(); _drawActive.moved=true; _drawDoMove(e.touches[0]); } },{passive:true});
document.addEventListener('touchend',()=>{ if(_drawActive){ const moved=_drawActive.moved; const card=_drawActive.card; _drawActive=null; if(moved){ saveCanvas(); _drawSyncUndoRedo(card); } } },{passive:true});

function _drawDoMove(src){
  if(!_drawActive) return;
  const {canvas,card,ctx}=_drawActive;
  const r=canvas.getBoundingClientRect();
  const x=(src.clientX-r.left)*(DRAW_RES/r.width);
  const y=(src.clientY-r.top)*(DRAW_RES/r.height);
  ctx.lineWidth=card._drawSize*4; ctx.lineCap='round'; ctx.lineJoin='round';
  if(card._drawTool==='eraser'){ ctx.globalCompositeOperation='destination-out'; ctx.strokeStyle='rgba(0,0,0,1)'; }
  else { ctx.globalCompositeOperation='source-over'; ctx.strokeStyle=card._drawColor||'#ffffff'; }
  ctx.beginPath(); ctx.moveTo(_drawActive.lx,_drawActive.ly); ctx.lineTo(x,y); ctx.stroke();
  _drawActive.lx=x; _drawActive.ly=y;
}

function _drawCard(el){ return el.closest('.card'); }
function _drawCanvas(card){ return card.querySelector('.draw-canvas'); }

function initDrawCanvas(id, dataURL){
  const cv=document.getElementById('dc-'+id); if(!cv) return;
  const card=cv.closest('.card');

  // Clone canvas to remove any stale canvas-level listeners
  const newCv=cv.cloneNode(false); newCv.id='dc-'+id;
  cv.parentNode.replaceChild(newCv, cv);
  const canvas=newCv;
  canvas.width=DRAW_RES; canvas.height=DRAW_RES;
  const ctx=canvas.getContext('2d');

  // Only reset undo stacks on fresh spawn, not on restore
  if(!dataURL){ card._drawUndo=[]; card._drawRedo=[]; }

  // Cache dataURL immediately so extractContent always has it, even before img.onload
  if(dataURL&&dataURL.startsWith('data:image')){
    card._drawLastDataURL=dataURL;
    const img=new Image();
    img.onload=()=>{
      ctx.drawImage(img,0,0,DRAW_RES,DRAW_RES);
      canvas._drawReady=true;
      card._drawLastDataURL=dataURL;
    };
    img.src=dataURL;
  } else {
    canvas._drawReady=true;
  }

  if(!card._drawTool) card._drawTool='pen';
  if(!card._drawColor) card._drawColor='#ffffff';
  if(!card._drawSize) card._drawSize=2;
  _drawSyncUI(card);

  function _start(src){
    // Wait for image to be ready before allowing draw
    if(!canvas._drawReady) return;
    card._drawUndo=card._drawUndo||[];
    card._drawUndo.push(canvas.toDataURL());
    if(card._drawUndo.length>40) card._drawUndo.shift();
    card._drawRedo=[];
    const r=canvas.getBoundingClientRect();
    _drawActive={canvas,card,ctx,lx:(src.clientX-r.left)*(DRAW_RES/r.width),ly:(src.clientY-r.top)*(DRAW_RES/r.height)};
    bringUp(card);
  }
  canvas.addEventListener('mousedown',e=>{ e.stopPropagation(); _start(e); });
  canvas.addEventListener('touchstart',e=>{ e.stopPropagation(); _start(e.touches[0]); },{passive:true});
}

function _drawSyncUI(card){
  const wrap=card.querySelector('.draw-toolbar'); if(!wrap) return;
  wrap.querySelectorAll('.draw-tool-btn').forEach(b=>{
    if(b.title==='Pen') b.classList.toggle('active', card._drawTool==='pen');
    if(b.title==='Eraser') b.classList.toggle('active', card._drawTool==='eraser');
  });
  wrap.querySelectorAll('.draw-size-btn').forEach(b=>{
    const dot=b.querySelector('.draw-size-dot');
    const s={3:2,6:6,10:12}[parseInt(dot?.style.width)];
    b.classList.toggle('active', s===card._drawSize);
  });
  wrap.querySelectorAll('.draw-color-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.color===card._drawColor);
  });
  _drawSyncUndoRedo(card);
}

function _drawSyncUndoRedo(card){
  card.querySelectorAll('.draw-tool-btn').forEach(b=>{
    if(b.title==='Undo') b.classList.toggle('disabled', !(card._drawUndo?.length));
    if(b.title==='Redo') b.classList.toggle('disabled', !(card._drawRedo?.length));
  });
}

function drawUndo(el){
  const card=_drawCard(el); const canvas=_drawCanvas(card); if(!canvas||!card._drawUndo?.length) return;
  card._drawRedo.push(canvas.toDataURL());
  const prev=card._drawUndo.pop();
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,DRAW_RES,DRAW_RES);
  if(prev){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,DRAW_RES,DRAW_RES); img.src=prev; }
  _drawSyncUndoRedo(card);
  saveCanvas();
}
function drawRedo(el){
  const card=_drawCard(el); const canvas=_drawCanvas(card); if(!canvas||!card._drawRedo?.length) return;
  card._drawUndo.push(canvas.toDataURL());
  const next=card._drawRedo.pop();
  const ctx=canvas.getContext('2d'); ctx.clearRect(0,0,DRAW_RES,DRAW_RES);
  if(next){ const img=new Image(); img.onload=()=>ctx.drawImage(img,0,0,DRAW_RES,DRAW_RES); img.src=next; }
  _drawSyncUndoRedo(card);
  saveCanvas();
}
function drawSetTool(el, tool){
  const card=_drawCard(el); if(!card) return;
  card._drawTool=tool;
  card.querySelectorAll('.draw-tool-btn').forEach(b=>{ if(b.title==='Pen') b.classList.toggle('active',tool==='pen'); if(b.title==='Eraser') b.classList.toggle('active',tool==='eraser'); });
}
function drawSetColor(el, color){
  const card=_drawCard(el); if(!card) return;
  card._drawColor=color;
  card.querySelectorAll('.draw-color-btn').forEach(b=>b.classList.toggle('active', b.dataset.color===color));
}
function drawSetSize(el, size){
  const card=_drawCard(el); if(!card) return;
  card._drawSize=size;
  card.querySelectorAll('.draw-size-btn').forEach(b=>{ const dot=b.querySelector('.draw-size-dot'); const s={3:2,6:6,10:12}[parseInt(dot?.style.width)]; b.classList.toggle('active',s===size); });
}
function drawClear(card){
  const canvas=_drawCanvas(card); if(!canvas) return;
  card._drawUndo=card._drawUndo||[]; card._drawUndo.push(canvas.toDataURL()); card._drawRedo=[];
  canvas.getContext('2d').clearRect(0,0,DRAW_RES,DRAW_RES);
  _drawSyncUndoRedo(card);
  saveCanvas();
}

function loadMediaUrl(inpId, wrapId, type){

function loadMusicUrl(inpId,cid){const url=document.getElementById(inpId).value.trim();if(!url)return;let name='Track';try{name=new URL(url).pathname.split('/').pop().replace(/\.[^.]+$/,'');}catch(e){}loadMusicSrc(cid,url,name,'URL');}
function loadMusicSrc(cid,src,name,source){

function toggleAud(cid){const a=window['_a_'+cid],b=document.getElementById('pb'+cid);if(!a||!b)return;if(a.paused){a.play();b.textContent='⏸';}else{a.pause();b.textContent='▶';}}
function seekAud(bar,e,cid){const a=window['_a_'+cid];if(!a||!a.duration)return;const r=bar.getBoundingClientRect();a.currentTime=(e.clientX-r.left)/r.width*a.duration;}
function skipAud(cid,sec){const a=window['_a_'+cid];if(a)a.currentTime=Math.max(0,a.currentTime+sec);}
function fmt(s){if(!isFinite(s))return'0:00';const m=Math.floor(s/60),ss=Math.floor(s%60);return m+':'+(ss<10?'0':'')+ss;}

/* Drag */

function makeDrag(card){
  let on=false, sx=0, sy=0, ox=0, oy=0;
  let moved=false, longFired=false, lpTimer=null;
  let titleTouchTarget=null;
  let lastTapTime=0, lastTapTarget=null;
  // For MS multi-drag: snapshot of all selected card origins at drag start
  let msOrigins=null;
  // For cbar double-tap MS activation — track last PHYSICAL tap time on this card's cbar
  // We use a flag so mouse ghost-click after touchend doesn't count as second tap
  let _cbarTap1Time=0;
  let _cbarTapFromTouch=false; // was the first tap a touch event?

  function start(cx,cy,t,isTouch){
    _startedOnCbar = !!(t.closest('.cbar') && !t.closest('.cbarlbl') && !t.closest('.cbarx'));
    if(card.dataset.locked==='true') return;
    // Sheet card: only cbar should trigger drag/select — let cell touches through for typing
    if(card.dataset.type==='sheet' && !t.closest('.cbar')){
      if(isTouch) _lastTouchEnd=Date.now()+600; // suppress ghost mousedown
      return;
    }
    if(!t.closest('[data-drag]')||t.closest('[data-coldrag]')||t.tagName==='BUTTON'||t.tagName==='TEXTAREA') return;

    // In MS mode: allow interaction on ALL cards (selected or not)
    if(msMode){
      moved=false; longFired=false; on=true;
      sx=cx; sy=cy;
      ox=parseFloat(card.style.left)||0; oy=parseFloat(card.style.top)||0;
      if(msSelected.has(card)){
        // Selected card: snapshot all origins for multi-drag, arm long-press for menu
        msOrigins=new Map();
        msSelected.forEach(c=>msOrigins.set(c,{x:parseFloat(c.style.left)||0,y:parseFloat(c.style.top)||0}));
        clearTimeout(lpTimer);
        lpTimer=setTimeout(()=>{
          if(!moved){ longFired=true; on=false; dragging=false; showMsMenu(cx,cy); }
        },500);
      }
      // Unselected card: on=true so end() fires, no multi-drag origins
      return;
    }

    moved=false; longFired=false; on=true;
    sx=cx; sy=cy;
    ox=parseFloat(card.style.left)||0; oy=parseFloat(card.style.top)||0;
    // Track if touch started on the title label (for double-tap rename)
    titleTouchTarget = t.closest('.cbarlbl') ? t.closest('.cbarlbl') : null;
    pushUndo();
    bringUp(card);
    clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>{
      if(!moved){ longFired=true; on=false; dragging=false; showCardMenu(card,sx,sy); }
    },500);
  }

  function move(cx,cy){
    if(!on) return;
    const dx=cx-sx, dy=cy-sy;
    if(!moved && Math.hypot(dx,dy)>8){
      moved=true; clearTimeout(lpTimer);
      dragging=true; pan=false;
    }
    if(moved){
      if(msMode && msOrigins){
        // Move all selected cards by the same delta
        msOrigins.forEach((orig,c)=>{
          c.style.left=snapVal(orig.x+dx/ws)+'px';
          c.style.top=snapVal(orig.y+dy/ws)+'px';
        });
        // Live ribbon update for all selected cards
        msOrigins.forEach((_,c)=>updateRibbonsForCard(c));
      } else {
        if(titleTouchTarget) titleTouchTarget.contentEditable='false';
        card.style.left=snapVal(ox+dx/ws)+'px'; card.style.top=snapVal(oy+dy/ws)+'px';
        updateRibbonsForCard(card);
      }
    }
  }

  function end(cx,cy,isTouch){
    clearTimeout(lpTimer);

    if(msMode){
      if(!moved && !longFired){
        // Any tap on any card in MS mode toggles it
        _msTapCard(card);
      }
      on=false; dragging=false; msOrigins=null;
      if(moved){ saveCanvas(); }
      moved=false; longFired=false;
      return;
    }

    if(!moved && !longFired && titleTouchTarget){
      // Double-tap on title label = rename
      const now=Date.now();
      if(lastTapTarget===titleTouchTarget && now-lastTapTime<300){
        titleTouchTarget.contentEditable='true';
        titleTouchTarget.focus();
        selectAll(titleTouchTarget);
        lastTapTime=0; lastTapTarget=null;
      } else {
        lastTapTime=now; lastTapTarget=titleTouchTarget;
      }
    }

    // Double-tap on cbar non-title zone = enter MS mode
    // Guard: only count same input type (touch vs mouse) to ignore ghost clicks
    if(!moved && !longFired && !titleTouchTarget && _startedOnCbar){
      const now=Date.now();
      const gap=now-_cbarTap1Time;
      // 50–500ms window: fast enough to be intentional, slow enough to not be accidental
      if(gap>50 && gap<500 && _cbarTapFromTouch===isTouch){
        enterMsMode(card);
        _cbarTap1Time=0;
      } else {
        _cbarTap1Time=now;
        _cbarTapFromTouch=isTouch;
      }
    }

    on=false; dragging=false; titleTouchTarget=null;
    if(moved){ saveCanvas(); _scheduleCull(); }
    moved=false; longFired=false;
  }

  // _startedOnCbar tracks whether the gesture began on the cbar non-title zone
  let _startedOnCbar=false;
  // Suppress ghost mouse events that fire after touch on mobile
  let _lastTouchEnd=0;

  card.addEventListener('touchstart',e=>start(e.touches[0].clientX,e.touches[0].clientY,e.target,true),{passive:true});
  document.addEventListener('touchmove',e=>{ if(on) move(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
  document.addEventListener('touchend',e=>{ if(on){ _lastTouchEnd=Date.now(); end(e.changedTouches[0].clientX,e.changedTouches[0].clientY,true); } },{passive:true});
  card.addEventListener('mousedown',e=>{ 
    if(Date.now()-_lastTouchEnd<600) return;
    if(e.button===2) return; start(e.clientX,e.clientY,e.target,false); e.stopPropagation(); 
  });
  document.addEventListener('mousemove',e=>{ if(on) move(e.clientX,e.clientY); });
  document.addEventListener('mouseup',e=>{ if(on) end(e.clientX,e.clientY,false); });
  // Right-click = card context menu (desktop equivalent of long-press)
  card.addEventListener('contextmenu',e=>{
    e.preventDefault(); e.stopPropagation();
    if(msMode){ showMsMenu(e.clientX,e.clientY); return; }
    showCardMenu(card,e.clientX,e.clientY);
  });
}

/* ── Note scroll (touch-action:none blocks native scroll) ── */
function initNoteScroll(card){
  const nc=card.querySelector('.note-content');
  const body=card.querySelector('.cbody');
  if(!nc||!body) return;
  let tsy=0, tsx=0, startScroll=0, moved=false;
  function onStart(e){
    e.stopPropagation();
    tsx=e.touches[0].clientX;
    tsy=e.touches[0].clientY;
    startScroll=nc.scrollTop;
    moved=false;
  }
  function onMove(e){
    e.stopPropagation();
    const dy=tsy-e.touches[0].clientY;
    if(Math.abs(dy)>4) moved=true;
    nc.scrollTop=startScroll+dy;
  }
  function onEnd(e){
    e.stopPropagation();
    if(!moved){
      // Tap — focus and place cursor at touch point
      bringUp(card);
      nc.contentEditable='true';
      nc.focus();
      const t=e.changedTouches[0];
      const range=document.caretRangeFromPoint?document.caretRangeFromPoint(t.clientX,t.clientY):null;
      if(range){ const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(range); }
    }
  }
  body.addEventListener('touchstart',onStart,{passive:true});
  body.addEventListener('touchmove',onMove,{passive:true});
  body.addEventListener('touchend',onEnd,{passive:true});
}

/* ── Resize ── */
function makeResize(card,type){
  const handle=card.querySelector('[data-rh]');
  const arLocked=type==='image'||type==='video';
  let on=false,sx,sy,sw,sh,minW,minH,startAR,_moved=false;
  function start(cx,cy){
    if(!card.classList.contains('focus')) return;
    pushUndo();
    on=true;_moved=false;dragging=true;pan=false;sx=cx;sy=cy;
    sw=card.offsetWidth;sh=card.offsetHeight;
    const cs=getComputedStyle(card);
    minW=parseFloat(cs.minWidth)||120;
    minH=parseFloat(cs.minHeight)||100;
    if(arLocked) startAR=card.dataset.ar?parseFloat(card.dataset.ar):sw/Math.max(sh,1);
  }
  function move(cx,cy){
    if(!on)return;
    _moved=true;
    // Gallery dynamically updates minHeight/minWidth during resize — read live
    // For all other types use the values captured at start (cheaper)
    const isGallery=card.dataset.type==='gallery';
    const liveMinW=isGallery?(parseFloat(card.style.minWidth)||minW):minW;
    const liveMinH=isGallery?(parseFloat(card.style.minHeight)||minH):minH;
    const nw=Math.max(liveMinW,sw+(cx-sx)/ws);
    const nh=Math.max(liveMinH,sh+(cy-sy)/ws);
    const isDraw=card.dataset.type==='draw';
    const finalSize=isDraw?Math.max(nw,nh):null;
    card.style.width=(isDraw?finalSize:nw)+'px';
    card.style.height=(isDraw?finalSize:arLocked?Math.max(liveMinH,nw/startAR):nh)+'px';
    if(card.dataset.type==='sheet') _shSnapThrottled(card);
    if(isGallery){ const gid=card.querySelector('.gallery-wrap')?.id?.replace('gw',''); if(gid) _galleryUpdate(gid); }
  }
  function end(){on=false;dragging=false;if(_moved){
    if(card.dataset.type==='sheet') _shSnap(card);
    // Draw canvas stays at fixed DRAW_RES — CSS scaling handles display size, no resize needed
    saveCanvas();_scheduleCull();_stopMmLoop();
  }}
  handle.addEventListener('touchstart',e=>{e.stopPropagation();start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchmove',e=>{if(on)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchend',end);
  handle.addEventListener('mousedown',e=>{e.stopPropagation();start(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(on)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',end);
}

function fitAll(){
  const cards=[...document.querySelectorAll('#world .card')];
  if(!cards.length) return;
  let x0=Infinity,y0=Infinity,x1=-Infinity,y1=-Infinity;
  cards.forEach(c=>{
    const x=parseFloat(c.style.left)||0,y=parseFloat(c.style.top)||0;
    const w=c.offsetWidth||parseFloat(c.style.width)||240;
    const h=c.offsetHeight||parseFloat(c.style.height)||200;
    x0=Math.min(x0,x);y0=Math.min(y0,y);x1=Math.max(x1,x+w);y1=Math.max(y1,y+h);
  });
  const vpW=vp.offsetWidth, vpH=vp.offsetHeight;
  const cw=x1-x0||1, ch=y1-y0||1;
  // Always compute mmW/mmH from viewport AR same as _mmResize — never use offsetWidth (0 when hidden)
  const ar=vpW/vpH;
  const mmW=ar>=1?MM_LONG:Math.round(MM_LONG*ar);
  const mmH=ar>=1?Math.round(MM_LONG/ar):MM_LONG;
  const scaleX=(mmW-MM_PAD*2)/cw, scaleY=(mmH-MM_PAD*2)/ch;
  const mmScale=Math.min(scaleX,scaleY);
  const mapPadX=(mmW-cw*mmScale)/2;
  const mapPadY=(mmH-ch*mmScale)/2;
  const worldPadX=(mapPadX-0.75)/mmScale;
  const worldPadY=(mapPadY-0.75)/mmScale;
  ws=Math.min((vpW)/(cw+worldPadX*2),(vpH)/(ch+worldPadY*2),3);
  wx=vpW/2-(x0+cw/2)*ws;
  wy=vpH/2-(y0+ch/2)*ws;
  world.style.transition='transform .4s cubic-bezier(.32,.72,0,1)';
  ribbonWorldG.style.transition='transform .4s cubic-bezier(.32,.72,0,1)';
  applyWNow(); setTimeout(()=>{ world.style.transition=''; ribbonWorldG.style.transition=''; _scheduleCull(); },450);
}

(function(){
  const MIN_SHRINK=180; // ms minimum shrink time on quick tap
  function _press(btn){
    btn._pressStart=Date.now();
    btn.classList.remove('btn-spring');
    btn.classList.add('btn-shrink');
  }
  function _release(btn){
    const elapsed=Date.now()-(btn._pressStart||0);
    const remaining=Math.max(0, MIN_SHRINK-elapsed);
    setTimeout(()=>{
      btn.classList.remove('btn-shrink');
      btn.classList.add('btn-spring');
      // Clean up spring class after animation finishes
      setTimeout(()=>btn.classList.remove('btn-spring'), 320);
    }, remaining);
  }
  const ribbon=document.getElementById('ctoolRibbon');
  ribbon.addEventListener('pointerdown',e=>{
    const btn=e.target.closest('.tool'); if(!btn) return;
    _press(btn);
    const onUp=()=>{ _release(btn); window.removeEventListener('pointerup',onUp); window.removeEventListener('pointercancel',onUp); };
    window.addEventListener('pointerup',onUp,{once:false});
    window.addEventListener('pointercancel',onUp,{once:false});
  });
})();

const _UK=()=>'su_'+currentCanvas;
const _RK=()=>'sr_'+currentCanvas;
const _lsGet=k=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):[];}catch(e){return[];}};
const _lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};

function _currentSnapshot(){
  return {
    cards: [...document.querySelectorAll('#world .card')].map(c=>({
      type:c.dataset.type, x:parseFloat(c.style.left)||0, y:parseFloat(c.style.top)||0,
      w:parseFloat(c.style.width)||240, h:parseFloat(c.style.height)||200,
      zIndex:parseInt(c.style.zIndex)||10,
      title:c.querySelector('[data-title]')?.textContent||'',
      dotColor:c.querySelector('.cbardot')?.style.background||'',
      locked:c.dataset.locked==='true',
      flipped:c.dataset.flipped==='true',
      cardId:c.dataset.cardId||''
      // NOTE: content intentionally not stored — undo/redo only affects layout
    })),
    ribbons: ribbonDB.map(r=>({...r}))
  };
}
function pushUndo(){
  if(!currentCanvas) return;
  const stack=_lsGet(_UK());
  stack.push(_currentSnapshot());
  if(stack.length>500) stack.shift();
  _lsSet(_UK(),stack);
  _lsSet(_RK(),[]);
  document.getElementById('undoBtn')?.classList.remove('disabled');
  document.getElementById('redoBtn')?.classList.add('disabled');
}
function applyUndo(){
  if(!currentCanvas) return;
  const undos=_lsGet(_UK()); if(!undos.length) return;
  const redos=_lsGet(_RK());
  redos.push(_currentSnapshot()); _lsSet(_RK(),redos);
  const snap=undos.pop(); _lsSet(_UK(),undos);
  _applySnapshot(snap);
  document.getElementById('undoBtn')?.classList.toggle('disabled',!undos.length);
  document.getElementById('redoBtn')?.classList.remove('disabled');
}
function applyRedo(){
  if(!currentCanvas) return;
  const redos=_lsGet(_RK()); if(!redos.length) return;
  const undos=_lsGet(_UK());
  undos.push(_currentSnapshot()); _lsSet(_UK(),undos);
  const snap=redos.pop(); _lsSet(_RK(),redos);
  _applySnapshot(snap);
  document.getElementById('redoBtn')?.classList.toggle('disabled',!redos.length);
  document.getElementById('undoBtn')?.classList.remove('disabled');
}
function _applySnapshot(snap){
  const cards=Array.isArray(snap)?snap:(snap.cards||[]);
  const snapRibbons=Array.isArray(snap)?[]:(snap.ribbons||[]);

  // Build lookup of existing DOM cards by cardId
  const existing={};
  document.querySelectorAll('#world .card').forEach(el=>{
    if(el.dataset.cardId) existing[el.dataset.cardId]=el;
  });

  const snapIds=new Set(cards.map(c=>c.cardId).filter(Boolean));

  // Remove cards not in snapshot
  Object.entries(existing).forEach(([id,el])=>{ if(!snapIds.has(id)) el.remove(); });

  // Update or create cards
  cards.sort((a,b)=>(a.zIndex||10)-(b.zIndex||10)).forEach(c=>{
    let card=c.cardId?existing[c.cardId]:null;
    if(card){
      // Update layout only — never touch content/canvas
      card.style.left=c.x+'px'; card.style.top=c.y+'px';
      card.style.width=c.w+'px'; card.style.height=c.h+'px';
      card.style.zIndex=c.zIndex; ztop=Math.max(ztop,parseInt(c.zIndex)||10);
      const titleEl=card.querySelector('[data-title]');
      if(titleEl&&c.title) titleEl.textContent=c.title;
      if(c.dotColor){ const dot=card.querySelector('.cbardot'); if(dot) dot.style.background=c.dotColor; card.querySelector('.rh')?.style.setProperty('--rh-color',c.dotColor); card.style.setProperty('--card-color',c.dotColor); }
      card.dataset.locked=c.locked?'true':'false'; card.classList.toggle('locked',!!c.locked);
      if(c.flipped){ card.dataset.flipped='true'; card.querySelector('.cbar')?.classList.add('flipped'); }
      else { card.dataset.flipped=''; card.querySelector('.cbar')?.classList.remove('flipped'); }
      // Re-snap sheet cards after resize
      if(c.type==='sheet') _shSnap(card);
    } else {
      // Card was deleted — recreate it (content will be empty, that's acceptable)
      cid++;
      card=document.createElement('div');
      card.className='card'; card.dataset.type=c.type;
      card.style.left=c.x+'px'; card.style.top=c.y+'px';
      card.style.width=c.w+'px'; card.style.height=c.h+'px';
      card.style.zIndex=c.zIndex; ztop=Math.max(ztop,parseInt(c.zIndex)||10);
      card.dataset.cardId=c.cardId||('c'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
      card.innerHTML=buildCard(c.type,cid);
      const titleEl=card.querySelector('[data-title]');
      if(titleEl&&c.title) titleEl.textContent=c.title;
      if(c.dotColor){ const dot=card.querySelector('.cbardot'); if(dot) dot.style.background=c.dotColor; card.querySelector('.rh')?.style.setProperty('--rh-color',c.dotColor); card.style.setProperty('--card-color',c.dotColor); }
      if(c.locked){ card.dataset.locked='true'; card.classList.add('locked'); }
      if(c.flipped){ card.dataset.flipped='true'; card.querySelector('.cbar')?.classList.add('flipped'); }
      world.appendChild(card);
      makeDrag(card); makeResize(card,c.type); initCardTitles(card); initDotEvents(card);
      if(c.type==='note') initNoteScroll(card);
      if(c.type==='todo'){ card.querySelectorAll('.todochip').forEach(attachChipEvents); card.querySelectorAll('.todocol').forEach(initTodoCol); }
      if(c.type==='sheet') initSheet(card,[],5);
      if(c.type==='draw'){ const did=card.querySelector('.draw-canvas')?.id?.replace('dc-',''); if(did) initDrawCanvas(did,null); }
    }
  });

  ribbonDB=snapRibbons.map(r=>({...r}));
  renderAllRibbons();
  applyWNow();
  _scheduleCull();
}

    const nc=_expandedCanvasCard.querySelector('.note-content');
    if(nc) nc.innerHTML=document.getElementById('qneContent').innerHTML;
    const titleEl=_expandedCanvasCard.querySelector('[data-title]');
    const newTitle=document.getElementById('qneTitle').value.trim();
    if(titleEl && newTitle) titleEl.textContent=newTitle;
    saveCanvas();
    document.getElementById('quickNoteEditor').style.display='none';
    document.getElementById('canvas').style.display='flex';
    _expandedCanvasCard=null;
    return;
  }
  saveQuickNote();
  document.getElementById('quickNoteEditor').style.display='none';
  document.getElementById('home').style.display='flex';
  _currentQuickId=null; _homeAnimate=true; renderHome();
}
function saveQuickNote(){
  if(_expandedCanvasCard) return; // canvas note — saved on close
  if(!_currentQuickId||!quickDB[_currentQuickId]) return;
  quickDB[_currentQuickId].title=document.getElementById('qneTitle').value;
  quickDB[_currentQuickId].content=document.getElementById('qneContent').innerHTML;
  quickDB[_currentQuickId].lastEdited=Date.now();
  persistDB();
}

/* ── Quick Todo ── */
function openQuickTodo(id){
  _currentQuickId=id;
  const data=quickDB[id]||{};
  document.getElementById('qteTitle').value=data.title||'';
  renderQteTasks();
  document.getElementById('home').style.display='none';
  document.getElementById('quickTodoEditor').style.display='flex';
}
function closeQuickTodo(){
  saveQuickTodo();
  document.getElementById('quickTodoEditor').style.display='none';
  document.getElementById('home').style.display='flex';
  _currentQuickId=null; _homeAnimate=true; renderHome();
}
function saveQuickTodo(){
  if(!_currentQuickId||!quickDB[_currentQuickId]) return;
  quickDB[_currentQuickId].title=document.getElementById('qteTitle').value;
  quickDB[_currentQuickId].lastEdited=Date.now();
  persistDB();
}
function renderQteTasks(){
  const data=quickDB[_currentQuickId]; if(!data) return;
  const tasks=data.content||[];
  const list=document.getElementById('qteList'); list.innerHTML='';
  tasks.forEach((t,i)=>{
    const row=document.createElement('div'); row.className='qte-item';
    const cb=document.createElement('div'); cb.className='qte-cb'+(t.done?' done':'');
    cb.onclick=()=>{ tasks[i].done=!tasks[i].done; persistDB(); renderQteTasks(); saveQuickTodo(); };
    const txt=document.createElement('div'); txt.className='qte-text'+(t.done?' done':'');
    txt.contentEditable='true'; txt.textContent=t.text;
    txt.onblur=()=>{ tasks[i].text=txt.textContent.trim(); persistDB(); };
    txt.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();txt.blur();addQuickTodoItem();} };
    const del=document.createElement('button'); del.className='qte-del'; del.textContent='×';
    del.onclick=()=>{ tasks.splice(i,1); persistDB(); renderQteTasks(); };
    row.appendChild(cb); row.appendChild(txt); row.appendChild(del);
    list.appendChild(row);
  });
}
function addQuickTodoItem(){
  const inp=document.getElementById('qteAddInp');
  const text=inp.value.trim(); if(!text) return;
  const data=quickDB[_currentQuickId]; if(!data) return;
  data.content.push({text,done:false});
  inp.value=''; persistDB(); renderQteTasks(); saveQuickTodo();
}
</script>
</body>
</html>
