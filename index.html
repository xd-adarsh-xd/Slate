<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#181818;--s3:#222;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.22);
  --t1:#f0f0f0;--t2:#777;--t3:#3c3c3c;
  --purple:#7c5cfc;--pink:#fc5c8a;--green:#3ecf8e;
  --amber:#f5a623;--blue:#5c9dfc;--red:#fc5c5c;
}
@keyframes shimmer{0%{background-position:100% center}100%{background-position:-100% center}}
@keyframes glow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);height:100dvh;overflow:hidden;user-select:none;}
.screen{position:absolute;inset:0;display:none;}
#home{display:flex;flex-direction:column;background:var(--bg);}

/* HOME */
.htop{padding:24px 24px 12px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-width:0;gap:8px;}
.demo-tag{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--t2);}
.logo,.vtag{
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:26px;font-weight:700;
  color:#fff;white-space:nowrap;line-height:1;
  animation:shimmer-fade 3s ease-in-out infinite;
}
@keyframes shimmer-fade{0%,100%{color:#666}50%{color:#fff}}
.hscroll{flex:1;overflow-y:auto;padding:0 16px 100px;}
.stag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:16px 8px 10px;}
.folder{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .2s;}
.folder:active{border-color:var(--b2);}
.frow{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.ficon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.ficon svg{opacity:.55;}
.fname{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;flex:1;}
.fcount{font-size:12px;color:var(--t3);}
.fchev{color:var(--t3);transition:transform .2s;}
.folder.open .fchev{transform:rotate(90deg);}
.fkids{display:none;border-top:1px solid var(--b1);}
.folder.open .fkids{display:block;}
.crow{padding:12px 16px 12px 52px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--b1);}
.crow:last-child{border-bottom:none;}
.crow:active{background:var(--s2);}
.cdot{width:8px;height:8px;border-radius:50%;}
.cinfo{flex:1;}
.cname{font-size:14px;font-weight:500;margin-bottom:2px;}
.cmeta{font-size:11px;color:var(--t3);}
.ccard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:border-color .18s,background .18s;}
.ccard:active{background:var(--s2);border-color:var(--b2);}
.ccicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.ccicon svg{opacity:.6;}
.ccinfo{flex:1;}
.ccname{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px;}
.ccmeta{font-size:12px;color:var(--t3);}
.fab{position:absolute;bottom:24px;right:24px;width:56px;height:56px;border-radius:18px;
  background:var(--s2);border:1px solid var(--b3);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(255,255,255,.05),0 8px 24px rgba(0,0,0,.7);
  cursor:pointer;z-index:50;transition:transform .15s,box-shadow .15s;}
.fab:active{transform:scale(.91);}

/* CANVAS */
#canvas{flex-direction:column;background:#090909;}
.ctop{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10;}
.backbtn{width:32px;height:32px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);color:var(--t1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.backbtn:active{background:var(--s3);}
.ctoptitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;flex:1;}
#vp{position:absolute;top:56px;left:0;right:0;bottom:76px;overflow:hidden;touch-action:none;
  background-color:#090909;
  background-image:radial-gradient(circle,rgba(255,255,255,0.12) 1px,transparent 1px);
  background-size:36px 36px;will-change:transform;}
#vpGrid{display:none;}
#world{position:absolute;top:0;left:0;width:0;height:0;transform-origin:0 0;will-change:transform;}
/* Culled cards — content-visibility:hidden skips layout+paint+composite entirely */
.card.culled{content-visibility:hidden;}

/* CARDS */
.card{position:absolute;border:1px solid var(--b2);border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.45);touch-action:none;background:var(--s1);overflow:visible;
  transition:box-shadow .2s;}
.card.focus{box-shadow:0 0 0 1.5px var(--card-color,rgba(255,255,255,.35)),0 4px 20px rgba(0,0,0,.7);}
.clip{position:absolute;inset:0;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}

/* Per-type min sizes */
.card[data-type="note"] {width:230px;height:170px;min-width:230px;min-height:170px;}
.card[data-type="todo"] {width:370px;height:240px;}.card[data-type="link"] {width:260px;height:210px;min-width:260px;min-height:210px;}
.card[data-type="music"]{width:250px;height:245px;min-width:250px;min-height:245px;}
.card[data-type="image"]{width:240px;height:200px;min-width:200px;min-height:160px;}
.card[data-type="video"]{width:260px;height:210px;min-width:200px;min-height:160px;}

.cbar{height:36px;flex-shrink:0;display:flex;align-items:center;padding:0 10px;gap:8px;
  border-bottom:1px solid var(--b1);background:linear-gradient(180deg,var(--s2),var(--s1));
  border-radius:16px 16px 0 0;cursor:grab;}
.cbar:active{cursor:grabbing;}
.cbardot{width:7px;height:7px;border-radius:50%;filter:brightness(1.3);}
.cbarlbl{font-size:11px;font-weight:500;color:var(--t2);font-family:'Syne',sans-serif;text-align:center;outline:none;background:transparent;white-space:nowrap;cursor:pointer;border-radius:6px;padding:2px 6px;max-width:calc(100% - 60px);}
.cbarlbl[contenteditable="true"]{cursor:text;color:var(--t1);background:rgba(255,255,255,0.07);}
.cbar-mid{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.cbarx{width:20px;height:20px;border-radius:6px;border:none;background:transparent;color:var(--t3);
  display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:color .15s;}
.cbarx:active{background:rgba(252,92,92,.15);color:var(--red);}
.cbody{flex:1;padding:12px;overflow:auto;}

/* Note */
.cbody textarea{width:100%;height:100%;background:transparent;border:none;outline:none;
  color:var(--t1);font-family:var(--note-font,'DM Sans',sans-serif);font-size:var(--note-size,14px);line-height:1.6;
  resize:none;caret-color:var(--card-color,var(--purple));overflow-y:auto;overflow-x:hidden;
  touch-action:none;box-sizing:border-box;padding-right:8px;}
.cbody textarea::-webkit-scrollbar{width:6px;pointer-events:none;}
.cbody textarea::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;pointer-events:none;}
.cbody textarea::-webkit-scrollbar-track{background:transparent;pointer-events:none;}

/* Todo */
.todocols{display:flex;gap:8px;padding:10px;overflow-x:auto;height:100%;}
.todocol{flex:1;min-width:100px;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:10px;padding:0;display:flex;flex-direction:column;flex-shrink:0;}
.todocolbar{display:flex;align-items:center;padding:6px 8px 4px;gap:4px;flex-shrink:0;cursor:grab;}
.todocolbar:active{cursor:grabbing;}
.todocolbar-mid{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.todocolh{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);outline:none;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;border-radius:4px;padding:1px 4px;}
.todocolh[contenteditable="true"]{color:var(--t1);background:rgba(255,255,255,.06);cursor:text;}
.todocolx{width:16px;height:16px;border:none;background:transparent;color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.todocolx:active{background:rgba(252,92,92,.15);color:var(--red);}
.todochips{flex:1;overflow-y:auto;padding:0 6px;}
.todochip{background:rgba(255,255,255,.04);border-radius:8px;padding:7px 8px;margin-bottom:5px;font-size:12px;border-left:3px solid var(--t3);cursor:pointer;word-break:break-word;position:relative;user-select:none;}
.todochip:active{opacity:.7;}
.todoadd{font-size:11px;color:var(--t3);padding:4px 8px 8px;cursor:pointer;flex-shrink:0;}
.todoadd:active{color:var(--t2);}

/* Chip context menu */
.chipmenu{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:12px;
  padding:6px;z-index:1000;min-width:160px;box-shadow:0 8px 40px rgba(0,0,0,.8);}
.chipmenu-colors{display:flex;gap:6px;padding:6px 8px 8px;border-bottom:1px solid var(--b1);margin-bottom:4px;flex-wrap:wrap;}
.chipcolor{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.chipcolor.active{border-color:#fff;}
.chipmenu-item{padding:8px 12px;font-size:12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--t1);}
.chipmenu-item:active{background:var(--s3);}
.chipmenu-item.danger{color:var(--red);}

/* Add column button */
.cbar-addcol{width:20px;height:20px;border-radius:6px;border:none;background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;margin-right:2px;transition:color .15s;}
.cbar-addcol:active{color:var(--t1);}

/* Media */
.media-wrap{flex:1;overflow:hidden;background:var(--s2);display:flex;align-items:center;justify-content:center;position:relative;}
.media-wrap img,.media-wrap video{width:100%;height:100%;object-fit:contain;display:block;}
.media-placeholder{display:flex;flex-direction:column;align-items:center;gap:10px;color:var(--t3);}
.media-placeholder svg{opacity:.35;}
.media-placeholder span{font-size:13px;}
.upload-btn{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:8px 16px;color:var(--t2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.upload-btn:active{opacity:.7;}

/* Link */
.link-wrap{display:flex;flex-direction:column;height:100%;}
.link-input-row{display:flex;gap:6px;padding:10px;flex-shrink:0;}
.link-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;color:var(--t1);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.link-inp:focus{border-color:var(--b3);}
.link-go{background:var(--card-color,#555);border:none;border-radius:8px;padding:7px 12px;color:#fff;font-size:12px;cursor:pointer;}
.link-preview{flex:1;display:flex;flex-direction:column;border-top:1px solid var(--b1);overflow:auto;}
.lthumb{width:100%;height:100px;background:var(--s2);position:relative;overflow:hidden;flex-shrink:0;}
.lthumb img{width:100%;height:100%;object-fit:cover;display:block;}
.ytbadge{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;}
.ytbtn{width:36px;height:36px;border-radius:50%;background:rgba(0,0,0,.75);display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;}
.lfoot{padding:10px 12px;}
.ldomain{font-size:10px;color:var(--t3);letter-spacing:.05em;margin-bottom:3px;}
.ltitle{font-size:13px;font-weight:500;line-height:1.4;}
.link-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px;flex-direction:column;gap:6px;}

/* Music */
.music-add-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);padding:12px;}
.music-add-area svg{opacity:.4;}
.music-add-area span{font-size:12px;}
.music-or{font-size:11px;color:var(--t3);}
.music-url-row{display:flex;flex-direction:column;gap:6px;width:100%;}
.music-url-inp{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--t1);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .2s;}
.music-url-inp:focus{border-color:var(--b3);}
.music-url-go{background:var(--card-color,#555);border:none;border-radius:8px;padding:8px;color:#fff;font-size:12px;cursor:pointer;width:100%;}
.music-player{flex:1;display:flex;flex-direction:column;gap:12px;padding:12px;justify-content:center;}
.musrow{display:flex;gap:10px;align-items:center;}
.musart{width:40px;height:40px;border-radius:10px;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.musart svg{opacity:.5;}
.must{font-size:13px;font-weight:500;margin-bottom:2px;}
.musa{font-size:11px;color:var(--t3);}
.musprog-wrap{display:flex;align-items:center;gap:6px;}
.mustime{font-size:10px;color:var(--t3);white-space:nowrap;}
.musprog{flex:1;height:3px;background:var(--s3);border-radius:2px;cursor:pointer;}
.musfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#555,#ccc);transition:width .4s linear;}
.musbtns{display:flex;align-items:center;justify-content:center;gap:14px;}
.mbtn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mplay{background:var(--s3);border:1px solid var(--b3);color:var(--t1);width:36px;height:36px;border-radius:50%;}

/* Resize handle */
.rh{position:absolute;bottom:-10px;right:-10px;width:26px;height:26px;cursor:se-resize;touch-action:none;z-index:20;display:flex;align-items:flex-end;justify-content:flex-end;padding:3px;}
.rh::after{content:'';display:block;width:13px;height:13px;border-right:2px solid var(--rh-color,rgba(255,255,255,.3));border-bottom:2px solid var(--rh-color,rgba(255,255,255,.3));border-radius:0 0 5px 0;}

/* Toolbar */
.ctool{position:absolute;bottom:0;left:0;right:0;height:76px;background:rgba(8,8,8,.98);border-top:1px solid var(--b1);display:flex;align-items:center;justify-content:space-around;padding:0 8px;}
.tool{display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 10px;border-radius:14px;border:none;background:transparent;cursor:pointer;transition:transform .15s;}
.tool:active{transform:scale(.88);}
.ticon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.ticon svg{opacity:.65;}
.tlbl{font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{width:100%;background:var(--s1);border-radius:24px 24px 0 0;border:1px solid var(--b2);border-bottom:none;padding:20px 24px 44px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.show .sheet{transform:translateY(0);}
.shandle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px;}
.stitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;}
.sinput{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s;}
.sinput:focus{border-color:var(--b3);}
.sbtn{width:100%;padding:16px;background:var(--s3);border:1px solid var(--b3);border-radius:14px;color:var(--t1);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;}
.sbtn:active{background:var(--b2);}

/* FAB menu */
.fab-backdrop{position:fixed;inset:0;z-index:48;}
.fab-menu{position:absolute;bottom:90px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:49;align-items:flex-end;}
.fab-opt{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:10px 16px;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:background .15s;}
.fab-opt-icon{display:flex;align-items:center;justify-content:center;width:20px;height:20px;}
.fab-opt-icon svg{opacity:.7;}
.fab-opt:active{background:var(--s3);}
.fab.open{transform:rotate(45deg);}

/* Context menu */
.ctx-menu{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:4px;z-index:200;width:210px;max-height:min(calc(100vh - 48px),480px);overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.9);}
.ctx-backdrop{position:fixed;inset:0;z-index:199;}
.ctx-item{padding:9px 12px;font-size:12.5px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--t1);transition:background .15s;}
.ctx-item:active{background:var(--s3);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:var(--b1);margin:3px 0;}
.ctx-colors{display:flex;gap:5px;padding:4px 8px 3px;flex-wrap:wrap;}
.ctx-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.ctx-dot.sel{border-color:#fff;}
.ctx-label{font-size:9px;color:var(--t3);padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.08em;text-align:center;width:100%;}
/* Ctop buttons */
.undobtn{width:32px;height:32px;border-radius:9px;border:none;background:transparent;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s;flex-shrink:0;}
.undobtn:active{background:var(--s2);}
.undobtn.on{color:rgba(220,220,220,0.9);}
.undobtn.disabled{opacity:.3;pointer-events:none;}
.ctoptitle{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
/* Search bar */
.search-bar{position:absolute;top:56px;left:0;right:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);padding:8px 12px;display:none;align-items:center;gap:6px;z-index:9;}
.search-bar.show{display:flex;}
.search-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;color:var(--t1);font-size:13px;outline:none;}
.search-inp:focus{border-color:rgba(220,220,220,0.6);}
.search-highlight{animation:searchPulse .6s ease 3;}
@keyframes searchPulse{0%,100%{box-shadow:0 0 0 2px rgba(220,220,220,0.7)}50%{box-shadow:0 0 0 4px rgba(220,220,220,0.7)}}
/* MS pill popup */
#msPill{position:absolute;bottom:88px;left:50%;transform:translateX(-50%) scale(0.96);
  background:var(--s2);border:1px solid var(--b3);border-radius:999px;
  padding:8px 14px 8px 16px;display:none;align-items:center;gap:10px;
  z-index:30;box-shadow:0 4px 24px rgba(0,0,0,.7);white-space:nowrap;
  opacity:0;transition:opacity .18s ease,transform .18s ease;will-change:opacity,transform;}
#msPill.show{display:flex;opacity:1;transform:translateX(-50%) scale(1);}
#msPillText{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);}
#msPillCount{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);}
#msPillClose{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);
  color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s,color .15s;}
#msPillClose:active{background:rgba(252,92,92,.2);color:var(--red);}
/* MS selected card outline */
.card.ms-sel{box-shadow:0 0 0 2px rgba(240,240,240,0.85),0 8px 48px rgba(0,0,0,.8);}
/* Pin badge */
.pin-badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;}
/* Card lock icon */
.card-lock-icon{position:absolute;top:8px;right:8px;opacity:0;pointer-events:none;color:var(--t2);}
.card.locked .card-lock-icon{opacity:1;}
.card.locked .cbody{pointer-events:none;}
/* Snap indicator */
#snapIndicator{position:absolute;bottom:84px;right:12px;background:rgba(220,220,220,0.15);border:1px solid rgba(220,220,220,0.2);border-radius:8px;padding:4px 8px;font-size:11px;color:rgba(220,220,220,0.7);pointer-events:none;opacity:0;transition:opacity .3s;}
#snapIndicator.show{opacity:1;}
#lagWarn{display:none;} /* retired */
/* Lag warning popup */
#lagPopup{position:absolute;bottom:88px;left:50%;transform:translateX(-50%) scale(0.96);
  background:var(--s2);border:1px solid var(--amber);border-radius:16px;
  padding:14px 16px 14px 18px;display:none;align-items:center;gap:14px;
  z-index:30;box-shadow:0 4px 24px rgba(0,0,0,.7);width:min(340px,88vw);
  opacity:0;transition:opacity .18s ease,transform .18s ease;will-change:opacity,transform;}
#lagPopup.show{display:flex;opacity:1;transform:translateX(-50%) scale(1);}
#lagPopupText{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--amber);flex:1;line-height:1.55;}
#lagPopupClose{width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,0.08);
  color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;}
#lagPopupClose:active{background:rgba(255,255,255,0.18);}
/* Snap indicator */
.qcard-header{display:flex;align-items:center;padding:12px 14px 8px;gap:10px;}
.qcard-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qcard-title{font-size:14px;font-weight:600;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Outfit',sans-serif;}
.qcard-meta{font-size:11px;color:var(--t3);}
.qcard-preview{padding:0 14px 12px;font-size:12px;color:var(--t2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.qcard-media{width:100%;max-height:200px;object-fit:cover;display:block;}
.qcard-audio{padding:12px 14px 14px;display:flex;align-items:center;gap:12px;}
.qaudio-btn{width:40px;height:40px;border-radius:50%;background:var(--amber);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.qaudio-info{flex:1;min-width:0;}
.qaudio-name{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Outfit',sans-serif;}
.qaudio-progress{width:100%;height:4px;background:var(--b2);border-radius:4px;margin-top:8px;cursor:pointer;}
.qaudio-fill{height:100%;background:rgba(220,220,220,0.7);border-radius:4px;pointer-events:none;}
.qaudio-time{font-size:10px;color:var(--t3);margin-top:4px;}
.qtodo-preview{padding:0 14px 12px;display:flex;flex-direction:column;gap:4px;}
.qtodo-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);}
.qtodo-check{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.qtodo-check.done{background:var(--green);border-color:var(--green);}
.qtodo-check.done::after{content:'';width:6px;height:4px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
/* Home drag handle */
.home-drag-handle{width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:stretch;cursor:grab;touch-action:none;color:var(--t3);}
/* Quick Note editor */
#quickNoteEditor{background:var(--bg);flex-direction:column;}
.qne-top{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;}
.qne-toolbar{display:flex;align-items:center;padding:8px 12px;gap:6px;border-bottom:1px solid var(--b1);}
.qne-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;user-select:none;-webkit-user-select:none;}
.qne-btn.active{background:rgba(220,220,220,0.15);color:rgba(220,220,220,0.9);}
.qne-title{width:100%;padding:12px 16px 4px;font-size:18px;font-weight:700;color:var(--t1);background:transparent;border:none;outline:none;font-family:'Outfit',sans-serif;}
.qne-title::placeholder{color:var(--t3);}
.qne-body{flex:1;padding:8px 16px 16px;overflow-y:auto;}
.qne-content{min-height:200px;outline:none;font-size:14px;color:var(--t1);line-height:1.7;font-family:'DM Sans',sans-serif;}
.qne-content:empty::before{content:attr(data-placeholder);color:var(--t3);}
.qne-content ul{padding-left:20px;list-style:disc;}
.qne-content ol{padding-left:20px;list-style:decimal;}
/* Quick Todo editor */
#quickTodoEditor{background:var(--bg);flex-direction:column;}
.qte-top{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;}
.qte-title{flex:1;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;color:var(--t1);background:transparent;border:none;outline:none;}
.qte-list{flex:1;overflow-y:auto;padding:12px 16px;}
.qte-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);}
.qte-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--t3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.qte-cb.done{background:var(--green);border-color:var(--green);}
.qte-cb.done::after{content:'';width:10px;height:6px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.qte-text{flex:1;font-size:14px;color:var(--t1);line-height:1.5;outline:none;word-break:break-word;}
.qte-text.done{text-decoration:line-through;color:var(--t3);}
.qte-del{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qte-add{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--b1);}
.qte-add-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:10px 14px;color:var(--t1);font-size:14px;outline:none;}
.qte-add-btn{width:40px;height:40px;border-radius:10px;background:var(--purple);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Media upload modal */
#mediaUploadOverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
/* Note content editable */
.note-content{width:100%;height:100%;background:transparent;border:none;outline:none;font-size:var(--note-size,14px);font-family:var(--note-font,'DM Sans',sans-serif);color:var(--t1);line-height:1.6;overflow-y:auto;word-break:break-word;padding:0 8px 0 0;-webkit-user-select:text;user-select:text;}
.note-content[contenteditable="false"]{cursor:default;touch-action:none;pointer-events:none;user-select:none;-webkit-user-select:none;}
.note-content[contenteditable="true"]{cursor:text;}
.note-content:empty::before{content:attr(data-placeholder);color:var(--t3);pointer-events:none;}
.note-content ul{padding-left:18px;list-style:disc;}
.note-content ol{padding-left:18px;list-style:decimal;}
/* Scrollbar for note-content in card */
.cbody .note-content::-webkit-scrollbar{width:6px;}
.cbody .note-content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
.cbody .note-content::-webkit-scrollbar-track{background:transparent;}
/* Connections */
#connSvg{pointer-events:none;}
.ctx-dot.sel{border-color:#fff;}
.ctx-label{font-size:9px;color:var(--t3);padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.08em;text-align:center;width:100%;}

/* Home empty */
.home-empty{text-align:center;padding:60px 24px;color:var(--t2);animation:fadeUp .4s ease;}

/* Credit tag */
#creditTag{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:9px;color:var(--t3);pointer-events:none;z-index:1;line-height:1.6;}

/* Ribbons */
.ribbon-hit{fill:none;stroke:transparent;stroke-width:22px;cursor:pointer;pointer-events:stroke;}
.ribbon-vis{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;pointer-events:none;}
.ribbon-g{pointer-events:painted;}
.cbardot{cursor:crosshair;}
/* Dot pulse while ribbon drag active */
.dot-target{animation:dotPulse .7s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1;transform:scale(1.4);}}
::-webkit-scrollbar{width:0;height:0;}
input[type=file]{display:none;}

/* ── Desktop scrollbars ── */
@media (pointer:fine){
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--b3);}
}

/* ── Hover states (pointer:fine = mouse/trackpad) ── */
@media (hover:hover) and (pointer:fine){
  .ccard:hover{background:var(--s2);border-color:var(--b2);}
  .crow:hover{background:var(--s2);}
  .folder:hover{border-color:var(--b2);}
  .fab-opt:hover{background:var(--s3);}
  .tool:hover{background:var(--s2);}
  .undobtn:hover{background:var(--s2);color:var(--t1);}
  .backbtn:hover{background:var(--s3);}
  .ctx-item:hover{background:var(--s3);}
  .sbtn:hover{background:rgba(255,255,255,.12);}
  .card:hover .cbar{background:linear-gradient(180deg,var(--s3),var(--s2));}
  .cbarx:hover{background:rgba(252,92,92,.15);color:var(--red);}
  .todocolx:hover{background:rgba(252,92,92,.15);color:var(--red);}
  #msPillClose:hover{background:rgba(252,92,92,.2);color:var(--red);}
  #lagPopupClose:hover{background:rgba(255,255,255,0.15);}
  .ccard,.crow,.frow{cursor:pointer;}
  .cbardot{cursor:crosshair;}
  .todochip{cursor:default;}
}

/* ── Responsive layout: wide screens ── */
@media (min-width:600px){
  /* Home — centered column */
  #home{align-items:center;}
  .htop{width:100%;max-width:640px;padding:28px 32px 14px;}
  .hscroll{width:100%;max-width:640px;padding:0 16px 100px;}

  /* Canvas toolbar — centered with max-width */
  .ctool{justify-content:center;gap:4px;padding:0 16px;}
  .tool{padding:8px 18px;}

  /* Context menu wider on desktop */
  .ctx-menu{width:240px;}

  /* Modal sheet as centered dialog on wide screens */
  .overlay{align-items:center;}
  .sheet{border-radius:20px;max-width:420px;width:100%;border:1px solid var(--b2);padding:24px 28px 32px;}
  .shandle{display:none;}

  /* Canvas top bar max-width inner content */
  .ctop{padding:0 24px;}

  /* Lag popup wider */
  #lagPopup{width:min(400px,80vw);}
}

@media (min-width:1024px){
  .htop{max-width:720px;padding:32px 0 16px;}
  .hscroll{max-width:720px;}
  .tool{padding:8px 22px;}
  .ctop{padding:0 32px;}
  /* Larger click targets on desktop */
  .undobtn{width:36px;height:36px;}
  .backbtn{width:36px;height:36px;}
}

@media (min-width:1440px){
  .htop{max-width:900px;}
  .hscroll{max-width:900px;}
}

/* ── Desktop: show home-drag-handle on hover instead of always ── */
@media (hover:hover) and (pointer:fine){
  .home-drag-handle{opacity:0;transition:opacity .15s;}
  .ccard:hover .home-drag-handle,
  .crow:hover .home-drag-handle,
  .frow:hover .home-drag-handle{opacity:1;}
}
</style>
</head>
<body>

<!-- HOME -->
<div class="screen" id="home">
  <div class="htop">
    <div class="logo">Slate <span class="demo-tag">(Demo)</span></div>
    <div class="vtag">V1</div>
  </div>
  <div class="hscroll" id="hscroll">
    <div id="homeList"></div>
  </div>
  <!-- FAB menu -->
  <div class="fab-menu" id="fabMenu" style="display:none">
    <button class="fab-opt" onclick="hideFabMenu();showNewFolderModal()">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg></div><span>New Folder</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();showNewCanvasModal(null)">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M9 21V9"/></svg></div><span>New Canvas</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();newQuickItem('note')">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg></div><span>Quick Note</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();newQuickItem('todo')">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg></div><span>Quick To-Do</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();newQuickItem('image')">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg></div><span>Quick Image</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();newQuickItem('video')">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg></div><span>Quick Video</span>
    </button>
    <button class="fab-opt" onclick="hideFabMenu();newQuickItem('music')">
      <div class="fab-opt-icon"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg></div><span>Quick Music</span>
    </button>
  </div>
  <div class="fab-backdrop" id="fabBackdrop" onclick="hideFabMenu()" style="display:none"></div>
  <button class="fab" id="fab" onclick="toggleFabMenu()">
    <svg id="fabIcon" width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="M12 5v14M5 12h14"/></svg>
  </button>
  <div id="creditTag" style="position:absolute;bottom:10px;left:0;right:0;text-align:center;font-size:10.5px;color:rgba(255,255,255,0.18);pointer-events:none;z-index:1;line-height:1.7;letter-spacing:.02em">Presented to you by<br>the XD Group &amp; AdarshXD</div>
</div>
<!-- credit end -->

<!-- QUICK NOTE EDITOR -->
<div class="screen" id="quickNoteEditor">
  <div class="qne-top">
    <button class="backbtn" onclick="closeQuickNote()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>
    <span style="font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;flex:1;color:var(--t1)" id="qneHeaderTitle">Quick Note</span>
    <span id="qneWordCount" style="font-size:10px;color:var(--t3);"></span>
  </div>
  <div class="qne-toolbar">
    <button class="qne-btn" id="qneBold" onmousedown="qneSaveSelection()" ontouchstart="qneSaveSelection()" onclick="qneExec('bold')" title="Bold"><b>B</b></button>
    <button class="qne-btn" id="qneItalic" onmousedown="qneSaveSelection()" ontouchstart="qneSaveSelection()" onclick="qneExec('italic')" title="Italic"><i>I</i></button>
    <button class="qne-btn" id="qneUnderline" onmousedown="qneSaveSelection()" ontouchstart="qneSaveSelection()" onclick="qneExec('underline')" title="Underline"><u>U</u></button>
    <div style="width:1px;height:20px;background:var(--b2);margin:0 4px"></div>
    <button class="qne-btn" id="qneBullet" onmousedown="qneSaveSelection()" ontouchstart="qneSaveSelection()" onclick="qneExecBullet('insertUnorderedList')" title="Bullet"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4" cy="6" r="1" fill="currentColor"/><circle cx="4" cy="12" r="1" fill="currentColor"/><circle cx="4" cy="18" r="1" fill="currentColor"/></svg></button>
    <button class="qne-btn" id="qneNumbered" onmousedown="qneSaveSelection()" ontouchstart="qneSaveSelection()" onclick="qneExecBullet('insertOrderedList')" title="Numbered"><svg width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/><text x="2" y="7" font-size="5" fill="currentColor" stroke="none">1</text><text x="2" y="13" font-size="5" fill="currentColor" stroke="none">2</text><text x="2" y="19" font-size="5" fill="currentColor" stroke="none">3</text></svg></button>

  <div class="qne-body">

</div>

<!-- QUICK TODO EDITOR -->
<div class="screen" id="quickTodoEditor">
  <div class="qte-top">
    <button class="backbtn" onclick="closeQuickTodo()"><svg width="16" height="16" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m15 18-6-6 6-6"/></svg></button>

    <button class="qte-add-btn" onclick="addQuickTodoItem()">+</button>
  </div>
</div>

<!-- MEDIA UPLOAD MODAL -->
<div id="mediaUploadOverlay">
  <div id="mediaUploadBox" style="background:#141414;border:1px solid rgba(255,255,255,.1);border-radius:22px;padding:22px;width:100%;max-width:340px;box-shadow:0 24px 80px rgba(0,0,0,.9);display:flex;flex-direction:column;gap:14px;">
    <div style="display:flex;align-items:center;justify-content:space-between;">
      <span id="mediaUploadTitle" style="font-size:16px;font-weight:700;color:var(--t1);font-family:'Outfit',sans-serif;">Add Media</span>
      <button onclick="closeMediaUpload()" style="width:28px;height:28px;border-radius:8px;border:none;background:var(--s3);color:var(--t2);font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;">✕</button>
    </div>

<script>
const world=document.getElementById('world');
const vp=document.getElementById('vp');
const ribbonWorld=document.getElementById('ribbonWorld');
const ribbonWorldG=document.getElementById('ribbonWorldG');
let wx=0,wy=0,ws=1,ztop=10,cid=0,dragging=false,pan=false,pinching=false;

/* ── rAF-throttled world transform ── */
let _applyWPending=false;
function applyW(){
  if(_applyWPending) return;
  _applyWPending=true;
  requestAnimationFrame(()=>{
    _applyWPending=false;
    const t=`translate(${wx}px,${wy}px) scale(${ws})`;
    world.style.transform=t;
    ribbonWorldG.style.transform=t;
    _scheduleCull();
  });
}
/* Immediate version used by snapshot restore where rAF would be too late */
function applyWNow(){
  const t=`translate(${wx}px,${wy}px) scale(${ws})`;
  world.style.transform=t;
  ribbonWorldG.style.transform=t;
}

/* ── Viewport culling — throttled to ~24fps ── */
let _cullPending=false;
let _cullLastRun=0;
const CULL_MARGIN=120;
const CULL_MIN_INTERVAL=42; // ms — ~24fps cap

function _scheduleCull(){
  if(_cullPending) return;
  _cullPending=true;
  const now=performance.now();
  const wait=Math.max(0, CULL_MIN_INTERVAL-(now-_cullLastRun));
  setTimeout(()=>requestAnimationFrame(_runCull), wait);
}

function _runCull(){
  _cullPending=false;
  _cullLastRun=performance.now();
  if(dragging||_rdActive||_ribbonMidDragging) return;
  const vr=vp.getBoundingClientRect();
  const vLeft  = -CULL_MARGIN;
  const vTop   = -CULL_MARGIN;
  const vRight = vr.width  + CULL_MARGIN;
  const vBottom= vr.height + CULL_MARGIN;

  document.querySelectorAll('#world .card').forEach(card=>{
    const cx=parseFloat(card.style.left)||0;
    const cy=parseFloat(card.style.top)||0;
    const cw=parseFloat(card.style.width)||240;
    const ch=parseFloat(card.style.height)||200;
    const sx=cx*ws+wx, sy=cy*ws+wy;
    const sx2=sx+cw*ws, sy2=sy+ch*ws;
    const visible=(sx2>vLeft && sy2>vTop && sx<vRight && sy<vBottom);
    card.classList.toggle('culled',!visible);
  });
  // Re-check lag warning after culling since visible count may have changed
  _checkLagWarn();
}

/* ── Lag warning popup ── */
const LAG_THRESHOLD=18; // total cards before warning
const _lagPopup=document.getElementById('lagPopup');
let _lagDismissedThisCanvas=false;

function _checkLagWarn(){
  if(localStorage.getItem('slateLagDismissForever')==='1') return;
  if(_lagDismissedThisCanvas) return;
  const visibleCount=document.querySelectorAll('#world .card:not(.culled)').length;
  if(visibleCount>=LAG_THRESHOLD){
    if(_lagPopup.style.display!=='flex'){
      _lagPopup.style.display='flex';
      // rAF ensures display:flex is painted before transition fires
      requestAnimationFrame(()=>_lagPopup.classList.add('show'));
    }
  } else {
    _lagPopup.classList.remove('show');
    // Hide after transition completes
    setTimeout(()=>{ if(!_lagPopup.classList.contains('show')) _lagPopup.style.display='none'; },200);
  }
}

function _hideLagPopup(){
  _lagPopup.classList.remove('show');
  setTimeout(()=>{ if(!_lagPopup.classList.contains('show')) _lagPopup.style.display='none'; },200);
}

function showLagDismissMenu(e){
  e.stopPropagation();
  showCtxMenu([
    {label:'Disable until I leave this canvas', fn:()=>{
      _lagDismissedThisCanvas=true;
      _hideLagPopup();
    }},
    {label:'Disable forever (all canvases)', fn:()=>{
      localStorage.setItem('slateLagDismissForever','1');
      _hideLagPopup();
    }},
  ], e.clientX, e.clientY);
}

/* ── Multi-Select Mode ── */
let msMode=false;
const msSelected=new Set(); // card DOM elements
let _msPinchJustEnded=false;

function _msPillUpdate(){
  const pill=document.getElementById('msPill');
  document.getElementById('msPillCount').textContent=msSelected.size;
  if(msMode){
    if(pill.style.display!=='flex'){
      pill.style.display='flex';
      requestAnimationFrame(()=>pill.classList.add('show'));
    }
  } else {
    pill.classList.remove('show');
    setTimeout(()=>{ if(!pill.classList.contains('show')) pill.style.display='none'; },200);
  }
}
function enterMsMode(card){
  if(_searchOpen) closeSearch();
  msMode=true;
  msSelected.clear();
  msSelected.add(card);
  card.classList.add('ms-sel');
  _msPillUpdate();
}
function exitMsMode(){
  msMode=false;
  msSelected.forEach(c=>c.classList.remove('ms-sel'));
  msSelected.clear();
  _msPillUpdate();
}
function _msTapCard(card){
  if(msSelected.has(card)){
    msSelected.delete(card);
    card.classList.remove('ms-sel');
  } else {
    msSelected.add(card);
    card.classList.add('ms-sel');
  }
  if(msSelected.size===0){ exitMsMode(); return; }
  _msPillUpdate();
}

// Prevents the canvas touchend from exiting MS right after a long-press opens the menu
let _msMenuJustOpened=false;

/* ══════════════════════════════════════════════
   RIBBON SYSTEM
   ribbonDB: [{id, fromId, toId, color, midOffX, midOffY}]
   midOffX/midOffY = offset from midpoint of the two anchors (world-space)
   ══════════════════════════════════════════════ */
let ribbonDB=[];
let _ribbonDragging=false;
let _ribbonMidDragging=false;
let _rdFromCard=null, _rdColor='', _rdActive=false, _rdLastTouchEnd=0;
/* ── Helpers ── */
function _cardById(id){ return document.querySelector(`#world .card[data-card-id="${id}"]`); }
function getDotWorldPos(card){
  const dot=card.querySelector('.cbardot');
  if(!dot) return {x:0,y:0};
  const dr=dot.getBoundingClientRect();
  const vr=vp.getBoundingClientRect();
  return {
    x:(dr.left+dr.width/2-vr.left-wx)/ws,
    y:(dr.top+dr.height/2-vr.top-wy)/ws
  };
}
function _ribbonPath(ax,ay,bx,by,mox,moy){
  // mid control point = midpoint of anchors + offset
  const mx=(ax+bx)/2+mox;
  const my=(ay+by)/2+moy;
  // cubic bezier: from A, through two control points near mid, to B
  const cp1x=ax+(mx-ax)*0.7;
  const cp1y=ay+(my-ay)*0.7;
  const cp2x=bx+(mx-bx)*0.7;
  const cp2y=by+(my-by)*0.7;
  return `M${ax},${ay} C${cp1x},${cp1y} ${cp2x},${cp2y} ${bx},${by}`;
}
function clearRibbonSvg(){
  [...ribbonWorldG.querySelectorAll('g[data-rid]')].forEach(g=>g.remove());
}
function _ribbonGroupId(rid){ return 'rg_'+rid; }

/* ── Render one ribbon ── */
function renderRibbon(r){
  const fromCard=document.querySelector(`#world .card[data-card-id="${r.fromId}"]`);
  const toCard  =document.querySelector(`#world .card[data-card-id="${r.toId}"]`);
  if(!fromCard||!toCard) return;
  const a=getDotWorldPos(fromCard);
  const b=getDotWorldPos(toCard);
  const d=_ribbonPath(a.x,a.y,b.x,b.y,r.midOffX||0,r.midOffY||0);

  let g=ribbonWorldG.querySelector(`g[data-rid="${r.id}"]`);
  if(!g){
    g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('data-rid',r.id);
    g.setAttribute('class','ribbon-g');
    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('class','ribbon-hit');
    hit.setAttribute('data-rid',r.id);
    const vis=document.createElementNS('http://www.w3.org/2000/svg','path');
    vis.setAttribute('class','ribbon-vis');
    vis.setAttribute('data-rid',r.id);
    // Endpoint dots — cover the cbardot completely
    const dotA=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dotA.setAttribute('class','ribbon-dot-a');
    dotA.setAttribute('r','5');
    dotA.setAttribute('pointer-events','none');
    const dotB=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dotB.setAttribute('class','ribbon-dot-b');
    dotB.setAttribute('r','5');
    dotB.setAttribute('pointer-events','none');
    g.appendChild(hit);
    g.appendChild(vis);
    g.appendChild(dotA);
    g.appendChild(dotB);
    ribbonWorldG.insertBefore(g,_liveRibbon);
    _attachRibbonEvents(g,r.id);
  }
  const hit=g.querySelector('.ribbon-hit');
  const vis=g.querySelector('.ribbon-vis');
  const dotA=g.querySelector('.ribbon-dot-a');
  const dotB=g.querySelector('.ribbon-dot-b');
  const color=r.color||'rgba(200,200,200,0.8)';
  vis.setAttribute('d',d);
  vis.style.stroke=color;
  hit.setAttribute('d',d);
  dotA.setAttribute('cx',a.x); dotA.setAttribute('cy',a.y); dotA.style.fill=color;
  dotB.setAttribute('cx',b.x); dotB.setAttribute('cy',b.y); dotB.style.fill=color;
}

/* ── Render all ribbons ── */
function renderAllRibbons(){
  clearRibbonSvg();
  ribbonDB.forEach(r=>renderRibbon(r));
}

/* ── Ribbon pointer events ── */
let _rbLpTimer=null, _rbMoved=false, _rbSx=0, _rbSy=0;
let _rbMidRid=null, _rbMidSx=0, _rbMidSy=0, _rbMidOx=0, _rbMidOy=0;

function _attachRibbonEvents(g, rid){
  function onStart(cx,cy){
    _rbSx=cx; _rbSy=cy; _rbMoved=false;
    _rbMidRid=rid;
    const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
    _rbMidOx=r.midOffX||0; _rbMidOy=r.midOffY||0;
    // block pan
    _ribbonMidDragging=true; pan=false;
    clearTimeout(_rbLpTimer);
    _rbLpTimer=setTimeout(()=>{
      if(!_rbMoved){ _ribbonMidDragging=false; showRibbonMenu(rid,cx,cy); }
    },500);
  }
  function onMove(cx,cy){
    if(!_ribbonMidDragging||_rbMidRid!==rid) return;
    const dx=(cx-_rbSx)/ws, dy=(cy-_rbSy)/ws;
    if(!_rbMoved && Math.hypot(dx,dy)*ws>8){ _rbMoved=true; clearTimeout(_rbLpTimer); }
    if(_rbMoved){
      const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
      r.midOffX=_rbMidOx+dx;
      r.midOffY=_rbMidOy+dy;
      renderRibbon(r);
    }
  }
  function onEnd(){
    clearTimeout(_rbLpTimer);
    if(_rbMoved && _rbMidRid===rid){
      saveCanvas();
    }
    _ribbonMidDragging=false; _rbMidRid=null; _rbMoved=false;
  }
  g.addEventListener('touchstart',e=>{
    e.stopPropagation();
    onStart(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  g.addEventListener('touchmove',e=>{
    e.stopPropagation();
    onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  g.addEventListener('touchend',e=>{
    e.stopPropagation();
    onEnd();
  },{passive:true});
  g.addEventListener('mousedown',e=>{
    e.stopPropagation();
    onStart(e.clientX,e.clientY);
  });
  // mousemove/mouseup handled globally below
}

document.addEventListener('mousemove',e=>{
  if(_ribbonMidDragging && _rbMidRid){
    const rid=_rbMidRid;
    const dx=(e.clientX-_rbSx)/ws, dy=(e.clientY-_rbSy)/ws;
    if(!_rbMoved && Math.hypot(dx,dy)*ws>8){ _rbMoved=true; clearTimeout(_rbLpTimer); }
    if(_rbMoved){
      const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
      r.midOffX=_rbMidOx+dx; r.midOffY=_rbMidOy+dy;
      renderRibbon(r);
    }
  }
});
document.addEventListener('mouseup',e=>{
  if(_ribbonMidDragging){
    clearTimeout(_rbLpTimer);
    if(_rbMoved) saveCanvas();
    _ribbonMidDragging=false; _rbMidRid=null; _rbMoved=false;
  }
});

/* ── Dot → ribbon drag-to-connect ── */
const _liveRibbon=document.getElementById('ribbonLive');
const _liveRibbonDotA=document.getElementById('ribbonLiveDotA');
const _liveRibbonDotB=document.getElementById('ribbonLiveDotB');

function _screenToWorld(cx,cy){
  const vr=vp.getBoundingClientRect();
  return { x:(cx-vr.left-wx)/ws, y:(cy-vr.top-wy)/ws };
}

function _findNearestDot(cx,cy,excludeCard){
  let best=null, bestD=55;
  document.querySelectorAll('#world .card').forEach(card=>{
    if(card===excludeCard) return;
    const dot=card.querySelector('.cbardot');
    if(!dot) return;
    const dr=dot.getBoundingClientRect();
    const dotCx=dr.left+dr.width/2;
    const dotCy=dr.top+dr.height/2;
    const d=Math.hypot(cx-dotCx,cy-dotCy);
    if(d<bestD){ bestD=d; best=card; }
  });
  return best;
}

function _startDotDrag(card, cx, cy){
  _rdFromCard=card;
  const dot=card.querySelector('.cbardot');
  _rdColor=dot ? getComputedStyle(dot).backgroundColor : 'rgba(255,255,255,0.7)';
  // Fallback: if computed is transparent/empty, use the inline style directly
  if(!_rdColor || _rdColor==='rgba(0, 0, 0, 0)' || _rdColor==='transparent'){
    _rdColor='rgba(200,200,200,0.8)';
  }
  _rdActive=true;
  pan=false; dragging=true;
  _liveRibbon.style.stroke=_rdColor;
  // Show start dot immediately
  const a=getDotWorldPos(card);
  const b=_screenToWorld(cx,cy);
  _liveRibbon.setAttribute('d',_ribbonPath(a.x,a.y,b.x,b.y,0,(b.y-a.y)*0.3));
  _liveRibbonDotA.setAttribute('cx',a.x); _liveRibbonDotA.setAttribute('cy',a.y);
  _liveRibbonDotA.style.fill=_rdColor; _liveRibbonDotA.style.display='';
  _liveRibbonDotB.style.display='none';
  // Pulse all other dots
  document.querySelectorAll('#world .card').forEach(c=>{
    if(c!==card) c.querySelector('.cbardot')?.classList.add('dot-target');
  });
}

let _snapCheckLast=0;
function _moveDotDrag(cx,cy){
  if(!_rdActive) return;
  const a=getDotWorldPos(_rdFromCard);
  const b=_screenToWorld(cx,cy);
  const d=_ribbonPath(a.x,a.y,b.x,b.y,0,(b.y-a.y)*0.3);
  _liveRibbon.setAttribute('d',d);
  _liveRibbonDotA.setAttribute('cx',a.x); _liveRibbonDotA.setAttribute('cy',a.y);
  // Snap preview check throttled to ~24fps (expensive: loops all cards)
  const now=performance.now();
  if(now-_snapCheckLast<42) return;
  _snapCheckLast=now;
  const near=_findNearestDot(cx,cy,_rdFromCard);
  if(near){
    const nb=getDotWorldPos(near);
    _liveRibbonDotB.setAttribute('cx',nb.x); _liveRibbonDotB.setAttribute('cy',nb.y);
    _liveRibbonDotB.style.fill=_rdColor; _liveRibbonDotB.style.display='';
  } else {
    _liveRibbonDotB.style.display='none';
  }
}

function _endDotDrag(cx,cy){
  if(!_rdActive) return;
  _rdActive=false; dragging=false;
  _liveRibbon.setAttribute('d','');
  _liveRibbon.style.stroke='transparent';
  _liveRibbonDotA.style.display='none';
  _liveRibbonDotB.style.display='none';
  document.querySelectorAll('.dot-target').forEach(d=>d.classList.remove('dot-target'));
  const toCard=_findNearestDot(cx,cy,_rdFromCard);
  if(toCard){
    pushUndo();
    const a=getDotWorldPos(_rdFromCard);
    const b=getDotWorldPos(toCard);
    const defMidOffY=Math.max(60, Math.abs(b.y-a.y)*0.4);
    const rid='r'+Date.now();
    ribbonDB.push({
      id:rid,
      fromId:_rdFromCard.dataset.cardId,
      toId:toCard.dataset.cardId,
      color:_rdColor,
      midOffX:0,
      midOffY:defMidOffY
    });
    renderRibbon(ribbonDB[ribbonDB.length-1]);
    saveCanvas();
  }
  _rdFromCard=null;
  pan=false;
}

/* Attach dot events — called once per card after it enters the DOM */
function initDotEvents(card){
  const dot=card.querySelector('.cbardot');
  if(!dot) return;
  let _dotLastTouchEnd=0;

  dot.addEventListener('touchstart',e=>{
    e.stopPropagation();
    _dotLastTouchEnd=0;
    _startDotDrag(card, e.touches[0].clientX, e.touches[0].clientY);
  },{passive:true});

  dot.addEventListener('mousedown',e=>{
    if(Date.now()-_dotLastTouchEnd<600) return;
    e.stopPropagation();
    _startDotDrag(card, e.clientX, e.clientY);
  });
}

// Global move/end for ribbon drag (dot → connect)
document.addEventListener('touchmove',e=>{
  if(_rdActive) _moveDotDrag(e.touches[0].clientX, e.touches[0].clientY);
},{passive:true});
document.addEventListener('touchend',e=>{
  if(_rdActive){
    _rdLastTouchEnd=Date.now();
    _endDotDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
},{passive:true});
document.addEventListener('mousemove',e=>{
  if(_rdActive) _moveDotDrag(e.clientX, e.clientY);
});
document.addEventListener('mouseup',e=>{
  if(_rdActive) _endDotDrag(e.clientX, e.clientY);
});

function randColor(){ return PALETTE[Math.floor(Math.random()*PALETTE.length)]; }
function randIcon(arr){ return arr[Math.floor(Math.random()*arr.length)]; }

/* ── Timestamp ── */
function relTime(ts){
  const d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  if(d<2*86400000) return 'yesterday';
  return Math.floor(d/86400000)+'d ago';
}

function escHtml(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

/* Returns CSS filter to make white SVG icons readable on any background colour */
function _iconContrast(color){
  if(!color||color.startsWith('var(--s')||color==='transparent') return ''; // dark bg — keep white
  // Parse hex
  let r,g,b;
  if(color.startsWith('#')){
    const h=color.length===4?color.replace(/#(.)(.)(.)/,'#$1$1$2$2$3$3'):color;
    r=parseInt(h.slice(1,3),16); g=parseInt(h.slice(3,5),16); b=parseInt(h.slice(5,7),16);
  } else if(color.startsWith('rgb')){
    const m=color.match(/[\d.]+/g); if(!m||m.length<3) return '';
    [r,g,b]=[+m[0],+m[1],+m[2]];
  } else return '';
  // Perceived luminance (ITU-R BT.709)
  const lum=0.2126*(r/255)+0.7152*(g/255)+0.0722*(b/255);
  return lum>0.45?'filter:invert(1) brightness(0.1);':'';
}

function qItemHTML(id,data){
  const colors={note:'var(--blue)',todo:'var(--green)',image:'var(--pink)',video:'var(--red)',music:'var(--amber)'};
  const icons={
    note:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>`,
    todo:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>`,
    image:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>`,
    video:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2"/></svg>`,
    music:`<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg>`
  };
  const color=(data.color&&(data.type==='note'||data.type==='todo'))?data.color:(colors[data.type]||'var(--purple)');
  const icon=icons[data.type]||'';
  const label={note:'Quick Note',todo:'Quick To-Do',image:'Image',video:'Video',music:'Music'}[data.type]||data.type;
  const onclick=data.type==='note'?`openQuickNote('${id}')`:data.type==='todo'?`openQuickTodo('${id}')`:data.type==='music'?'':'';
  const handleDiv=`<div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.ccard'),'quick','${id}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.ccard'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.ccard'),event)">${H6}</div>`;
  let body='';
  if(data.type==='note'){
    const plain=(data.content||'').replace(/<[^>]+>/g,' ').replace(/\s+/g,' ').trim().slice(0,120);
    if(plain) body=`<div class="qcard-preview">${escHtml(plain)}</div>`;
  } else if(data.type==='todo'){
    const items=(data.content||[]).slice(0,4);
    const done=(data.content||[]).filter(t=>t.done).length,total=(data.content||[]).length;
    if(items.length) body=`<div class="qtodo-preview">${items.map(t=>`<div class="qtodo-row"><div class="qtodo-check${t.done?' done':''}"></div><span style="${t.done?'text-decoration:line-through;color:var(--t3)':''}">${escHtml(t.text)}</span></div>`).join('')}${total>4?`<div style="font-size:11px;color:var(--t3);padding-top:2px">+${total-4} more</div>`:''}</div>`;
    if(total) body+=`<div style="padding:0 14px 10px;font-size:11px;color:var(--t3)">${done}/${total} done</div>`;
  } else if(data.type==='image'){
    body=`<div style="padding:8px"><img src='${data.src}' style="border-radius:9px;width:100%;height:auto;display:block;" onload="this.closest('.ccard').style.height='auto'"></div>`;
  } else if(data.type==='video'){
    body=`<div style="padding:8px"><video src='${data.src}' style="border-radius:9px;width:100%;height:auto;display:block;" playsinline controls onloadedmetadata="this.closest('.ccard').style.height='auto'"></video></div>`;
  } else if(data.type==='music'){
    body=`<div class="qcard-audio" id="qaud-${id}">
      <button class="qaudio-btn" onclick="toggleQAudio('${id}',this)"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
      <div class="qaudio-info"><div class="qaudio-name">${escHtml(data.title||'Audio')}</div>
      <div class="qaudio-progress" onclick="seekQAudio('${id}',event,this)"><div class="qaudio-fill" id="qfill-${id}" style="width:0%"></div></div>
      <div class="qaudio-time" id="qtime-${id}">0:00 / 0:00</div></div>
      <audio id="qaudio-${id}" src="${data.src}" onended="resetQAudio('${id}')" ontimeupdate="updateQAudioProgress('${id}')"></audio>
      ${handleDiv}
    </div>`;
  }
  const header=data.type==='music'?'':`<div class="qcard-header">
    <div style="position:relative;flex-shrink:0"><div class="qcard-icon" style="background:${color}">${icon}</div>${data.pinned?`<div class="pin-badge" style="color:var(--purple)">${PIN_SVG}</div>`:''}</div>
    <div style="flex:1;min-width:0;"><div class="qcard-title">${escHtml(data.title||label)}</div><div class="qcard-meta">${label} · ${relTime(data.lastEdited)}</div></div>
    ${data.type!=='image'&&data.type!=='video'?handleDiv:''}
  </div>`;
  const absHandle=(data.type==='image'||data.type==='video')?`<div style="position:absolute;top:10px;right:10px;z-index:3;background:rgba(0,0,0,.5);border-radius:8px;padding:4px;" ontouchstart="homeItemTouchStart(this.closest('.ccard'),'quick','${id}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.ccard'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.ccard'),event)">${H6}</div>`:'';
  return `<div class="ccard" onclick="${onclick}" data-qid="${id}"
    ontouchstart="_qCardTouchStart('${id}',event)" ontouchmove="_qCardTouchMove(event)" ontouchend="_qCardTouchEnd(event)"
    style="padding:0;flex-direction:column;align-items:stretch;position:relative;${data.cardColor?'background:'+data.cardColor+';border-color:'+data.cardColor+';':''}">
    ${absHandle}${header}${body}
  </div>`;
}

function renderHome(){
  // save open state of folders before re-render
  const openFolders=new Set([...document.querySelectorAll('.folder.open')].map(f=>f.id));
  const list=document.getElementById('homeList');

  // Build all items: folders + standalone canvases + quick items
  const allItems=[];
  Object.entries(folderDB).forEach(([fid,f])=> allItems.push({id:fid,data:f,kind:'folder'}));
  Object.entries(canvasDB).filter(([,v])=>!v.folder).forEach(([id,d])=> allItems.push({id,data:d,kind:'canvas'}));
  Object.entries(quickDB).forEach(([id,d])=> allItems.push({id,data:d,kind:'quick'}));

  // Sort: pinned first, then by order
  allItems.sort((a,b)=>{
    const pa=a.data.pinned?0:1, pb=b.data.pinned?0:1;
    return pa-pb || (a.data.order||0)-(b.data.order||0);
  });

  const folderHTML=(fid,folder)=>{
    const kids=Object.entries(canvasDB).filter(([,v])=>v.folder===fid).sort((a,b)=>(a[1].order||0)-(b[1].order||0));
    const kHTML=kids.map(([name,data])=>`
      <div class="crow" onclick="openCanvas('${esc(name)}')"
        ontouchstart="_ccardTouchStart('${esc(name)}',event)" ontouchmove="_ccardTouchMove(event)" ontouchend="_ccardTouchEnd(event)"
        oncontextmenu="event.preventDefault();showHomeMenu('canvas','${esc(name)}',event.clientX,event.clientY,this)">
        <div class="cdot" style="background:${data.color||'var(--purple)'}"></div>
        <div class="cinfo"><div class="cname">${esc(name)}</div>
        <div class="cmeta">${data.cards.length} card${data.cards.length!==1?'s':''} · ${relTime(data.lastEdited)}</div></div>
        <div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.crow'),'canvas','${esc(name)}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.crow'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.crow'),event)">${H6}</div>
      </div>`).join('');
    return `<div class="folder${openFolders.has('folder-'+fid)?' open':''}" id="folder-${fid}">
      <div class="frow" onclick="document.getElementById('folder-${fid}').classList.toggle('open')"
        ontouchstart="_folderTouchStart('${fid}',event)" ontouchmove="_folderTouchMove(event)" ontouchend="_folderTouchEnd('${fid}',event)"
        oncontextmenu="event.preventDefault();showHomeMenu('folder','${fid}',event.clientX,event.clientY,this)">
        <div style="position:relative;flex-shrink:0"><div class="ficon" style="background:${folder.color||'var(--s3)'}; border-radius:8px"><span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;${_iconContrast(folder.color||'')}">${folder.icon||FOLDER_ICONS[0]}</span></div>${folder.pinned?`<div class="pin-badge" style="color:var(--purple)">${PIN_SVG}</div>`:''} </div>
        <span class="fname">${esc(folder.name)}</span>
        <span class="fcount">${kids.length}</span>
        <svg class="fchev" width="14" height="14" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path d="m9 18 6-6-6-6"/></svg>
        <div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.folder'),'folder','${fid}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.folder'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.folder'),event)">${H6}</div>
      </div>
      <div class="fkids">${kHTML}</div>
    </div>`;
  };

  const ccardHTML=({id,data,kind})=>{
    if(kind==='folder') return folderHTML(id,data);
    if(kind==='quick') return qItemHTML(id,data);
    return `<div class="ccard" onclick="openCanvas('${esc(id)}')" style="position:relative;"
      ontouchstart="_ccardTouchStart('${esc(id)}',event)" ontouchmove="_ccardTouchMove(event)" ontouchend="_ccardTouchEnd(event)"
      oncontextmenu="event.preventDefault();showHomeMenu('canvas','${esc(id)}',event.clientX,event.clientY,this)">
      <div style="position:relative;flex-shrink:0"><div class="ccicon" style="background:${data.color||'var(--s3)'}"><span style="display:flex;align-items:center;justify-content:center;width:100%;height:100%;${_iconContrast(data.color||'')}">${data.icon||HOME_ICONS[0]}</span></div>${data.pinned?`<div class="pin-badge" style="color:var(--purple)">${PIN_SVG}</div>`:''}</div>
      <div class="ccinfo"><div class="ccname">${esc(id)}</div><div class="ccmeta">${data.cards.length} card${data.cards.length!==1?'s':''} · ${relTime(data.lastEdited)}</div></div>
      <div class="home-drag-handle" ontouchstart="homeItemTouchStart(this.closest('.ccard'),'canvas','${esc(id)}',event);event.stopPropagation();" ontouchmove="homeItemTouchMove(this.closest('.ccard'),event);event.stopPropagation();" ontouchend="homeItemTouchEnd(this.closest('.ccard'),event)">${H6}</div>
    </div>`;
  };

  list.innerHTML=allItems.map(ccardHTML).join('');
}

function esc(s){ return String(s).replace(/'/g,"\\'").replace(/"/g,'&quot;'); }

/* ── FAB menu ── */
function toggleFabMenu(){
  const m=document.getElementById('fabMenu'), b=document.getElementById('fabBackdrop');
  const fab=document.getElementById('fab');
  const open = m.style.display==='none';
  m.style.display = open?'flex':'none';
  b.style.display = open?'block':'none';
  fab.style.transform = open?'rotate(45deg)':'';
}
function hideFabMenu(){
  document.getElementById('fabMenu').style.display='none';
  document.getElementById('fabBackdrop').style.display='none';
  document.getElementById('fab').style.transform='';
}

/* ── New Canvas modal ── */
let _newCanvasTargetFolder=null;
function showNewCanvasModal(folderId){
  _newCanvasTargetFolder=folderId;
  const title = folderId ? 'New Canvas in '+folderDB[folderId]?.name : 'New Canvas';
  document.getElementById('newCanvasTitle').textContent=title;
  document.getElementById('newCanvasName').value='';
  document.getElementById('overlayCanvas').classList.add('show');
  setTimeout(()=>document.getElementById('newCanvasName').focus(),300);
}
function hideNewCanvasModal(){
  document.getElementById('overlayCanvas').classList.remove('show');
  _renameMode=false; _renameCallback=null;
  const btn=document.querySelector('#overlayCanvas .sbtn');
  if(btn) btn.textContent='Create Canvas';
}
let _renameMode=false, _renameCallback=null;
function confirmNewCanvas(){
  const n=document.getElementById('newCanvasName').value.trim();
  const wasRename=_renameMode;
  const cb=_renameCallback;
  hideNewCanvasModal();
  if(wasRename){ if(n) cb(n); return; }
  const name=n||'Untitled Canvas';
  canvasDB[name]={cards:[],wx:20,wy:20,ws:1,lastEdited:Date.now(),
    folder:_newCanvasTargetFolder,
    color:randColor(), icon:randIcon(HOME_ICONS)};
  persistDB(); renderHome(); openCanvas(name);
}

/* ── New Folder modal ── */
function showNewFolderModal(){
  document.getElementById('newFolderName').value='';
  document.getElementById('overlayFolder').classList.add('show');

function saveCanvas(){
  if(!currentCanvas) return;
  const cards = [];
  document.querySelectorAll('#world .card').forEach(card=>{
    const type = card.dataset.type;
    const title = card.querySelector('[data-title]')?.textContent || '';
    const w = parseFloat(card.style.width)||card.offsetWidth;
    const h = parseFloat(card.style.height)||card.offsetHeight;
    const content = extractContent(card, type);

    cards.push({ type, title, x:parseFloat(card.style.left)||0, y:parseFloat(card.style.top)||0, w, h, zIndex:parseInt(card.style.zIndex)||10, content, dotColor, locked:card.dataset.locked==='true', cardId:card.dataset.cardId||'' });
  });

}

function extractContent(card, type){
  if(type==='note') return {
    text: card.querySelector('.note-content')?.innerHTML||card.querySelector('textarea')?.value||'',
    font: card.style.getPropertyValue('--note-font')||'',
    size: card.style.getPropertyValue('--note-size')||'',
  };
  if(type==='link') return {url: card.querySelector('.link-inp')?.value||'', previewHTML: card.querySelector('.link-preview')?.innerHTML||''};
  if(type==='todo'){
    const cols=[];
    card.querySelectorAll('.todocol').forEach(col=>{
      const header=col.querySelector('.todocolh')?.textContent||'';
      const chips=[...col.querySelectorAll('.todochip')].map(c=>({text:c.textContent.trim(),color:c.style.borderLeftColor}));
      cols.push({header,chips});
    });
    return {cols};
  }
  if(type==='music'){
    const player=card.querySelector('.music-player');
    if(player) return {name:card.querySelector('.must')?.textContent||'', source:card.querySelector('.musa')?.textContent||''};
  }
  if(type==='image'){ const img=card.querySelector('img'); return img?{src:img.src}:{}; }
  if(type==='video'){ const vid=card.querySelector('video'); return vid?{src:vid.src}:{}; }
  return {};
}

/* ── Restore canvas state ── */
function restoreCanvas(name){
  const data = canvasDB[name];
  ribbonDB=[];
  clearRibbonSvg();
  if(!data || data.cards.length===0){
    wx=20; wy=20; ws=1; applyWNow();
    return;
  }
  wx=data.wx; wy=data.wy; ws=data.ws; applyWNow();
  [...data.cards].sort((a,b)=>a.zIndex-b.zIndex).forEach(c=>{
    cid++;
    const card=document.createElement('div');
    card.className='card'; card.dataset.type=c.type;
    card.style.left=c.x+'px'; card.style.top=c.y+'px';
    card.style.width=c.w+'px'; card.style.height=c.h+'px';
    card.style.zIndex=c.zIndex; ztop=Math.max(ztop,c.zIndex);
    card.dataset.cardId=c.cardId||('c'+Date.now()+'_'+Math.random().toString(36).slice(2,7));
    card.innerHTML=buildCard(c.type,cid);
    const titleEl=card.querySelector('[data-title]');
    if(titleEl && c.title) titleEl.textContent=c.title;
    if(c.dotColor){
      const dot=card.querySelector('.cbardot'); if(dot) dot.style.background=c.dotColor;
      card.querySelector('.rh')?.style.setProperty('--rh-color', c.dotColor);
      card.style.setProperty('--card-color', c.dotColor);
    }
    if(c.locked){ card.dataset.locked='true'; card.classList.add('locked'); }
    restoreContent(card, c.type, c.content||{});
    world.appendChild(card);
    makeDrag(card); makeResize(card,c.type); initCardTitles(card); initDotEvents(card);
    if(c.type==='note') initNoteScroll(card);
    if(c.type==='todo'){ card.querySelectorAll('.todochip').forEach(attachChipEvents); card.querySelectorAll('.todocol').forEach(initTodoCol); fitTodoCard(card); }
  });
  // Restore ribbons — cards must be in DOM first
  ribbonDB=(data.ribbons||[]).map(r=>({...r}));
  renderAllRibbons();
}

function restoreContent(card, type, content){
  if(type==='note' && content.text){
    const nc=card.querySelector('.note-content');
    if(nc) nc.innerHTML=content.text;
    // Legacy: also handle old saves that used textarea
    const ta=card.querySelector('textarea'); if(ta) ta.value='';
  }
  if(type==='note'){
    if(content.font) card.style.setProperty('--note-font',content.font);
    if(content.size) card.style.setProperty('--note-size',content.size);
  }
  if(type==='link' && content.url){
    const inp=card.querySelector('.link-inp'); if(inp) inp.value=content.url;
    const preview=card.querySelector('.link-preview');
    if(preview && content.previewHTML) preview.innerHTML=content.previewHTML;
  }
  if((type==='image'||type==='video') && content.src){
    const wrap=card.querySelector('.media-wrap');
    if(wrap){ wrap.innerHTML = type==='image' ? `<img src="${content.src}" onload="setAR(this)">` : `<video src="${content.src}" playsinline controls style="width:100%;height:100%;object-fit:contain;"></video>`; }
  }
  if(type==='todo' && content.cols){
    const colsEl=card.querySelector('.todocols'); if(!colsEl) return;
    colsEl.innerHTML='';
    content.cols.forEach(col=>{
      const div=document.createElement('div');
      div.innerHTML=makeTodoCol(col.header, col.chips.map(c=>[c.text,c.color]));
      const colEl=div.firstElementChild; colsEl.appendChild(colEl);
      colEl.querySelectorAll('.todochip').forEach(attachChipEvents);
      initTodoCol(colEl);
    });
    fitTodoCard(card);
  }
}

/* ── Context menu (shared) ── */
function showCtxMenu(items, cx, cy){
  const menu=document.getElementById('ctxMenu');
  const back=document.getElementById('ctxBackdrop');
  menu.innerHTML='';
  items.forEach(it=>{
    if(it==='sep'){ const d=document.createElement('div'); d.className='ctx-sep'; menu.appendChild(d); return; }
    if(it.type==='colors'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Colour'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.className='ctx-colors';
      PALETTE.forEach(c=>{ const d=document.createElement('div'); d.className='ctx-dot'+(it.current===c?' sel':''); d.style.background=c; d.onclick=()=>{ closeCtxMenu(); it.fn(c); }; row.appendChild(d); });
      menu.appendChild(row); return;
    }
    if(it.type==='icons'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Icon'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.className='ctx-colors';
      it.icons.forEach(ic=>{
        const d=document.createElement('div');
        d.style.cssText='width:26px;height:26px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:6px;transition:background .12s;';
        d.innerHTML=ic;
        d.onmouseenter=()=>d.style.background='rgba(255,255,255,0.12)';
        d.onmouseleave=()=>d.style.background='';
        d.onclick=()=>{ closeCtxMenu(); it.fn(ic); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    if(it.type==='fonts'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Font'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.style.cssText='display:flex;flex-wrap:wrap;gap:4px;padding:2px 8px 7px;';
      it.fonts.forEach(f=>{
        const d=document.createElement('div');
        const sel=it.current===f.val;
        d.style.cssText=`font-family:${f.val};font-size:11px;padding:3px 7px;border-radius:6px;cursor:pointer;border:1px solid ${sel?'var(--purple)':'var(--b2)'};background:${sel?'rgba(124,92,252,.15)':'transparent'};color:var(--t1);white-space:nowrap;display:flex;align-items:center;justify-content:center;`;
        d.textContent=f.label;
        d.onclick=()=>{ closeCtxMenu(); it.fn(f.val); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    if(it.type==='sizes'){
      const lbl=document.createElement('div'); lbl.className='ctx-label'; lbl.textContent=it.label||'Size'; menu.appendChild(lbl);
      const row=document.createElement('div'); row.style.cssText='display:flex;gap:4px;padding:2px 8px 7px;flex-wrap:wrap;';
      it.sizes.forEach(s=>{
        const d=document.createElement('div');
        const sel=it.current===s;
        d.style.cssText=`width:32px;height:32px;border-radius:7px;cursor:pointer;border:1px solid ${sel?'var(--purple)':'var(--b2)'};background:${sel?'rgba(124,92,252,.15)':'transparent'};color:var(--t1);display:flex;align-items:center;justify-content:center;font-size:${Math.min(s,13)}px;font-weight:500;`;
        d.textContent=s;
        d.onclick=()=>{ closeCtxMenu(); it.fn(s); };
        row.appendChild(d);
      });
      menu.appendChild(row); return;
    }
    const el=document.createElement('div');
    el.className='ctx-item'+(it.danger?' danger':'');
    if(it.icon){ el.innerHTML=`<span style="display:flex;align-items:center;opacity:.7">${it.icon}</span><span>${it.label}</span>`; }
    else { el.textContent=it.label; }
    el.onclick=()=>{ closeCtxMenu(); it.fn(); };
    menu.appendChild(el);
  });
  // Position: render offscreen first to get real dimensions, then clamp
  menu.style.visibility='hidden';
  menu.style.display='block';
  back.style.display='block';
  requestAnimationFrame(()=>{
    const mw=menu.offsetWidth||200;
    const mh=menu.offsetHeight||100;
    const vw=window.innerWidth;
    const vh=window.innerHeight;
    const x=Math.min(Math.max(8, cx), vw-mw-8);
    const y=Math.min(Math.max(8, cy+8), vh-mh-8);
    menu.style.left=x+'px'; menu.style.top=y+'px';
    menu.style.visibility='visible';
  });
}
function closeCtxMenu(){
  document.getElementById('ctxMenu').style.display='none';
  document.getElementById('ctxBackdrop').style.display='none';
}

  ];

    }});

function duplicateCard(card){
  const type=card.dataset.type;
  const x=parseFloat(card.style.left)+20;
  const y=parseFloat(card.style.top)+20;
  cid++;
  const copy=document.createElement('div');
  copy.className='card'; copy.dataset.type=type;
  copy.dataset.cardId='c'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  copy.style.left=x+'px'; copy.style.top=y+'px';
  copy.style.width=card.style.width; copy.style.height=card.style.height;
  copy.style.zIndex=++ztop;
  copy.innerHTML=buildCard(type,cid);
  // copy title
  const srcTitle=card.querySelector('[data-title]')?.textContent;
  const dstTitle=copy.querySelector('[data-title]');
  if(srcTitle && dstTitle) dstTitle.textContent=srcTitle;
  // copy dot colour
  const srcDot=card.querySelector('.cbardot')?.style.background;
  if(srcDot){ const d=copy.querySelector('.cbardot'); if(d) d.style.background=srcDot; copy.querySelector('.rh').style.setProperty('--rh-color',srcDot); copy.style.setProperty('--card-color',srcDot); }
  // copy content
  restoreContent(copy, type, extractContent(card, type));
  world.appendChild(copy);
  makeDrag(copy); makeResize(copy,type); initCardTitles(copy); initDotEvents(copy);
  if(type==='todo'){ copy.querySelectorAll('.todochip').forEach(attachChipEvents); copy.querySelectorAll('.todocol').forEach(initTodoCol); fitTodoCard(copy); }
  copy.style.opacity='0'; copy.style.transform='scale(.9)';
  requestAnimationFrame(()=>{ copy.style.transition='opacity .18s,transform .18s'; copy.style.opacity='1'; copy.style.transform='scale(1)'; setTimeout(()=>copy.style.transition='',200); });
}

function _folderTouchMove(e){ _ccLpCancelIfMoved(e); }
