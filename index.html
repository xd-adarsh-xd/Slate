<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Slate</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500&family=Outfit:wght@400;600;700;800&family=Roboto:wght@400;500&family=Inter:wght@400;500&family=Lato:wght@400;700&family=Poppins:wght@400;500&family=Nunito:wght@400;500&family=Playfair+Display:wght@400;700&family=Lora:wght@400;500&family=Merriweather:wght@400;700&family=Fira+Code:wght@400;500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
:root{
  --bg:#080808;--s1:#0f0f0f;--s2:#181818;--s3:#222;
  --b1:rgba(255,255,255,0.05);--b2:rgba(255,255,255,0.10);--b3:rgba(255,255,255,0.22);
  --t1:#f0f0f0;--t2:#777;--t3:#3c3c3c;
  --purple:#7c5cfc;--pink:#fc5c8a;--green:#3ecf8e;
  --amber:#f5a623;--blue:#5c9dfc;--red:#fc5c5c;
}
@keyframes shimmer{0%{background-position:100% center}100%{background-position:-100% center}}
@keyframes glow{0%,100%{opacity:.7}50%{opacity:1}}
@keyframes fadeUp{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:translateY(0)}}
body{font-family:'DM Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--t1);height:100dvh;overflow:hidden;user-select:none;}
.screen{position:absolute;inset:0;display:none;}
#home{display:flex;flex-direction:column;background:var(--bg);}

/* HOME */
.htop{padding:18px 24px 18px;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;min-width:0;gap:8px;}
.demo-tag{font-family:'DM Sans',sans-serif;font-size:13px;font-weight:400;color:var(--t2);}
.logo,.vtag{
  font-family:'Outfit',-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;font-size:26px;font-weight:700;
  color:#fff;white-space:nowrap;line-height:1;
  animation:shimmer-fade 3s ease-in-out infinite;
}
@keyframes shimmer-fade{0%,100%{color:#666}50%{color:#fff}}
.hscroll{flex:1;overflow-y:auto;padding:0 16px 100px;}
.stag{font-size:10px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;color:var(--t3);padding:16px 8px 10px;}
.folder{background:var(--s1);border:1px solid var(--b1);border-radius:14px;overflow:hidden;margin-bottom:8px;transition:border-color .2s;}
.folder:active{border-color:var(--b2);}
.frow{padding:14px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;}
.ficon{width:28px;height:28px;border-radius:8px;display:flex;align-items:center;justify-content:center;}
.ficon svg{opacity:.55;}
.fname{font-family:'Syne',sans-serif;font-size:14px;font-weight:600;flex:1;}
.fcount{font-size:12px;color:var(--t3);}
.fchev{color:var(--t3);transition:transform .2s;}
.folder.open .fchev{transform:rotate(90deg);}
.fkids{display:none;border-top:1px solid var(--b1);}
.folder.open .fkids{display:block;}
.crow{padding:12px 16px 12px 52px;display:flex;align-items:center;gap:10px;cursor:pointer;border-bottom:1px solid var(--b1);}
.crow:last-child{border-bottom:none;}
.crow:active{background:var(--s2);}
.cdot{width:8px;height:8px;border-radius:50%;}
.cinfo{flex:1;}
.cname{font-size:14px;font-weight:500;margin-bottom:2px;}
.cmeta{font-size:11px;color:var(--t3);}
.ccard{background:var(--s1);border:1px solid var(--b1);border-radius:14px;padding:16px;display:flex;align-items:center;gap:12px;cursor:pointer;margin-bottom:8px;transition:border-color .18s,background .18s;}
.ccard:active{background:var(--s2);border-color:var(--b2);}
.ccicon{width:40px;height:40px;border-radius:12px;display:flex;align-items:center;justify-content:center;}
.ccicon svg{opacity:.6;}
.ccinfo{flex:1;}
.ccname{font-family:'Outfit',sans-serif;font-size:15px;font-weight:600;margin-bottom:3px;}
.ccmeta{font-size:12px;color:var(--t3);}
.fab{position:absolute;bottom:24px;right:24px;width:56px;height:56px;border-radius:18px;
  background:var(--s2);border:1px solid var(--b3);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 28px rgba(255,255,255,.05),0 8px 24px rgba(0,0,0,.7);
  cursor:pointer;z-index:50;transition:transform .15s,box-shadow .15s;}
.fab:active{transform:scale(.91);}

/* CANVAS */
#canvas{flex-direction:column;background:#090909;}
.ctop{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:12px;z-index:10;}
.backbtn{width:32px;height:32px;border-radius:10px;background:var(--s2);border:1px solid var(--b1);color:var(--t1);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s;}
.backbtn:active{background:var(--s3);}
.ctoptitle{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;flex:1;}
#vp{position:absolute;top:56px;left:0;right:0;bottom:76px;overflow:hidden;touch-action:none;
  background-color:#090909;
  background-image:radial-gradient(circle,rgba(255,255,255,0.12) 1px,transparent 1px);
  background-size:36px 36px;will-change:transform;}
#vpGrid{display:none;}
#world{position:absolute;top:0;left:0;width:0;height:0;transform-origin:0 0;will-change:transform;}
/* Culled cards — content-visibility:hidden skips layout+paint+composite entirely */
.card.culled{content-visibility:hidden;}

/* CARDS */
.card{position:absolute;border:1px solid var(--b2);border-radius:16px;
  box-shadow:0 2px 12px rgba(0,0,0,.45);touch-action:none;background:var(--s1);overflow:visible;
  transition:box-shadow .2s;}
.card.focus{box-shadow:0 0 0 1.5px var(--card-color,rgba(255,255,255,.35)),0 4px 20px rgba(0,0,0,.7);}
.clip{position:absolute;inset:0;border-radius:16px;overflow:hidden;display:flex;flex-direction:column;}

/* Per-type min sizes */
.card[data-type="note"] {width:230px;height:170px;min-width:230px;min-height:170px;}
.card[data-type="todo"] {width:370px;height:240px;}.card[data-type="link"] {width:320px;height:280px;min-width:260px;min-height:200px;}
.card[data-type="music"]{width:260px;height:260px;min-width:260px;min-height:260px;}
.card[data-type="image"]{width:260px;height:260px;min-width:260px;min-height:260px;}
.card[data-type="video"]{width:260px;height:260px;min-width:260px;min-height:260px;}
.card[data-type="countdown"]{width:240px;height:220px;min-width:220px;min-height:200px;}
.card[data-type="gallery"]{width:260px;height:220px;min-width:220px;min-height:220px;}
.card[data-type="code"]{width:320px;height:260px;min-width:260px;min-height:180px;}
.card[data-type="draw"]{width:340px;height:340px;min-width:340px;min-height:340px;}
.card[data-type="sheet"]{width:380px;height:260px;min-width:280px;min-height:160px;}

.cbar{height:36px;flex-shrink:0;display:flex;align-items:center;padding:0 10px;gap:8px;
  border-bottom:1px solid var(--b1);background:linear-gradient(180deg,var(--s2),var(--s1));
  border-radius:16px 16px 0 0;cursor:grab;}
.cbar:active{cursor:grabbing;}
/* Flipped titlebar: dot moves to right, X moves to left */
.cbar.flipped .cbardot{order:3;}
.cbar.flipped .cbar-mid{order:2;}
.cbar.flipped .cbarx{order:1;}
.cbar.flipped .cbar-addcol{order:0;}
.cbardot{width:7px;height:7px;border-radius:50%;filter:brightness(1.3);}
.cbarlbl{font-size:11px;font-weight:500;color:var(--t2);font-family:'Syne',sans-serif;text-align:center;outline:none;background:transparent;white-space:nowrap;cursor:pointer;border-radius:6px;padding:2px 6px;max-width:calc(100% - 60px);}
.cbarlbl[contenteditable="true"]{cursor:text;color:var(--t1);background:rgba(255,255,255,0.07);}
.cbar-mid{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.cbarx{width:20px;height:20px;border-radius:6px;border:none;background:transparent;color:var(--t3);
  display:flex;align-items:center;justify-content:center;font-size:13px;cursor:pointer;transition:color .15s;}
.cbarx:active{background:rgba(252,92,92,.15);color:var(--red);}
.cbody{flex:1;padding:12px;overflow:auto;}

/* Note */
.cbody textarea{width:100%;height:100%;background:transparent;border:none;outline:none;
  color:var(--t1);font-family:var(--note-font,'DM Sans',sans-serif);font-size:var(--note-size,14px);line-height:1.6;
  resize:none;caret-color:var(--card-color,var(--purple));overflow-y:auto;overflow-x:hidden;
  touch-action:none;box-sizing:border-box;padding-right:8px;}
.cbody textarea::-webkit-scrollbar{width:6px;pointer-events:none;}
.cbody textarea::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;pointer-events:none;}
.cbody textarea::-webkit-scrollbar-track{background:transparent;pointer-events:none;}

/* Todo */
.todocols{display:flex;gap:8px;padding:10px;overflow-x:auto;height:100%;}
.todocol{flex:1;min-width:100px;background:rgba(255,255,255,.03);border:1px solid var(--b1);border-radius:10px;padding:0;display:flex;flex-direction:column;flex-shrink:0;}
.todocolbar{display:flex;align-items:center;padding:6px 8px 4px;gap:4px;flex-shrink:0;cursor:grab;}
.todocolbar:active{cursor:grabbing;}
.todocolbar-mid{flex:1;display:flex;justify-content:center;align-items:center;overflow:hidden;}
.todocolh{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2);outline:none;background:transparent;border:none;cursor:pointer;font-family:'DM Sans',sans-serif;white-space:nowrap;border-radius:4px;padding:1px 4px;}
.todocolh[contenteditable="true"]{color:var(--t1);background:rgba(255,255,255,.06);cursor:text;}
.todocolx{width:16px;height:16px;border:none;background:transparent;color:var(--t3);font-size:11px;cursor:pointer;display:flex;align-items:center;justify-content:center;border-radius:4px;flex-shrink:0;}
.todocolx:active{background:rgba(252,92,92,.15);color:var(--red);}
.todochips{flex:1;overflow-y:auto;padding:0 6px;}
.todochip{background:rgba(255,255,255,.04);border-radius:8px;padding:7px 8px;margin-bottom:5px;font-size:12px;border-left:3px solid var(--t3);cursor:pointer;word-break:break-word;position:relative;user-select:none;}
.todochip:active{opacity:.7;}
.todoadd{font-size:11px;color:var(--t3);padding:4px 8px 8px;cursor:pointer;flex-shrink:0;}
.todoadd:active{color:var(--t2);}

/* Chip context menu */
.chipmenu{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:12px;
  padding:6px;z-index:1000;min-width:160px;box-shadow:0 8px 40px rgba(0,0,0,.8);}
.chipmenu-colors{display:flex;gap:6px;padding:6px 8px 8px;border-bottom:1px solid var(--b1);margin-bottom:4px;flex-wrap:wrap;}
.chipcolor{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;}
.chipcolor.active{border-color:#fff;}
.chipmenu-item{padding:8px 12px;font-size:12px;border-radius:8px;cursor:pointer;display:flex;align-items:center;gap:8px;color:var(--t1);}
.chipmenu-item:active{background:var(--s3);}
.chipmenu-item.danger{color:var(--red);}

/* Add column button */
.cbar-addcol{width:20px;height:20px;border-radius:6px;border:none;background:transparent;color:var(--t3);display:flex;align-items:center;justify-content:center;font-size:15px;cursor:pointer;margin-right:2px;transition:color .15s;}
.cbar-addcol:active{color:var(--t1);}

/* Media */
.media-wrap{flex:1;overflow:hidden;background:var(--s1);display:flex;flex-direction:column;align-items:stretch;position:relative;}
.media-wrap img,.media-wrap video{width:100%;height:100%;object-fit:contain;display:block;}
.media-placeholder{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);padding:12px;width:100%;box-sizing:border-box;}
.media-placeholder svg{opacity:.35;}
.media-placeholder span{font-size:13px;}
.upload-btn{background:var(--s3);border:1px solid var(--b2);border-radius:10px;padding:8px 16px;color:var(--t2);font-size:12px;cursor:pointer;font-family:'DM Sans',sans-serif;}
.upload-btn:active{opacity:.7;}

/* Link / Embed */
.link-wrap{display:flex;flex-direction:column;height:100%;}
.link-input-row{display:flex;gap:6px;padding:10px;flex-shrink:0;}
.link-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;color:var(--t1);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;transition:border-color .2s;}
.link-inp:focus{border-color:var(--b3);}
.link-go{background:var(--card-color,#555);border:none;border-radius:8px;padding:7px 12px;color:var(--load-btn-text,#fff);font-size:12px;cursor:pointer;}
.link-preview{flex:1;display:flex;flex-direction:column;border-top:1px solid var(--b1);overflow:hidden;position:relative;}
.link-iframe{width:100%;height:100%;border:none;background:var(--s2);display:block;}
.link-blocked{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:16px;text-align:center;}
.link-blocked-domain{font-size:11px;color:var(--t3);letter-spacing:.05em;}
.link-blocked-msg{font-size:12px;color:var(--t2);line-height:1.5;}
.link-open-btn{background:var(--purple);border:none;border-radius:8px;padding:8px 16px;color:#fff;font-size:12px;cursor:pointer;margin-top:4px;}
.link-empty{flex:1;display:flex;align-items:center;justify-content:center;color:var(--t3);font-size:12px;flex-direction:column;gap:6px;}

/* Music */
.music-add-area{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:var(--t3);padding:12px;}
.music-add-area svg{opacity:.4;}
.music-add-area span{font-size:12px;}
.music-or{font-size:11px;color:var(--t3);}
.music-url-row{display:flex;flex-direction:column;gap:6px;width:100%;}
.music-url-inp{background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:8px 10px;color:var(--t1);font-size:12px;font-family:'DM Sans',sans-serif;outline:none;width:100%;transition:border-color .2s;}
.music-url-inp:focus{border-color:var(--b3);}
.music-url-go{background:var(--card-color,#555);border:none;border-radius:8px;padding:8px;color:var(--load-btn-text,#fff);font-size:12px;cursor:pointer;width:100%;}
.music-player{flex:1;display:flex;flex-direction:column;gap:12px;padding:12px;justify-content:center;}
.musrow{display:flex;gap:10px;align-items:center;}
.musart{width:40px;height:40px;border-radius:10px;background:var(--s3);border:1px solid var(--b2);display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.musart svg{opacity:.5;}
.must{font-size:13px;font-weight:500;margin-bottom:2px;}
.musa{font-size:11px;color:var(--t3);}
.musprog-wrap{display:flex;align-items:center;gap:6px;}
.mustime{font-size:10px;color:var(--t3);white-space:nowrap;}
.musprog{flex:1;height:3px;background:var(--s3);border-radius:2px;cursor:pointer;}
.musfill{height:100%;border-radius:2px;background:linear-gradient(90deg,#555,#ccc);transition:width .4s linear;}
.musbtns{display:flex;align-items:center;justify-content:center;gap:14px;}
.mbtn{width:28px;height:28px;border-radius:50%;border:none;background:transparent;color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.mplay{background:var(--s3);border:1px solid var(--b3);color:var(--t1);width:36px;height:36px;border-radius:50%;}

/* Resize handle */
/* Global resize handle - single element positioned over focused card */

/* Resize handle */
.rh{position:absolute;bottom:-13px;right:-13px;width:26px;height:26px;cursor:se-resize;touch-action:none;z-index:100;display:flex;align-items:flex-end;justify-content:flex-end;padding:4px;opacity:0;pointer-events:none;transition:opacity .2s;}
.rh::after{content:'';display:block;width:13px;height:13px;border-right:2.5px solid var(--card-color,rgba(255,255,255,.8));border-bottom:2.5px solid var(--card-color,rgba(255,255,255,.8));border-radius:0 0 4px 0;}
.card.focus .rh{opacity:1;pointer-events:all;}
body.ms-mode .card .rh{opacity:0!important;pointer-events:none!important;}
/* Block iframe from stealing pointer events over rh corner area */
.card.focus .link-preview::after{content:'';position:absolute;bottom:0;right:0;width:32px;height:32px;z-index:50;}

/* Toolbar */
.ctool{position:absolute;bottom:0;left:0;right:0;height:152px;background:rgba(8,8,8,.98);border-top:1px solid var(--b1);transform:translateY(76px);transition:transform .25s cubic-bezier(.32,.72,0,1);}
#canvas{overflow:hidden;}
.ctool-row{width:100%;height:76px;display:flex;align-items:center;justify-content:space-around;padding:0 8px;}
.tool{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;padding:8px 10px;border-radius:14px;border:none;background:transparent;cursor:pointer;transform-origin:center center;will-change:transform;}
.tool:active{transform:scale(.88);}
.ticon{width:34px;height:34px;border-radius:10px;display:flex;align-items:center;justify-content:center;}
.ticon svg{opacity:.65;}
.tlbl{font-size:9px;font-weight:500;letter-spacing:.04em;text-transform:uppercase;color:var(--t3);}

/* Modal */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(6px);display:flex;align-items:flex-end;z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
.overlay.show{opacity:1;pointer-events:all;}
.sheet{width:100%;background:var(--s1);border-radius:24px 24px 0 0;border:1px solid var(--b2);border-bottom:none;padding:20px 24px 44px;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,.72,0,1);}
.overlay.show .sheet{transform:translateY(0);}
.shandle{width:36px;height:4px;background:var(--b2);border-radius:2px;margin:0 auto 20px;}
.stitle{font-family:'Syne',sans-serif;font-size:18px;font-weight:700;margin-bottom:16px;}
.sinput{width:100%;background:var(--s2);border:1px solid var(--b2);border-radius:12px;padding:14px 16px;color:var(--t1);font-family:'DM Sans',sans-serif;font-size:15px;outline:none;margin-bottom:16px;transition:border-color .2s;}
.sinput:focus{border-color:var(--b3);}
.sbtn{width:100%;padding:16px;background:var(--s3);border:1px solid var(--b3);border-radius:14px;color:var(--t1);font-family:'Syne',sans-serif;font-size:15px;font-weight:700;cursor:pointer;transition:background .15s;}
.sbtn:active{background:var(--b2);}

/* FAB menu */
.fab-backdrop{position:fixed;inset:0;z-index:48;}
.fab-menu{position:absolute;bottom:90px;right:20px;display:flex;flex-direction:column;gap:10px;z-index:49;align-items:flex-end;}
.fab-opt{display:flex;align-items:center;gap:10px;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:10px 16px;color:var(--t1);font-size:14px;font-family:'DM Sans',sans-serif;cursor:pointer;white-space:nowrap;box-shadow:0 4px 20px rgba(0,0,0,.6);transition:background .15s;}
.fab-opt-icon{display:flex;align-items:center;justify-content:center;width:20px;height:20px;}
.fab-opt-icon svg{opacity:.7;}
.fab-opt:active{background:var(--s3);}
.fab.open{transform:rotate(45deg);}

/* Context menu */
.ctx-menu{position:fixed;background:var(--s2);border:1px solid var(--b2);border-radius:14px;padding:4px;z-index:200;width:210px;max-height:calc(100vh - 16px);overflow-y:auto;box-shadow:0 12px 48px rgba(0,0,0,.9);isolation:isolate;}
.ctx-menu::-webkit-scrollbar{width:3px;}
.ctx-menu::-webkit-scrollbar-thumb{background:var(--b3);border-radius:2px;}
.ctx-menu::-webkit-scrollbar-track{background:transparent;margin:14px;}
.ctx-backdrop{position:fixed;inset:0;z-index:199;}
.ctx-item{padding:9px 12px;font-size:12.5px;border-radius:9px;cursor:pointer;display:flex;align-items:center;gap:9px;color:var(--t1);transition:background .15s;}
.ctx-item:active{background:var(--s3);}
.ctx-item.danger{color:var(--red);}
.ctx-sep{height:1px;background:var(--b1);margin:3px 0;}
.ctx-colors{display:flex;gap:5px;padding:4px 8px 3px;flex-wrap:wrap;}
.ctx-dot{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;flex-shrink:0;}
.ctx-dot.sel{border-color:#fff;}
.ctx-label{font-size:9px;color:var(--t3);padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.08em;text-align:center;width:100%;}
/* Ctop buttons */
.undobtn{width:32px;height:32px;border-radius:9px;border:none;background:transparent;color:var(--t2);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:background .15s,color .15s;flex-shrink:0;}
.undobtn:active{background:var(--s2);}
.undobtn.on{color:rgba(220,220,220,0.9);}
.undobtn.disabled{opacity:.3;pointer-events:none;}
.ctoptitle{font-family:'Outfit',sans-serif;font-size:15px;font-weight:700;flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;cursor:pointer;}
/* Search bar */
.search-bar{position:absolute;top:56px;left:0;right:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);padding:8px 12px;display:none;align-items:center;gap:6px;z-index:9;}
.search-bar.show{display:flex;}
.search-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:8px;padding:7px 10px;color:var(--t1);font-size:13px;outline:none;}
.search-inp:focus{border-color:rgba(220,220,220,0.6);}
.search-highlight{animation:searchPulse .6s ease 3;}
@keyframes searchPulse{0%,100%{box-shadow:0 0 0 2px rgba(220,220,220,0.7)}50%{box-shadow:0 0 0 4px rgba(220,220,220,0.7)}}
/* MS pill popup */
#msPill{position:absolute;bottom:88px;left:50%;transform:translateX(-50%) scale(0.96);
  background:var(--s2);border:1px solid var(--b3);border-radius:999px;
  padding:8px 14px 8px 16px;display:none;align-items:center;gap:10px;
  z-index:30;box-shadow:0 4px 24px rgba(0,0,0,.7);white-space:nowrap;
  opacity:0;transition:opacity .18s ease,transform .18s ease,bottom .25s cubic-bezier(.32,.72,0,1);will-change:opacity,transform;}
#msPill.show{display:flex;opacity:1;transform:translateX(-50%) scale(1);}
#msPillText{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--t1);}
#msPillCount{font-family:'Outfit',sans-serif;font-size:13px;font-weight:700;color:rgba(255,255,255,0.9);}
#msPillClose{width:22px;height:22px;border-radius:50%;border:none;background:rgba(255,255,255,0.1);
  color:var(--t2);font-size:13px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s,color .15s;}
#msPillClose:active{background:rgba(252,92,92,.2);color:var(--red);}
/* MS selected card outline */
.card.ms-sel{box-shadow:0 0 0 2px rgba(240,240,240,0.85),0 8px 48px rgba(0,0,0,.8);}
/* Pin badge */
.pin-badge{position:absolute;top:-4px;right:-4px;width:14px;height:14px;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;}
/* Card lock icon */
.card-lock-icon{position:absolute;top:8px;right:8px;opacity:0;pointer-events:none;color:var(--t2);}
.card.locked .card-lock-icon{opacity:1;}
.card.locked .cbody{pointer-events:none;}
/* Snap indicator */
#snapIndicator{position:absolute;bottom:84px;right:12px;background:rgba(220,220,220,0.15);border:1px solid rgba(220,220,220,0.2);border-radius:8px;padding:4px 8px;font-size:11px;color:rgba(220,220,220,0.7);pointer-events:none;opacity:0;transition:opacity .3s;}
#snapIndicator.show{opacity:1;}

/* Minimap */
#minimap{
  position:absolute;bottom:88px;left:12px;
  background:rgba(8,8,8,.88);
  border:1px solid var(--b2);
  border-radius:14px;
  overflow:hidden;
  z-index:25;
  box-shadow:0 4px 24px rgba(0,0,0,.7);
  cursor:crosshair;
  display:none;
  opacity:0;
  transition:opacity .18s ease, transform .18s ease, bottom .25s cubic-bezier(.32,.72,0,1);
  will-change:opacity,transform;
  transform:scale(0.96);
  -webkit-backdrop-filter:blur(8px);
  backdrop-filter:blur(8px);
}
#minimap.show{display:block;opacity:1;transform:scale(1);}
#minimap.panning{opacity:.5;}
#minimapCanvas{position:absolute;inset:0;width:100%;height:100%;}
#minimapBtn.on{color:rgba(220,220,220,.9);}
#lagWarn{display:none;} /* retired */
/* Lag warning popup */
#lagPopup{position:absolute;bottom:88px;left:50%;transform:translateX(-50%) scale(0.96);
  background:var(--s2);border:1px solid var(--amber);border-radius:16px;
  padding:14px 16px 14px 18px;display:none;align-items:center;gap:14px;
  z-index:30;box-shadow:0 4px 24px rgba(0,0,0,.7);width:min(340px,88vw);
  opacity:0;transition:opacity .18s ease,transform .18s ease;will-change:opacity,transform;}
#lagPopup.show{display:flex;opacity:1;transform:translateX(-50%) scale(1);}
#lagPopupText{font-family:'DM Sans',sans-serif;font-size:13px;color:var(--amber);flex:1;line-height:1.55;}
#lagPopupClose{width:28px;height:28px;border-radius:8px;border:none;background:rgba(255,255,255,0.08);
  color:var(--t2);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:background .15s;}
#lagPopupClose:active{background:rgba(255,255,255,0.18);}
/* Snap indicator */
.qcard-header{display:flex;align-items:center;padding:12px 14px 8px;gap:10px;}
.qcard-icon{width:32px;height:32px;border-radius:9px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
.qcard-title{font-size:14px;font-weight:600;color:var(--t1);flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;font-family:'Outfit',sans-serif;}
.qcard-meta{font-size:11px;color:var(--t3);}
.qcard-preview{padding:0 14px 12px;font-size:12px;color:var(--t2);line-height:1.5;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;}
.qcard-media{width:100%;max-height:200px;object-fit:cover;display:block;}
.qcard-audio{padding:12px 14px 14px;display:flex;align-items:center;gap:12px;}
.qaudio-btn{width:40px;height:40px;border-radius:50%;background:var(--amber);border:none;display:flex;align-items:center;justify-content:center;flex-shrink:0;cursor:pointer;}
.qaudio-info{flex:1;min-width:0;}
.qaudio-name{font-size:13px;font-weight:500;color:var(--t1);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-family:'Outfit',sans-serif;}
.qaudio-progress{width:100%;height:4px;background:var(--b2);border-radius:4px;margin-top:8px;cursor:pointer;}
.qaudio-fill{height:100%;background:rgba(220,220,220,0.7);border-radius:4px;pointer-events:none;}
.qaudio-time{font-size:10px;color:var(--t3);margin-top:4px;}
.qtodo-preview{padding:0 14px 12px;display:flex;flex-direction:column;gap:4px;}
.qtodo-row{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--t2);}
.qtodo-check{width:14px;height:14px;border-radius:4px;border:1.5px solid var(--t3);flex-shrink:0;display:flex;align-items:center;justify-content:center;}
.qtodo-check.done{background:var(--green);border-color:var(--green);}
.qtodo-check.done::after{content:'';width:6px;height:4px;border-left:1.5px solid white;border-bottom:1.5px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
/* Home drag handle */
.home-drag-handle{width:32px;flex-shrink:0;display:flex;align-items:center;justify-content:center;align-self:stretch;cursor:grab;touch-action:none;color:var(--t3);}
/* Quick Note editor */
#quickNoteEditor{background:var(--bg);flex-direction:column;}
.qne-top{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;}
.qne-toolbar{display:flex;align-items:center;padding:8px 12px;gap:6px;border-bottom:1px solid var(--b1);}
.qne-btn{width:32px;height:32px;border-radius:8px;border:none;background:transparent;color:var(--t2);font-size:14px;font-weight:700;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .15s,color .15s;user-select:none;-webkit-user-select:none;}
.qne-btn.active{background:rgba(220,220,220,0.15);color:rgba(220,220,220,0.9);}
.qne-title{width:100%;padding:12px 16px 4px;font-size:18px;font-weight:700;color:var(--t1);background:transparent;border:none;outline:none;font-family:'Outfit',sans-serif;}
.qne-title::placeholder{color:var(--t3);}
.qne-body{flex:1;padding:8px 16px 16px;overflow-y:auto;}
.qne-content{min-height:200px;outline:none;font-size:14px;color:var(--t1);line-height:1.7;font-family:'DM Sans',sans-serif;}
.qne-content:empty::before{content:attr(data-placeholder);color:var(--t3);}
.qne-content ul{padding-left:20px;list-style:disc;}
.qne-content ol{padding-left:20px;list-style:decimal;}
/* Quick Todo editor */
#quickTodoEditor{background:var(--bg);flex-direction:column;}
.qte-top{height:56px;flex-shrink:0;background:rgba(8,8,8,.98);border-bottom:1px solid var(--b1);display:flex;align-items:center;padding:0 16px;gap:10px;}
.qte-title{flex:1;font-size:16px;font-weight:700;font-family:'Outfit',sans-serif;color:var(--t1);background:transparent;border:none;outline:none;}
.qte-list{flex:1;overflow-y:auto;padding:12px 16px;}
.qte-item{display:flex;align-items:flex-start;gap:12px;padding:10px 0;border-bottom:1px solid var(--b1);}
.qte-cb{width:22px;height:22px;border-radius:6px;border:2px solid var(--t3);flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;}
.qte-cb.done{background:var(--green);border-color:var(--green);}
.qte-cb.done::after{content:'';width:10px;height:6px;border-left:2px solid white;border-bottom:2px solid white;transform:rotate(-45deg) translateY(-1px);display:block;}
.qte-text{flex:1;font-size:14px;color:var(--t1);line-height:1.5;outline:none;word-break:break-word;}
.qte-text.done{text-decoration:line-through;color:var(--t3);}
.qte-del{width:28px;height:28px;border-radius:8px;border:none;background:transparent;color:var(--t3);font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.qte-add{padding:12px 16px;display:flex;gap:8px;border-top:1px solid var(--b1);}
.qte-add-inp{flex:1;background:var(--s2);border:1px solid var(--b2);border-radius:10px;padding:10px 14px;color:var(--t1);font-size:14px;outline:none;}
.qte-add-btn{width:40px;height:40px;border-radius:10px;background:var(--purple);border:none;color:white;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
/* Media upload modal */
#mediaUploadOverlay{position:fixed;inset:0;z-index:500;background:rgba(0,0,0,.8);backdrop-filter:blur(8px);display:none;align-items:center;justify-content:center;padding:20px;}
/* Note content editable */
.note-content{width:100%;height:100%;background:transparent;border:none;outline:none;font-size:var(--note-size,14px);font-family:var(--note-font,'DM Sans',sans-serif);color:var(--t1);line-height:1.6;overflow-y:auto;word-break:break-word;padding:0 8px 0 0;-webkit-user-select:text;user-select:text;}
.note-content[contenteditable="false"]{cursor:default;touch-action:none;user-select:none;-webkit-user-select:none;}
.note-content[contenteditable="true"]{cursor:text;}
.note-content:empty::before{content:attr(data-placeholder);color:var(--t3);pointer-events:none;}
.note-content ul{padding-left:18px;list-style:disc;}
.note-content ol{padding-left:18px;list-style:decimal;}
/* Scrollbar for note-content in card */
.cbody .note-content::-webkit-scrollbar{width:6px;}
.cbody .note-content::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
.cbody .note-content::-webkit-scrollbar-track{background:transparent;}
/* Connections */
#connSvg{pointer-events:none;}
.ctx-dot.sel{border-color:#fff;}
.ctx-label{font-size:9px;color:var(--t3);padding:6px 10px 4px;text-transform:uppercase;letter-spacing:.08em;text-align:center;width:100%;}

/* Home empty */
.home-empty{text-align:center;padding:60px 24px;color:var(--t2);animation:fadeUp .4s ease;}

/* Credit tag */
#creditTag{position:absolute;bottom:8px;left:0;right:0;text-align:center;font-size:9px;color:var(--t3);pointer-events:none;z-index:1;line-height:1.6;}

/* Ribbons */
.ribbon-hit{fill:none;stroke:transparent;stroke-width:22px;cursor:pointer;pointer-events:stroke;}
.ribbon-vis,.ribbon-vis2{fill:none;stroke-linecap:round;stroke-linejoin:round;stroke-width:3px;pointer-events:none;}
.ribbon-g{pointer-events:painted;}
.cbardot{cursor:crosshair;}
/* Dot pulse while ribbon drag active */
.dot-target{animation:dotPulse .7s ease-in-out infinite;}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1;transform:scale(1.4);}}
.media-wrap.drag-over,.music-add-area.drag-over{outline:2px dashed rgba(255,255,255,0.5);outline-offset:-2px;background:rgba(255,255,255,0.05);}
::-webkit-scrollbar{width:0;height:0;}
input[type=file]{display:none;}

/* ── Countdown Card ── */
.countdown-wrap{flex:1;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
.countdown-tabs{display:flex;background:var(--s2);margin:8px 10px 0;border-radius:9px;padding:2px;flex-shrink:0;}
.countdown-tab{flex:1;padding:6px 0;text-align:center;font-size:11px;font-weight:600;font-family:'Outfit',sans-serif;color:var(--t3);border-radius:7px;cursor:pointer;transition:background .15s,color .15s;border:none;background:transparent;white-space:nowrap;}
.countdown-tab.active{background:var(--s3);color:var(--t1);}
.countdown-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;padding:10px 14px 14px;min-height:0;}
.countdown-clock{display:flex;flex-direction:column;align-items:center;gap:4px;width:100%;}
.countdown-display{font-family:'Outfit',sans-serif;font-size:clamp(20px,7vw,48px);font-weight:700;color:var(--t1);letter-spacing:.05em;text-align:center;line-height:1;width:100%;}
.countdown-sub{font-size:11px;font-weight:500;color:rgba(255,255,255,.45);text-transform:uppercase;letter-spacing:.12em;text-align:center;}
.countdown-btns{display:flex;gap:7px;width:100%;}
.countdown-btn{flex:1;padding:8px 0;border-radius:9px;border:1px solid var(--b2);background:var(--s2);color:var(--t1);font-size:12px;font-weight:600;cursor:pointer;font-family:'DM Sans',sans-serif;transition:background .15s,transform .1s;text-align:center;}
.countdown-btn:active{transform:scale(.95);}
.countdown-btn.primary{background:var(--card-color,rgba(124,92,252,.9));border-color:transparent;color:#fff;}
.countdown-set{display:flex;flex-direction:column;gap:7px;width:100%;}
/* Drum picker */
.cd-picker{position:relative;width:100%;background:var(--s2);border-radius:10px;overflow:hidden;border:1px solid var(--b2);}
.cd-picker-row{display:flex;align-items:center;justify-content:center;gap:0;height:96px;position:relative;}
.cd-picker-time{height:72px;border-top:1px solid var(--b1);}
.cd-drum-sep{color:var(--t3);font-size:14px;font-weight:600;font-family:'Outfit',sans-serif;padding:0 1px;flex-shrink:0;pointer-events:none;}
.cd-drum-wrap{flex:1;height:100%;overflow:hidden;position:relative;cursor:ns-resize;}
.cd-drum-wrap-yr{flex:1.4;}
.cd-drum{display:flex;flex-direction:column;align-items:center;will-change:transform;user-select:none;-webkit-user-select:none;}
.cd-drum-item{height:32px;display:flex;align-items:center;justify-content:center;font-size:13px;font-family:'Outfit',sans-serif;font-weight:500;color:var(--t2);width:100%;transition:color .1s,font-size .1s;flex-shrink:0;}
.cd-drum-item.sel{color:var(--t1);font-size:15px;font-weight:700;}
.cd-picker-sel-line{position:absolute;left:0;right:0;top:50%;margin-top:-16px;height:32px;pointer-events:none;border-top:1px solid var(--b3);border-bottom:1px solid var(--b3);}
.cd-picker-time .cd-picker-sel-line{top:50%;margin-top:-16px;}
/* Code lang picker */
.code-lang-btn{background:transparent;border:none;color:var(--t2);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;cursor:pointer;flex:1;text-align:left;padding:0;display:flex;align-items:center;justify-content:space-between;gap:4px;}
.code-lang-btn::after{content:'';display:inline-block;width:0;height:0;border-left:4px solid transparent;border-right:4px solid transparent;border-top:4px solid var(--t3);flex-shrink:0;margin-right:2px;}
.code-lang-dropdown{position:absolute;top:100%;left:0;right:0;background:var(--s3);border:1px solid var(--b2);border-radius:0 0 10px 10px;z-index:200;display:none;flex-direction:column;max-height:180px;overflow:hidden;}
.code-lang-dropdown.open{display:flex;}
.code-lang-search{background:var(--s2);border:none;border-bottom:1px solid var(--b1);color:var(--t1);font-size:11px;font-family:'DM Sans',sans-serif;outline:none;padding:6px 8px;width:100%;box-sizing:border-box;}
.code-lang-list{overflow-y:auto;flex:1;}
.code-lang-list::-webkit-scrollbar{width:3px;}
.code-lang-list::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.code-lang-opt{padding:5px 10px;font-size:11px;font-family:'DM Sans',sans-serif;color:var(--t2);cursor:pointer;}
.code-lang-opt:hover,.code-lang-opt.sel{background:var(--s2);color:var(--t1);}
/* ── Gallery Card ── */
.gallery-wrap{flex:1;overflow-y:auto;overflow-x:hidden;padding:6px;display:flex;flex-direction:column;min-height:0;}
.gallery-wrap::-webkit-scrollbar{width:4px;}
.gallery-wrap::-webkit-scrollbar-thumb{background:var(--b2);border-radius:2px;}
.gallery-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;width:100%;}
.gallery-item{position:relative;border-radius:6px;overflow:hidden;aspect-ratio:1;background:var(--s2);cursor:pointer;}
.gallery-item img,.gallery-item video{width:100%;height:100%;object-fit:cover;display:block;pointer-events:none;}
.gallery-add{border-radius:6px;background:var(--s2);border:1px dashed var(--b2);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;cursor:pointer;color:var(--t3);font-size:10px;transition:background .15s;aspect-ratio:1;}
.gallery-add.solo{aspect-ratio:unset;flex:1;}
.gallery-add:active{background:var(--s3);}
.gallery-add.hidden{display:none;}
/* Gallery lightbox */
#galleryLightbox{position:fixed;inset:0;z-index:3000;background:rgba(0,0,0,.95);display:none;flex-direction:column;align-items:center;justify-content:flex-start;padding:0;overflow:hidden;}
#galleryLightbox.open{display:flex;}
.glb-header{width:100%;display:flex;align-items:center;justify-content:space-between;padding:16px 20px 10px;flex-shrink:0;}
.glb-title{font-family:'Syne',sans-serif;font-size:16px;font-weight:700;color:#f0f0f0;}
.glb-close-btn{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.08);border:none;color:#888;font-size:18px;cursor:pointer;display:flex;align-items:center;justify-content:center;}
.glb-crop-area{flex:1;position:relative;width:100%;overflow:hidden;display:flex;align-items:center;justify-content:center;min-height:0;}
.glb-img-layer{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;touch-action:none;}
.glb-img-layer img,.glb-img-layer video{position:absolute;transform-origin:0 0;}
.glb-square-box{position:absolute;border:2px solid rgba(255,255,255,.9);box-shadow:0 0 0 9999px rgba(0,0,0,.55);pointer-events:none;box-sizing:border-box;}
.glb-square-box::before,.glb-square-box::after{content:'';position:absolute;background:rgba(255,255,255,.7);}
.glb-square-box::before{left:33.3%;top:0;width:1px;height:100%;}
.glb-square-box::after{top:33.3%;left:0;height:1px;width:100%;}
.glb-box-line2{position:absolute;left:66.6%;top:0;width:1px;height:100%;background:rgba(255,255,255,.7);pointer-events:none;}
.glb-box-line3{position:absolute;top:66.6%;left:0;height:1px;width:100%;background:rgba(255,255,255,.7);pointer-events:none;}
.glb-footer{width:100%;display:flex;gap:10px;padding:12px 20px 20px;flex-shrink:0;}
.glb-btn{flex:1;padding:13px;border-radius:12px;border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;}
.glb-btn-del{background:rgba(252,92,92,.15);color:#fc5c5c;border:1px solid rgba(252,92,92,.3);}
.glb-btn-rep{background:rgba(255,255,255,.08);color:#ddd;border:1px solid rgba(255,255,255,.12);}
.glb-btn-save{background:rgba(255,255,255,.9);color:#111;}
/* ── Code Card ── */
.code-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;}
.code-lang-bar{display:flex;align-items:center;gap:6px;padding:4px 8px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s2);}
.code-body{flex:1;position:relative;overflow:hidden;}
.code-textarea{position:absolute;inset:0;background:transparent;border:none;outline:none;color:transparent;caret-color:var(--t1);font-family:var(--code-font,'Fira Code',monospace);font-size:var(--code-size,13px);padding:10px;resize:none;width:100%;height:100%;box-sizing:border-box;z-index:2;-webkit-user-select:text;user-select:text;white-space:pre;overflow:auto;tab-size:2;}
.code-highlight{position:absolute;inset:0;overflow:hidden;pointer-events:none;z-index:1;}
.code-highlight pre{margin:0;padding:10px;font-family:var(--code-font,'Fira Code',monospace);font-size:var(--code-size,13px);background:transparent!important;white-space:pre;overflow:hidden;}
.code-highlight pre code{background:transparent!important;padding:0;border-radius:0;}
/* ── Draw Card ── */
.draw-wrap{flex:1;display:flex;flex-direction:column;overflow:hidden;background:#0a0a0a;}
.draw-toolbar{display:flex;align-items:center;gap:3px;padding:4px 7px;border-bottom:1px solid var(--b1);flex-shrink:0;background:var(--s2);}
.draw-tool-btn{width:26px;height:26px;border-radius:7px;border:none;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background .12s;flex-shrink:0;}
.draw-tool-btn:active,.draw-tool-btn.active{background:rgba(255,255,255,.14);}
.draw-tool-btn svg{opacity:.5;stroke:white;}
.draw-tool-btn.active svg{opacity:1;}
.draw-divider{width:1px;height:14px;background:var(--b2);margin:0 2px;flex-shrink:0;}
.draw-size-btn{width:22px;height:22px;border-radius:6px;border:1px solid transparent;background:transparent;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:border-color .12s,background .12s;}
.draw-size-btn.active{border-color:rgba(255,255,255,.35);background:rgba(255,255,255,.08);}
.draw-size-dot{border-radius:50%;background:white;}
.draw-colors{display:flex;gap:5px;align-items:center;margin-left:1px;}
.draw-color-btn{width:13px;height:13px;border-radius:50%;border:2px solid transparent;cursor:pointer;transition:transform .12s,border-color .12s,outline .12s;flex-shrink:0;outline:2px solid transparent;outline-offset:1px;}
.draw-color-btn.active{outline-color:rgba(255,255,255,.8);}
.draw-canvas-wrap{flex:1;position:relative;overflow:hidden;}
.draw-canvas{position:absolute;inset:0;width:100%;height:100%;cursor:crosshair;touch-action:none;}
.draw-tool-btn.disabled{opacity:.25;pointer-events:none;}

/* ── Spreadsheet Card ── */
.sheet-wrap{flex:1;overflow:hidden;-webkit-user-select:text;user-select:text;cursor:default;}
.sheet-wrap::-webkit-scrollbar{display:none;}
.sheet-table{border-collapse:collapse;table-layout:fixed;}
.sheet-th{background:var(--s2);color:var(--t3);font-size:10px;font-weight:600;font-family:'Outfit',sans-serif;border:1px solid var(--b1);text-align:center;white-space:nowrap;overflow:hidden;position:sticky;top:0;z-index:2;height:24px;width:80px;}
.sheet-th.row-th{width:32px;left:0;z-index:3;position:sticky;top:0;}
.sheet-th.row-th:first-child{left:0;}
.sheet-td{border:1px solid var(--b1);padding:0;width:80px;height:26px;overflow:hidden;}
.sheet-cell{display:block;padding:2px 5px;font-size:12px;font-family:'DM Sans',sans-serif;color:var(--t1);outline:none;height:100%;white-space:nowrap;overflow:hidden;box-sizing:border-box;}
.sheet-cell:focus{background:rgba(124,92,252,.12);overflow:visible;position:relative;z-index:1;}


/* Easing tokens */
:root{
  --ease-out-back:cubic-bezier(0.34,1.56,0.64,1);
  --ease-out-smooth:cubic-bezier(0.25,0.46,0.45,0.94);
  --ease-in-out:cubic-bezier(0.4,0,0.2,1);
}

/* Home screen entrance */
@keyframes slideUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
#home.home-animate .htop{animation:slideUp .35s var(--ease-out-smooth) both;}
#home.home-animate .hscroll{animation:slideUp .4s .05s var(--ease-out-smooth) both;}

/* Canvas cards — home list */
.ccard{transition:border-color .2s var(--ease-out-smooth),background .2s,transform .18s var(--ease-out-smooth),box-shadow .2s;}
.ccard:active{transform:scale(.984);box-shadow:0 1px 4px rgba(0,0,0,.4);}
.crow{transition:background .15s,transform .15s var(--ease-out-smooth);}
.crow:active{transform:translateX(2px);}
.frow{transition:background .15s,transform .15s var(--ease-out-smooth);}
.frow:active{transform:translateX(2px);}
.folder{transition:border-color .2s,box-shadow .2s;}
.ccicon{transition:transform .2s var(--ease-out-back);}
.ccard:active .ccicon{transform:scale(.9);}

/* FAB */
.fab{transition:transform .2s var(--ease-out-back),box-shadow .2s,background .15s;}
.fab:active{transform:scale(.88);}
.fab.open{transform:rotate(45deg) scale(1.05);}
.fab-opt{transition:background .15s,transform .18s var(--ease-out-smooth),opacity .15s;}
.fab-opt:active{transform:scale(.96);}

/* Canvas top bar buttons */
.undobtn{transition:background .15s,color .15s,transform .15s var(--ease-out-back);}
.undobtn:active{transform:scale(.82);}
.backbtn{transition:background .15s,transform .15s var(--ease-out-back);}
.backbtn:active{transform:scale(.85);}

/* Toolbar spawn buttons — animation handled by JS */
.tool.btn-shrink{transform:scale(.82);transition:transform .08s ease!important;}
.tool.btn-spring{transform:scale(1);transition:transform .3s var(--ease-out-back)!important;}
.ticon{display:flex;align-items:center;justify-content:center;}

/* Cards on canvas */
.card{transition:box-shadow .22s var(--ease-out-smooth),border-color .2s;}
.cbar{transition:background .2s var(--ease-out-smooth);}
.cbardot{transition:transform .2s var(--ease-out-back),filter .2s;}
.card.focus .cbardot{transform:scale(1.35);}
.cbarx{transition:background .15s,color .15s,transform .15s var(--ease-out-back);}
.cbarx:active{transform:scale(.8);}

/* Context menu entrance */
@keyframes ctxIn{from{opacity:0;transform:scale(.94) translateY(-4px)}to{opacity:1;transform:scale(1) translateY(0)}}
.ctx-menu{animation:ctxIn .15s var(--ease-out-smooth) both;}
.ctx-item{transition:background .12s,transform .12s;}
.ctx-item:active{transform:scale(.97);}
.ctx-dot{transition:transform .18s var(--ease-out-back),border-color .15s;}
.ctx-dot:active{transform:scale(.85);}
.ctx-dot.sel{transform:scale(1.15);}

/* Modal sheet */
.overlay{transition:opacity .25s var(--ease-out-smooth);}
.sheet{transition:transform .32s cubic-bezier(.32,.72,0,1);}
.sbtn{transition:background .15s,transform .15s var(--ease-out-back);}
.sbtn:active{transform:scale(.97);}
.sinput{transition:border-color .2s,box-shadow .2s;}
.sinput:focus{box-shadow:0 0 0 3px rgba(124,92,252,.12);}

/* MS pill & lag popup entrance already use opacity+scale transition */

/* Ribbon dots pulse on hover */
.cbardot{cursor:crosshair;}
@keyframes dotPulse{0%,100%{opacity:.5}50%{opacity:1;transform:scale(1.4);}}

/* Upload / browse buttons */
.upload-btn{transition:background .15s,transform .15s var(--ease-out-back),box-shadow .15s;}
.upload-btn:active{transform:scale(.95);}
.music-url-go{transition:background .15s,opacity .15s,transform .15s var(--ease-out-back);}
.music-url-go:active{transform:scale(.96);}

/* Home scroll items stagger-in */
@keyframes fadeSlideUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
#home.home-animate #homeList>.ccard:nth-child(1){animation:fadeSlideUp .3s .05s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.ccard:nth-child(2){animation:fadeSlideUp .3s .10s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.ccard:nth-child(3){animation:fadeSlideUp .3s .15s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.ccard:nth-child(4){animation:fadeSlideUp .3s .20s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.ccard:nth-child(5){animation:fadeSlideUp .3s .25s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.folder:nth-child(1){animation:fadeSlideUp .3s .05s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.folder:nth-child(2){animation:fadeSlideUp .3s .10s var(--ease-out-smooth) both;}
#home.home-animate #homeList>.folder:nth-child(3){animation:fadeSlideUp .3s .15s var(--ease-out-smooth) both;}

/* Confirm dialog entrance */
@keyframes popIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
#confirmBox{animation:popIn .2s var(--ease-out-back) both;}

/* Search bar slide-down */
.search-bar{transition:opacity .2s,transform .2s var(--ease-out-smooth);}
.search-bar:not(.show){opacity:0;transform:translateY(-8px);}
.search-bar.show{opacity:1;transform:translateY(0);}

/* Quick note editor back button */
.qne-btn{transition:background .12s,color .12s,transform .13s var(--ease-out-back);}
.qne-btn:active{transform:scale(.85);}

/* Desktop hover refinements (pointer:fine only) */
@media(hover:hover)and(pointer:fine){
  .ccard:hover{transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,0,0,.5);}
  .ccard:hover .ccicon{transform:scale(1.06);}
  .fab:hover{transform:scale(1.06);box-shadow:0 0 32px rgba(255,255,255,.08),0 10px 28px rgba(0,0,0,.8);}
  .tool:hover{transform:scale(1.04);}
  .undobtn:hover{transform:scale(1.06);}
  .backbtn:hover{transform:scale(1.06);}
  .cbar:hover{background:linear-gradient(180deg,#2a2a2a,var(--s2));}
  .cbardot:hover{transform:scale(1.5);}
  .cbarx:hover{transform:scale(1.1);}
  .ctx-item:hover{transform:translateX(2px);}
  .ctx-dot:hover{transform:scale(1.18);}
  .sbtn:hover{transform:scale(1.01);}
  .upload-btn:hover{transform:scale(1.02);box-shadow:0 2px 8px rgba(0,0,0,.3);}
  .fab-opt:hover{transform:translateX(-2px);}
  .crow:hover{transform:translateX(3px);}
  .frow:hover{transform:translateX(2px);}
}
@media (pointer:fine){
  ::-webkit-scrollbar{width:6px;height:6px;}
  ::-webkit-scrollbar-track{background:transparent;}
  ::-webkit-scrollbar-thumb{background:var(--b2);border-radius:3px;}
  ::-webkit-scrollbar-thumb:hover{background:var(--b3);}
}

/* ── Hover states (pointer:fine = mouse/trackpad) ── */
@media (hover:hover) and (pointer:fine){
  .ccard:hover{background:var(--s2);border-color:var(--b2);}
  .crow:hover{background:var(--s2);}
  .folder:hover{border-color:var(--b2);}
  .fab-opt:hover{background:var(--s3);}
  .tool:hover{background:var(--s2);}
  .undobtn:hover{background:var(--s2);color:var(--t1);}
  .backbtn:hover{background:var(--s3);}
  .ctx-item:hover{background:var(--s3);}
  .sbtn:hover{background:rgba(255,255,255,.12);}
  .card:hover .cbar{background:linear-gradient(180deg,var(--s3),var(--s2));}
  .cbarx:hover{background:rgba(252,92,92,.15);color:var(--red);}
  .todocolx:hover{background:rgba(252,92,92,.15);color:var(--red);}
  #msPillClose:hover{background:rgba(252,92,92,.2);color:var(--red);}
  #lagPopupClose:hover{background:rgba(255,255,255,0.15);}
  .ccard,.crow,.frow{cursor:pointer;}
  .cbardot{cursor:crosshair;}
  .todochip{cursor:default;}
}

/* ── Responsive layout: wide screens ── */
@media (min-width:600px){
  /* Home — centered column */
  #home{align-items:center;}
  .htop{width:100%;max-width:640px;padding:20px 32px 20px;}
  .hscroll{width:100%;max-width:640px;padding:0 16px 100px;}

  /* Canvas toolbar — centered with max-width */
  .ctool-row{justify-content:center;gap:4px;padding:0 16px;}
  .tool{padding:8px 18px;}

  /* Context menu wider on desktop */
  .ctx-menu{width:240px;}

  /* Modal sheet as centered dialog on wide screens */
  .overlay{align-items:center;}
  .sheet{border-radius:20px;max-width:420px;width:100%;border:1px solid var(--b2);padding:24px 28px 32px;}
  .shandle{display:none;}

  /* Canvas top bar max-width inner content */
  .ctop{padding:0 24px;}

  /* Lag popup wider */
  #lagPopup{width:min(400px,80vw);}
}

@media (min-width:1024px){
  .htop{max-width:720px;padding:24px 0 24px;}
  .hscroll{max-width:720px;}
  .tool{padding:8px 22px;}
  .ctop{padding:0 32px;}
  /* Larger click targets on desktop */
  .undobtn{width:36px;height:36px;}
  .backbtn{width:36px;height:36px;}
}

@media (min-width:1440px){
  .htop{max-width:900px;}
  .hscroll{max-width:900px;}
}

/* ── Desktop: show home-drag-handle on hover instead of always ── */
@media (hover:hover) and (pointer:fine){
  .home-drag-handle{opacity:0;transition:opacity .15s;}
  .ccard:hover .home-drag-handle,
  .crow:hover .home-drag-handle,
  .frow:hover .home-drag-handle{opacity:1;}
}

    </button>

  <div class="fab-backdrop" id="fabBackdrop" onclick="hideFabMenu()" style="display:none"></div>
  <button class="fab" id="fab" onclick="toggleFabMenu()">

<div id="mediaUploadOverlay">

<script>
const world=document.getElementById('world');
const vp=document.getElementById('vp');
const ribbonWorld=document.getElementById('ribbonWorld');
const ribbonWorldG=document.getElementById('ribbonWorldG');
let wx=0,wy=0,ws=1,ztop=10,cid=0,dragging=false,pan=false,pinching=false;

/* ── rAF-throttled world transform ── */
let _applyWPending=false;
function applyW(){
  if(_applyWPending) return;
  _applyWPending=true;
  requestAnimationFrame(()=>{
    _applyWPending=false;
    const t=`translate(${wx}px,${wy}px) scale(${ws})`;
    world.style.transform=t;
    ribbonWorldG.style.transform=t;
    _scheduleCull();
    _scheduleMinimap();
  });
}
function applyWNow(){
  const t=`translate(${wx}px,${wy}px) scale(${ws})`;
  world.style.transform=t;
  ribbonWorldG.style.transform=t;
  _scheduleMinimap();
}

/* ── Viewport culling — throttled to ~24fps ── */
let _cullPending=false;
let _cullLastRun=0;
const CULL_MARGIN=120;
const CULL_MIN_INTERVAL=42; // ms — ~24fps cap

function _scheduleCull(){
  if(_cullPending) return;
  const now=performance.now();
  if(now-_cullLastRun<CULL_MIN_INTERVAL){ 
    // Too soon — schedule for later
    _cullPending=true;
    setTimeout(()=>{ _cullPending=false; requestAnimationFrame(_runCull); }, CULL_MIN_INTERVAL-(now-_cullLastRun));
    return;
  }
  _cullPending=true;
  requestAnimationFrame(_runCull);
}

function _runCull(){
  _cullPending=false;
  _cullLastRun=performance.now();
  if(dragging||_rdActive||_ribbonMidDragging) return;
  const vr=vp.getBoundingClientRect();
  const vLeft  = -CULL_MARGIN;
  const vTop   = -CULL_MARGIN;
  const vRight = vr.width  + CULL_MARGIN;
  const vBottom= vr.height + CULL_MARGIN;

  document.querySelectorAll('#world .card').forEach(card=>{
    const cx=parseFloat(card.style.left)||0;
    const cy=parseFloat(card.style.top)||0;
    const cw=parseFloat(card.style.width)||240;
    const ch=parseFloat(card.style.height)||200;
    const sx=cx*ws+wx, sy=cy*ws+wy;
    const sx2=sx+cw*ws, sy2=sy+ch*ws;
    const visible=(sx2>vLeft && sy2>vTop && sx<vRight && sy<vBottom);
    card.classList.toggle('culled',!visible);
  });
  // Re-check lag warning after culling since visible count may have changed
  _checkLagWarn();
}

/* ── Minimap ── */
let _minimapVisible=localStorage.getItem('slateMinimapOn')==='1';
let _minimapPending=false;
let _minimapLastRun=0;
const _mm=document.getElementById('minimap');
const _mmCanvas=document.getElementById('minimapCanvas');
const _mmCtx=_mmCanvas.getContext('2d');
const MM_PAD=10; // padding in map-px from edges to outermost cards
const MM_RADIUS=14; // must match CSS border-radius of #minimap
const MM_CARD_RADIUS=3; // card box corner radius

const MM_LONG=140; // longest dimension in px
function _mmResize(){
  const vpW=vp.offsetWidth||window.innerWidth;
  const vpH=vp.offsetHeight||(window.innerHeight-132);
  const ar=vpW/vpH;
  let mmW,mmH;
  if(ar>=1){ mmW=MM_LONG; mmH=Math.round(MM_LONG/ar); }
  else      { mmH=MM_LONG; mmW=Math.round(MM_LONG*ar); }
  _mm.style.width=mmW+'px';
  _mm.style.height=mmH+'px';
}

function toggleMinimap(){
  _minimapVisible=!_minimapVisible;
  localStorage.setItem('slateMinimapOn',_minimapVisible?'1':'0');
  document.getElementById('minimapBtn').classList.toggle('on',_minimapVisible);
  if(_minimapVisible){
    _mmResize();
    _mm.style.display='block';
    requestAnimationFrame(()=>{ _mm.classList.add('show'); _startMmLoop(); });
  } else {
    _stopMmLoop();
    _mm.classList.remove('show');
    setTimeout(()=>{ if(!_minimapVisible) _mm.style.display='none'; },200);
  }
}

function _scheduleMinimap(){ /* no-op — replaced by always-on loop */ }

/* Always-on 24fps minimap loop — runs whenever minimap is visible */
// Permanent minimap loop — always running, self-throttled to ~24fps
let _mmLastFrame=0;
function _mmTick(now){
  requestAnimationFrame(_mmTick);
  if(!_minimapVisible) return;
  if(now-_mmLastFrame<42) return; // ~24fps
  _mmLastFrame=now;
  _drawMinimap();
}
requestAnimationFrame(_mmTick);

// Keep these as no-ops so existing call sites don't error
function _startMmLoop(){}
function _stopMmLoop(){}

function _updateLoadBtnText(card, color){
  if(!color||color.startsWith('var(')) return;
  const lum=_iconContrast(color);
  card.style.setProperty('--load-btn-text', lum?'#111':'#fff');
}

function _drawMinimap(){
  _minimapPending=false;
  _minimapLastRun=performance.now();
  if(!_minimapVisible) return;

  const dpr=window.devicePixelRatio||1;
  const W=_mm.offsetWidth, H=_mm.offsetHeight;
  if(W===0) return;

  const cw=Math.round(W*dpr), ch=Math.round(H*dpr);
  if(_mmCanvas.width!==cw||_mmCanvas.height!==ch){
    _mmCanvas.width=cw; _mmCanvas.height=ch;
    _mmCtx.scale(dpr,dpr);
  }

  const cards=document.querySelectorAll('#world .card');
  _mmCtx.clearRect(0,0,W,H);
  if(!cards.length) return;

  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  cards.forEach(c=>{
    const x=parseFloat(c.style.left)||0, y=parseFloat(c.style.top)||0;
    const w=parseFloat(c.style.width)||240, h=parseFloat(c.style.height)||160;
    if(x<minX)minX=x; if(y<minY)minY=y;
    if(x+w>maxX)maxX=x+w; if(y+h>maxY)maxY=y+h;
  });

  const contentW=maxX-minX, contentH=maxY-minY;
  const scaleX=(W-MM_PAD*2)/Math.max(contentW,1);
  const scaleY=(H-MM_PAD*2)/Math.max(contentH,1);
  const scale=Math.min(scaleX,scaleY);
  const padW=(W-contentW*scale)/2;
  const padH=(H-contentH*scale)/2;
  const toMap=(wx2,wy2)=>({ x:padW+(wx2-minX)*scale, y:padH+(wy2-minY)*scale });

  cards.forEach(c=>{
    const x=parseFloat(c.style.left)||0, y=parseFloat(c.style.top)||0;
    const cw2=parseFloat(c.style.width)||240, ch2=parseFloat(c.style.height)||160;
    // Use cached resolved color on card element — set by _cacheDotColor
    const color=c._mmColor||'#7c5cfc';
    const mp=toMap(x,y);
    const mw=Math.max(cw2*scale,3), mh=Math.max(ch2*scale,3);
    _mmCtx.beginPath();
    _mmCtx.roundRect(mp.x,mp.y,mw,mh,MM_CARD_RADIUS);
    _mmCtx.fillStyle=color;
    _mmCtx.globalAlpha=0.85;
    _mmCtx.fill();
    _mmCtx.globalAlpha=1;
  });

  // Use cached vp dimensions instead of getBoundingClientRect
  const vpW=vp.offsetWidth, vpH=vp.offsetHeight;
  const vxW=-wx/ws, vyW=-wy/ws;
  const vwW=vpW/ws, vhW=vpH/ws;
  const vmp=toMap(vxW,vyW);
  const bx1=vmp.x, by1=vmp.y;
  const bw=vwW*scale, bh=vhW*scale;
  _mmCtx.beginPath();
  _mmCtx.roundRect(bx1,by1,bw,bh,MM_RADIUS);
  _mmCtx.fillStyle='rgba(255,255,255,0.07)';
  _mmCtx.fill();
  _mmCtx.strokeStyle='rgba(255,255,255,0.85)';
  _mmCtx.lineWidth=1.5;
  _mmCtx.stroke();
}

// Click / drag on minimap → teleport or pan
let _mmDragging=false;
function _minimapTeleport(ex,ey){
  const rect=_mm.getBoundingClientRect();
  const mx=ex-rect.left, my=ey-rect.top;
  const W=rect.width, H=rect.height;

  // Recompute scale (same as _drawMinimap)
  const cards=document.querySelectorAll('#world .card');
  if(!cards.length) return;
  let minX=Infinity,minY=Infinity,maxX=-Infinity,maxY=-Infinity;
  cards.forEach(c=>{
    const x=parseFloat(c.style.left)||0,y=parseFloat(c.style.top)||0;
    const w=parseFloat(c.style.width)||240,h=parseFloat(c.style.height)||160;
    if(x<minX)minX=x;if(y<minY)minY=y;if(x+w>maxX)maxX=x+w;if(y+h>maxY)maxY=y+h;
  });
  const contentW=maxX-minX,contentH=maxY-minY;
  const scaleX=(W-MM_PAD*2)/Math.max(contentW,1);
  const scaleY=(H-MM_PAD*2)/Math.max(contentH,1);
  const scale=Math.min(scaleX,scaleY);
  const padW=(W-contentW*scale)/2, padH=(H-contentH*scale)/2;

  // Map px → world coords
  const worldX=(mx-padW)/scale+minX;
  const worldY=(my-padH)/scale+minY;

  // Center viewport on that world point
  const vpR=vp.getBoundingClientRect();
  wx=-worldX*ws+vpR.width/2;
  wy=-worldY*ws+vpR.height/2;
  applyW();
}

_mm.addEventListener('mousedown',e=>{
  e.stopPropagation(); _mmDragging=true;

  _minimapTeleport(e.touches[0].clientX,e.touches[0].clientY);
},{passive:true});

/* ══════════════════════════════════════════════
   RIBBON SYSTEM
   ribbonDB: [{id, fromId, toId, color, midOffX, midOffY}]
   midOffX/midOffY = offset from midpoint of the two anchors (world-space)
   ══════════════════════════════════════════════ */
let ribbonDB=[];
let _ribbonDragging=false;
let _ribbonMidDragging=false;
let _rdFromCard=null, _rdColor='', _rdActive=false, _rdLastTouchEnd=0;
/* ── Helpers ── */
function _cardById(id){ return document.querySelector(`#world .card[data-card-id="${id}"]`); }
function getDotWorldPos(card){
  const dot=card.querySelector('.cbardot');
  if(!dot) return {x:0,y:0};
  const dr=dot.getBoundingClientRect();
  const vr=vp.getBoundingClientRect();
  return {
    x:(dr.left+dr.width/2-vr.left-wx)/ws,
    y:(dr.top+dr.height/2-vr.top-wy)/ws
  };
}
function _ribbonPath(ax,ay,bx,by,mox,moy){
  const mx=(ax+bx)/2+mox, my=(ay+by)/2+moy;
  const cp1x=ax+(mx-ax)*0.7, cp1y=ay+(my-ay)*0.7;
  const cp2x=bx+(mx-bx)*0.7, cp2y=by+(my-by)*0.7;
  return `M${ax},${ay} C${cp1x},${cp1y} ${cp2x},${cp2y} ${bx},${by}`;
}
function _ribbonCPs(ax,ay,bx,by,mox,moy){
  const mx=(ax+bx)/2+mox, my=(ay+by)/2+moy;
  return {
    cp1x:ax+(mx-ax)*0.7, cp1y:ay+(my-ay)*0.7,
    cp2x:bx+(mx-bx)*0.7, cp2y:by+(my-by)*0.7
  };
}

/* Evaluate cubic Bézier at t */
function _bezPt(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t){
  const u=1-t;
  return {
    x: u*u*u*ax + 3*u*u*t*cp1x + 3*u*t*t*cp2x + t*t*t*bx,
    y: u*u*u*ay + 3*u*u*t*cp1y + 3*u*t*t*cp2y + t*t*t*by
  };
}
/* Tangent angle at t */
function _bezAngle(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t){
  const u=1-t;
  const dx=3*(u*u*(cp1x-ax)+2*u*t*(cp2x-cp1x)+t*t*(bx-cp2x));
  const dy=3*(u*u*(cp1y-ay)+2*u*t*(cp2y-cp1y)+t*t*(by-cp2y));
  return Math.atan2(dy,dx)*180/Math.PI;
}
/* Estimate arc length via 20 segments */
function _bezLen(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by){
  let len=0, px=ax, py=ay;
  for(let i=1;i<=20;i++){
    const p=_bezPt(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,i/20);
    len+=Math.hypot(p.x-px,p.y-py); px=p.x; py=p.y;
  }
  return len;
}
/* De Casteljau split at t — returns [left, right] each as {ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by} */
function _bezSplit(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t){
  const mx1=ax+(cp1x-ax)*t, my1=ay+(cp1y-ay)*t;
  const mx2=cp1x+(cp2x-cp1x)*t, my2=cp1y+(cp2y-cp1y)*t;
  const mx3=cp2x+(bx-cp2x)*t, my3=cp2y+(by-cp2y)*t;
  const mx12=mx1+(mx2-mx1)*t, my12=my1+(my2-my1)*t;
  const mx23=mx2+(mx3-mx2)*t, my23=my2+(my3-my2)*t;
  const mx123=mx12+(mx23-mx12)*t, my123=my12+(my23-my12)*t;
  return [
    {ax,ay,cp1x:mx1,cp1y:my1,cp2x:mx12,cp2y:my12,bx:mx123,by:my123},
    {ax:mx123,ay:my123,cp1x:mx23,cp1y:my23,cp2x:mx3,cp2y:my3,bx,by}
  ];
}
function _curveToBezCmd(c){ return `M${c.ax},${c.ay} C${c.cp1x},${c.cp1y} ${c.cp2x},${c.cp2y} ${c.bx},${c.by}`; }

/* Build split paths around text label — returns {d1,d2,mx,my,angle} or null if no label */
function _ribbonSplitPaths(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,label,mox,moy){
  if(!label) return null;
  // Fixed gap in world units — tuned to match 16px SVG text
  // Gap = half the text line height in world units (font-size 16 + padding)
  const halfGap=14;
  const mid=_bezPt(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,0.5);

  // Find t1: walk backward from 0.5 until chord distance >= halfGap
  let t1=0.5,t2=0.5;
  for(let i=1;i<=100;i++){
    const t=0.5-i*0.005;
    if(t<=0.01){t1=0.01;break;}
    const p=_bezPt(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t);
    if(Math.hypot(p.x-mid.x,p.y-mid.y)>=halfGap){t1=t;break;}
  }
  // Find t2: walk forward from 0.5
  for(let i=1;i<=100;i++){
    const t=0.5+i*0.005;
    if(t>=0.99){t2=0.99;break;}
    const p=_bezPt(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t);
    if(Math.hypot(p.x-mid.x,p.y-mid.y)>=halfGap){t2=t;break;}
  }
  if(t1<=0.02||t2>=0.98) return null; // too short

  const [left]=_bezSplit(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t1);
  const [,right]=_bezSplit(ax,ay,cp1x,cp1y,cp2x,cp2y,bx,by,t2);

  return{d1:_curveToBezCmd(left),d2:_curveToBezCmd(right),mx:mid.x,my:mid.y,angle:0};
}
function clearRibbonSvg(){
  [...ribbonWorldG.querySelectorAll('g[data-rid]')].forEach(g=>g.remove());
}
function _ribbonGroupId(rid){ return 'rg_'+rid; }

/* ── Render one ribbon ── */
function renderRibbon(r){
  const fromCard=document.querySelector(`#world .card[data-card-id="${r.fromId}"]`);
  const toCard  =document.querySelector(`#world .card[data-card-id="${r.toId}"]`);
  if(!fromCard||!toCard) return;
  const a=getDotWorldPos(fromCard);
  const b=getDotWorldPos(toCard);
  const mox=r.midOffX||0, moy=r.midOffY||0;
  const {cp1x,cp1y,cp2x,cp2y}=_ribbonCPs(a.x,a.y,b.x,b.y,mox,moy);
  const fullD=_ribbonPath(a.x,a.y,b.x,b.y,mox,moy);
  const split=r.label?_ribbonSplitPaths(a.x,a.y,cp1x,cp1y,cp2x,cp2y,b.x,b.y,r.label,mox,moy):null;

  let g=ribbonWorldG.querySelector(`g[data-rid="${r.id}"]`);
  if(!g){
    g=document.createElementNS('http://www.w3.org/2000/svg','g');
    g.setAttribute('data-rid',r.id);
    g.setAttribute('class','ribbon-g');
    const hit=document.createElementNS('http://www.w3.org/2000/svg','path');
    hit.setAttribute('class','ribbon-hit');
    hit.setAttribute('data-rid',r.id);
    const vis=document.createElementNS('http://www.w3.org/2000/svg','path');
    vis.setAttribute('class','ribbon-vis');
    vis.setAttribute('data-rid',r.id);
    const vis2=document.createElementNS('http://www.w3.org/2000/svg','path');
    vis2.setAttribute('class','ribbon-vis2');
    vis2.setAttribute('data-rid',r.id);
    const dotA=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dotA.setAttribute('class','ribbon-dot-a');
    dotA.setAttribute('r','5');
    dotA.setAttribute('pointer-events','none');
    const dotB=document.createElementNS('http://www.w3.org/2000/svg','circle');
    dotB.setAttribute('class','ribbon-dot-b');
    dotB.setAttribute('r','5');
    dotB.setAttribute('pointer-events','none');
    const lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('class','ribbon-lbl');
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('pointer-events','none');
    lbl.style.cssText='font-family:\'DM Sans\',sans-serif;font-size:16px;font-weight:500;fill:white;stroke:rgba(0,0,0,0.75);stroke-width:3;paint-order:stroke fill;user-select:none;';
    // Invisible rect behind text for a large tap/click target
    const lblHit=document.createElementNS('http://www.w3.org/2000/svg','rect');
    lblHit.setAttribute('class','ribbon-lbl-hit');
    lblHit.setAttribute('fill','transparent');
    lblHit.setAttribute('pointer-events','all');
    lblHit.setAttribute('cursor','pointer');
    g.appendChild(hit);
    g.appendChild(vis);
    g.appendChild(vis2);
    g.appendChild(dotA);
    g.appendChild(dotB);
    g.appendChild(lblHit);
    g.appendChild(lbl);
    ribbonWorldG.insertBefore(g,_liveRibbon);
    _attachRibbonEvents(g,r.id);
  }

  const hit=g.querySelector('.ribbon-hit');
  const vis=g.querySelector('.ribbon-vis');
  const dotA=g.querySelector('.ribbon-dot-a');
  const dotB=g.querySelector('.ribbon-dot-b');

  // Create vis2 and lbl if missing (old ribbons from before V2.5)
  let vis2=g.querySelector('.ribbon-vis2');
  if(!vis2){
    vis2=document.createElementNS('http://www.w3.org/2000/svg','path');
    vis2.setAttribute('class','ribbon-vis2');
    vis2.setAttribute('data-rid',r.id);
    g.insertBefore(vis2,dotA);
  }
  let lbl=g.querySelector('.ribbon-lbl');
  if(!lbl){
    lbl=document.createElementNS('http://www.w3.org/2000/svg','text');
    lbl.setAttribute('class','ribbon-lbl');
    lbl.setAttribute('text-anchor','middle');
    lbl.setAttribute('dominant-baseline','middle');
    lbl.setAttribute('pointer-events','none');
    lbl.style.cssText='font-family:\'DM Sans\',sans-serif;font-size:16px;font-weight:500;fill:white;stroke:rgba(0,0,0,0.75);stroke-width:3;paint-order:stroke fill;user-select:none;';
    g.appendChild(lbl);
  }
  let lblHit=g.querySelector('.ribbon-lbl-hit');
  if(!lblHit){
    lblHit=document.createElementNS('http://www.w3.org/2000/svg','rect');
    lblHit.setAttribute('class','ribbon-lbl-hit');
    lblHit.setAttribute('fill','transparent');
    lblHit.setAttribute('pointer-events','all');
    lblHit.setAttribute('cursor','pointer');
    g.insertBefore(lblHit,lbl);
  }

  const color=r.color||'rgba(200,200,200,0.8)';

  // Hit always uses full path
  hit.setAttribute('d',fullD);

  if(split){
    vis.setAttribute('d',split.d1);
    vis2.setAttribute('d',split.d2);
    vis.style.stroke=color; vis2.style.stroke=color;
    vis2.style.display='';
    lbl.setAttribute('transform',`translate(${split.mx},${split.my}) rotate(${split.angle})`);
    lbl.textContent=r.label;
    lbl.style.display='';
    // Size hit rect generously around text center (world units)
    const hw=Math.max(r.label.length*9+20, 60), hh=40;
    lblHit.setAttribute('x', split.mx-hw/2);
    lblHit.setAttribute('y', split.my-hh/2);
    lblHit.setAttribute('width', hw);
    lblHit.setAttribute('height', hh);
    lblHit.style.display='';
  } else {
    vis.setAttribute('d',fullD);
    vis.style.stroke=color;
    vis2.style.display='none';
    lbl.style.display='none';
    lbl.textContent='';
    lblHit.style.display='none';
  }

  dotA.setAttribute('cx',a.x); dotA.setAttribute('cy',a.y); dotA.style.fill=color;
  dotB.setAttribute('cx',b.x); dotB.setAttribute('cy',b.y); dotB.style.fill=color;
}

/* ── Render all ribbons ── */
function renderAllRibbons(){
  clearRibbonSvg();
  ribbonDB.forEach(r=>renderRibbon(r));
}

/* ── Ribbon pointer events ── */
let _rbLpTimer=null, _rbMoved=false, _rbSx=0, _rbSy=0;
let _rbMidRid=null, _rbMidSx=0, _rbMidSy=0, _rbMidOx=0, _rbMidOy=0;

function _attachRibbonEvents(g, rid){
  let _rbLpFired=false;
  let _rbTap1Time=0;
  function onStart(cx,cy){
    _rbSx=cx; _rbSy=cy; _rbMoved=false; _rbLpFired=false;
    _rbMidRid=rid;
    const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
    _rbMidOx=r.midOffX||0; _rbMidOy=r.midOffY||0;
    _ribbonMidDragging=true; pan=false;
    clearTimeout(_rbLpTimer);
    _rbLpTimer=setTimeout(()=>{
      if(!_rbMoved){ _rbLpFired=true; _ribbonMidDragging=false; showRibbonMenu(rid,cx,cy); }
    },500);
  }
  function onTap(cx,cy){
    const r=ribbonDB.find(x=>x.id===rid);
    if(r?.label){
      // Only open edit if tap was on the label hit rect
      const lhit=g.querySelector('.ribbon-lbl-hit');
      if(lhit){
        const el=document.elementFromPoint(cx,cy);
        if(el===lhit){ _editRibbonLabel(rid, r.label); return; }
      }
    }
  }
  function onMove(cx,cy){
    if(!_ribbonMidDragging||_rbMidRid!==rid) return;
    const dx=(cx-_rbSx)/ws, dy=(cy-_rbSy)/ws;
    if(!_rbMoved && Math.hypot(dx,dy)*ws>8){ _rbMoved=true; clearTimeout(_rbLpTimer); }
    if(_rbMoved){
      const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
      r.midOffX=_rbMidOx+dx;
      r.midOffY=_rbMidOy+dy;
      renderRibbon(r);
    }
  }
  function onEnd(cx,cy){
    clearTimeout(_rbLpTimer);
    if(!_rbMoved && !_rbLpFired) onTap(cx,cy);
    if(_rbMoved && _rbMidRid===rid){ saveCanvas(); }
    _ribbonMidDragging=false; _rbMidRid=null; _rbMoved=false;
  }
  g.addEventListener('touchstart',e=>{
    e.stopPropagation();
    onStart(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  g.addEventListener('touchmove',e=>{
    e.stopPropagation();
    onMove(e.touches[0].clientX,e.touches[0].clientY);
  },{passive:true});
  g.addEventListener('touchend',e=>{
    e.stopPropagation();
    onEnd(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  },{passive:true});
  g.addEventListener('mousedown',e=>{
    e.stopPropagation();
    onStart(e.clientX,e.clientY);
  });
  document.addEventListener('mouseup',e=>{
    if(_rbMidRid===rid){ onEnd(e.clientX, e.clientY); }
  });
  g.addEventListener('dblclick',e=>{
    e.stopPropagation();
    const r=ribbonDB.find(x=>x.id===rid);
    if(r?.label) _editRibbonLabel(rid, r.label);
  });
  // mousemove/mouseup handled globally below
}

document.addEventListener('mousemove',e=>{
  if(_ribbonMidDragging && _rbMidRid){
    const rid=_rbMidRid;
    const dx=(e.clientX-_rbSx)/ws, dy=(e.clientY-_rbSy)/ws;
    if(!_rbMoved && Math.hypot(dx,dy)*ws>8){ _rbMoved=true; clearTimeout(_rbLpTimer); }
    if(_rbMoved){
      const r=ribbonDB.find(x=>x.id===rid); if(!r) return;
      r.midOffX=_rbMidOx+dx; r.midOffY=_rbMidOy+dy;
      renderRibbon(r);
    }
  }
});
document.addEventListener('mouseup',e=>{
  if(_ribbonMidDragging){
    clearTimeout(_rbLpTimer);
    if(_rbMoved) saveCanvas();
    _ribbonMidDragging=false; _rbMidRid=null; _rbMoved=false;
  }
});

/* ── Dot → ribbon drag-to-connect ── */
const _liveRibbon=document.getElementById('ribbonLive');
const _liveRibbonDotA=document.getElementById('ribbonLiveDotA');
const _liveRibbonDotB=document.getElementById('ribbonLiveDotB');

function _screenToWorld(cx,cy){
  const vr=vp.getBoundingClientRect();
  return { x:(cx-vr.left-wx)/ws, y:(cy-vr.top-wy)/ws };
}

function _findNearestDot(cx,cy,excludeCard){
  let best=null, bestD=55;
  document.querySelectorAll('#world .card').forEach(card=>{
    if(card===excludeCard) return;
    const dot=card.querySelector('.cbardot');
    if(!dot) return;
    const dr=dot.getBoundingClientRect();
    const dotCx=dr.left+dr.width/2;
    const dotCy=dr.top+dr.height/2;
    const d=Math.hypot(cx-dotCx,cy-dotCy);
    if(d<bestD){ bestD=d; best=card; }
  });
  return best;
}

function _startDotDrag(card, cx, cy){
  _rdFromCard=card;
  const dot=card.querySelector('.cbardot');
  _rdColor=dot ? getComputedStyle(dot).backgroundColor : 'rgba(255,255,255,0.7)';
  // Fallback: if computed is transparent/empty, use the inline style directly
  if(!_rdColor || _rdColor==='rgba(0, 0, 0, 0)' || _rdColor==='transparent'){
    _rdColor='rgba(200,200,200,0.8)';
  }
  _rdActive=true;
  pan=false; dragging=true;
  _liveRibbon.style.stroke=_rdColor;
  // Show start dot immediately
  const a=getDotWorldPos(card);
  const b=_screenToWorld(cx,cy);
  _liveRibbon.setAttribute('d',_ribbonPath(a.x,a.y,b.x,b.y,0,(b.y-a.y)*0.3));
  _liveRibbonDotA.setAttribute('cx',a.x); _liveRibbonDotA.setAttribute('cy',a.y);
  _liveRibbonDotA.style.fill=_rdColor; _liveRibbonDotA.style.display='';
  _liveRibbonDotB.style.display='none';
  // Pulse all other dots
  document.querySelectorAll('#world .card').forEach(c=>{
    if(c!==card) c.querySelector('.cbardot')?.classList.add('dot-target');
  });
}

let _snapCheckLast=0;
function _moveDotDrag(cx,cy){
  if(!_rdActive) return;
  const a=getDotWorldPos(_rdFromCard);
  const b=_screenToWorld(cx,cy);
  const d=_ribbonPath(a.x,a.y,b.x,b.y,0,(b.y-a.y)*0.3);
  _liveRibbon.setAttribute('d',d);
  _liveRibbonDotA.setAttribute('cx',a.x); _liveRibbonDotA.setAttribute('cy',a.y);
  // Snap preview check throttled to ~24fps (expensive: loops all cards)
  const now=performance.now();
  if(now-_snapCheckLast<42) return;
  _snapCheckLast=now;
  const near=_findNearestDot(cx,cy,_rdFromCard);
  if(near){
    const nb=getDotWorldPos(near);
    _liveRibbonDotB.setAttribute('cx',nb.x); _liveRibbonDotB.setAttribute('cy',nb.y);
    _liveRibbonDotB.style.fill=_rdColor; _liveRibbonDotB.style.display='';
  } else {
    _liveRibbonDotB.style.display='none';
  }
}

function _endDotDrag(cx,cy){
  if(!_rdActive) return;
  _rdActive=false; dragging=false;
  _liveRibbon.setAttribute('d','');
  _liveRibbon.style.stroke='transparent';
  _liveRibbonDotA.style.display='none';
  _liveRibbonDotB.style.display='none';
  document.querySelectorAll('.dot-target').forEach(d=>d.classList.remove('dot-target'));
  const toCard=_findNearestDot(cx,cy,_rdFromCard);
  if(toCard){
    pushUndo();
    const a=getDotWorldPos(_rdFromCard);
    const b=getDotWorldPos(toCard);
    const defMidOffY=Math.max(60, Math.abs(b.y-a.y)*0.4);
    const rid='r'+Date.now();
    ribbonDB.push({
      id:rid,
      fromId:_rdFromCard.dataset.cardId,
      toId:toCard.dataset.cardId,
      color:_rdColor,
      midOffX:0,
      midOffY:defMidOffY
    });
    renderRibbon(ribbonDB[ribbonDB.length-1]);
    saveCanvas();
  }
  _rdFromCard=null;
  pan=false;
}

/* Attach dot events — called once per card after it enters the DOM */
// Cache resolved dot color on card element for minimap use (avoids getComputedStyle in hot loop)
function _cacheDotColor(card){
  const dot=card.querySelector('.cbardot');
  if(!dot){ card._mmColor='#7c5cfc'; return; }
  const raw=dot.style.background;
  let resolved;
  if(raw && !raw.startsWith('var(')){
    resolved=raw;
  } else {
    resolved=getComputedStyle(dot).backgroundColor||'#7c5cfc';
  }
  card._mmColor=resolved;
  // Set load button text color based on luminance
  const lum=_iconContrast(resolved);
  card.style.setProperty('--load-btn-text', lum?'#111':'#fff');
}

function initDotEvents(card){
  _cacheDotColor(card); // cache resolved color for minimap
  const dot=card.querySelector('.cbardot');
  if(!dot) return;
  let _dotLastTouchEnd=0;

  dot.addEventListener('touchstart',e=>{
    e.stopPropagation();
    _dotLastTouchEnd=0;
    _startDotDrag(card, e.touches[0].clientX, e.touches[0].clientY);
  },{passive:true});

  dot.addEventListener('mousedown',e=>{
    if(Date.now()-_dotLastTouchEnd<600) return;
    e.stopPropagation();
    _startDotDrag(card, e.clientX, e.clientY);
  });
}

// Global move/end for ribbon drag (dot → connect)
document.addEventListener('touchmove',e=>{
  if(_rdActive) _moveDotDrag(e.touches[0].clientX, e.touches[0].clientY);
},{passive:true});
document.addEventListener('touchend',e=>{
  if(_rdActive){
    _rdLastTouchEnd=Date.now();
    _endDotDrag(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
  }
},{passive:true});
document.addEventListener('mousemove',e=>{
  if(_rdActive) _moveDotDrag(e.clientX, e.clientY);
});
document.addEventListener('mouseup',e=>{
  if(_rdActive) _endDotDrag(e.clientX, e.clientY);
});

/* ── Timestamp ── */
function relTime(ts){
  const d=Date.now()-ts;
  if(d<60000) return 'just now';
  if(d<3600000) return Math.floor(d/60000)+'m ago';
  if(d<86400000) return Math.floor(d/3600000)+'h ago';
  if(d<2*86400000) return 'yesterday';
  return Math.floor(d/86400000)+'d ago';
}
