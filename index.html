function homeItemTouchStart(el,kind,id,e){
  _hKind=kind; _hId=id; _hEl=el;
  _hSX=e.touches[0].clientX; _hSY=e.touches[0].clientY;
  _hDragging=false;
  clearTimeout(_hTimer);
}
function homeItemTouchMove(el,e){
  const cx=e.touches[0].clientX, cy=e.touches[0].clientY;
  const dx=cx-_hSX, dy=cy-_hSY;
  if(!_hDragging && Math.hypot(dx,dy)>6){
    clearTimeout(_hTimer);
    _hDragging=true;
    _startHomeDrag(_hEl,_hKind,_hId,_hSX,_hSY);
  }
  if(_hDragging) _moveHomeDrag(cx,cy);
}
function homeItemTouchEnd(el,e){
  clearTimeout(_hTimer);
  if(_hDragging){
    const cx=e.changedTouches[0].clientX, cy=e.changedTouches[0].clientY;
    _dropHomeDrag(cx,cy);
  }
  _hDragging=false;
}

let _hOffX=0,_hOffY=0;
function _startHomeDrag(el,kind,id,sx,sy){
  const r=el.getBoundingClientRect();
  _hOffX=sx-r.left; _hOffY=sy-r.top;
  _hGhost=el.cloneNode(true);
  _hGhost.style.cssText=`position:fixed;left:${r.left}px;top:${r.top}px;width:${r.width}px;pointer-events:none;z-index:500;opacity:0.85;border-radius:14px;box-shadow:0 8px 32px rgba(0,0,0,.5);transition:none;`;
  document.body.appendChild(_hGhost);
  el.style.opacity='0.3';
}
function _moveHomeDrag(cx,cy){
  if(!_hGhost) return;
  _hGhost.style.left=(cx-_hOffX)+'px';
  _hGhost.style.top=(cy-_hOffY)+'px';
  if(_hIndicator){_hIndicator.remove();_hIndicator=null;}
  const tgt=_findHomeDropTarget(cx,cy);
  if(tgt && tgt.type!=='folder-enter'){
    _hIndicator=document.createElement('div');
    _hIndicator.style.cssText='height:2px;background:rgba(220,220,220,0.85);border-radius:2px;margin:2px 0;transition:none;';
    tgt.parent.insertBefore(_hIndicator,tgt.before||null);
  } else if(tgt && tgt.type==='folder-enter'){
    tgt.el.style.outline='2px solid rgba(220,220,220,0.85)';
    tgt.el.style.borderRadius='14px';
  }
  document.querySelectorAll('.folder').forEach(f=>{ if(!tgt||tgt.el!==f){f.style.outline='';f.style.borderRadius='';} });
}
function _findHomeDropTarget(cx,cy){
  // Canvas inside a folder: reorder within folder, or drag above/below to exit
  if(_hKind==='canvas' && canvasDB[_hId]?.folder){
    const myFolder=canvasDB[_hId].folder;
    const folderEl=document.getElementById('folder-'+myFolder);
    if(folderEl){
      const fr=folderEl.getBoundingClientRect();
      if(cy < fr.top+10) return {type:'out-of-folder',before:folderEl,parent:folderEl.parentElement};
      if(cy > fr.bottom-10) return {type:'out-of-folder',before:folderEl.nextElementSibling||null,parent:folderEl.parentElement};
    }
    const crows=[...document.querySelectorAll('#folder-'+myFolder+' .crow')].filter(c=>c!==_hEl);
    for(let i=0;i<crows.length;i++){
      const r=crows[i].getBoundingClientRect();
      if(cy<r.top+r.height/2) return {type:'crow',parent:crows[i].parentElement,before:crows[i],idx:i};
    }
    return {type:'crow',parent:document.querySelector('#folder-'+myFolder+' .fkids'),before:null,idx:crows.length};
  }
  // Canvas dragged over a folder row → enter folder
  if(_hKind==='canvas'){
    for(const frow of document.querySelectorAll('.frow')){
      const r=frow.getBoundingClientRect();
      if(cx>=r.left&&cx<=r.right&&cy>r.top+8&&cy<r.bottom-8){
        const folderEl=frow.closest('[id^="folder-"]');
        const fid=folderEl?.id.replace('folder-','');
        if(fid) return {type:'folder-enter',el:folderEl,frow:frow,folderId:fid};
      }
    }
  }
  // Top-level reorder: all items in combined visual order
  const allItems=[...document.querySelectorAll('#homeList > *')]
    .filter(el=>el!==_hEl && !el.contains(_hEl));
  for(let i=0;i<allItems.length;i++){
    const r=allItems[i].getBoundingClientRect();
    if(r.width===0||r.height===0) continue;
    if(cy<r.top+r.height/2) return {type:'top',parent:allItems[i].parentElement,before:allItems[i]};
    if(i===allItems.length-1||cy<r.bottom+4) return {type:'top',parent:allItems[i].parentElement,before:allItems[i].nextElementSibling||null};
  }
  return null;
}

function _dropHomeDrag(cx,cy){
  if(_hGhost){_hGhost.remove();_hGhost=null;}
  if(_hIndicator){_hIndicator.remove();_hIndicator=null;}
  if(_hEl) _hEl.style.opacity='';
  document.querySelectorAll('.folder').forEach(f=>{f.style.outline='';f.style.borderRadius='';});
  const tgt=_findHomeDropTarget(cx,cy);
  if(!tgt){persistDB();renderHome();return;}

  if(tgt.type==='folder-enter'){
    canvasDB[_hId].folder=tgt.folderId;
    persistDB();renderHome();return;
  }
  if(tgt.type==='out-of-folder'){
    canvasDB[_hId].folder=null;
    persistDB();renderHome();return;
  }
  if(tgt.type==='crow'){
    const peers=_orderedCanvases(canvasDB[_hId].folder);
    const fi=peers.indexOf(_hId); if(fi!==-1) peers.splice(fi,1);
    peers.splice(tgt.idx,0,_hId);
    peers.forEach((n,i)=>{if(canvasDB[n])canvasDB[n].order=i;});
    persistDB();renderHome();return;
  }
  if(tgt.type==='top'){
    if(_hKind==='canvas') canvasDB[_hId].folder=null;
    // insert element to get visual order
    if(tgt.before) tgt.parent.insertBefore(_hEl,tgt.before);
    else tgt.parent.appendChild(_hEl);
    // reassign orders from DOM — skip pinned items (they stay at top naturally)
    let order=0;
    document.querySelectorAll('#homeList > *').forEach(el=>{
      const qid=el.dataset?.qid;
      const fid=el.id?.startsWith('folder-')?el.id.replace('folder-',''):null;
      if(qid&&quickDB[qid]){ quickDB[qid].order=order++; return; }
      if(fid&&folderDB[fid]){ folderDB[fid].order=order++; return; }
      const name=el.querySelector('.ccname')?.textContent;
      if(name&&canvasDB[name]){ canvasDB[name].order=order++; return; }
      order++;
    });
    persistDB();renderHome();return;
  }
}

function _orderedCanvases(folder){
  return Object.entries(canvasDB)
    .filter(([,v])=>v.folder===(folder||null))
    .sort((a,b)=>(a[1].order||0)-(b[1].order||0))
    .map(([k])=>k);
}
function _orderedFolders(){
  return Object.entries(folderDB)
    .sort((a,b)=>(a[1].order||0)-(b[1].order||0))
    .map(([k])=>k);
}

function duplicateCanvas(name){
  const n=name+' (copy)';
  const copy=JSON.parse(JSON.stringify(canvasDB[name]));
  copy.lastEdited=Date.now(); copy.color=randColor();

  copy.cards=copy.cards.map(c=>({...c, cardId:'c'+Date.now()+'_'+Math.random().toString(36).slice(2,7)}));
  copy.ribbons=[]; // ribbons reference old cardIds — clear them
  canvasDB[n]=copy;

function moveCanvasToFolder(name){
  const fids=Object.keys(folderDB);
  if(!fids.length){ alert('Create a folder first.'); return; }
  const opts=fids.map((id,i)=>`${i+1}. ${folderDB[id].name}`).join('\n');
  const choice=prompt('Move to which folder?\n'+opts+'\n\n(type number, or 0 for no folder)');
  if(choice===null) return;
  const idx=parseInt(choice)-1;
  if(choice==='0'){ canvasDB[name].folder=null; }
  else if(idx>=0&&idx<fids.length){ canvasDB[name].folder=fids[idx]; }
  persistDB(); renderHome();
}

    if(el?.closest('.card')) return;

},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(pan&&!dragging&&!pinching&&e.touches.length===1){wx=panOx+(e.touches[0].clientX-panSx);wy=panOy+(e.touches[0].clientY-panSy);applyW();}
},{passive:true});

/* Pinch zoom */
let pinchD0=0,pinchS0=1,pinchMx=0,pinchMy=0;
vp.addEventListener('touchstart',e=>{
  if(e.touches.length===2&&!dragging){
    pinching=true;pan=false;
    pinchD0=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    pinchS0=ws;const r=vp.getBoundingClientRect();
    pinchMx=((e.touches[0].clientX+e.touches[1].clientX)/2)-r.left;
    pinchMy=((e.touches[0].clientY+e.touches[1].clientY)/2)-r.top;
  }
},{passive:true});
vp.addEventListener('touchmove',e=>{
  if(pinching&&e.touches.length===2){
    e.preventDefault();
    const d=Math.hypot(e.touches[0].clientX-e.touches[1].clientX,e.touches[0].clientY-e.touches[1].clientY);
    const ns=Math.min(3,Math.max(0.15,pinchS0*(d/pinchD0)));
    const ratio=ns/ws;wx=pinchMx-(pinchMx-wx)*ratio;wy=pinchMy-(pinchMy-wy)*ratio;ws=ns;applyW();
  }
},{passive:false});
vp.addEventListener('touchend',e=>{
  if(e.touches.length<2){
    if(pinching){ _msPinchJustEnded=true; setTimeout(()=>_msPinchJustEnded=false,350); }
    pinching=false;
  }
},{passive:true});

});

/* Wheel zoom (desktop/laptop trackpad) */
vp.addEventListener('wheel',e=>{
  e.preventDefault();
  const r=vp.getBoundingClientRect();
  const mx=e.clientX-r.left, my=e.clientY-r.top;
  const delta=e.deltaY>0?0.92:1.08;
  const ns=Math.min(3,Math.max(0.15,ws*delta));
  const ratio=ns/ws;
  wx=mx-(mx-wx)*ratio; wy=my-(my-wy)*ratio; ws=ns;
  applyW();
},{passive:false});

/* Keyboard shortcuts */
document.addEventListener('keydown',e=>{
  // Ignore if typing in an input or contenteditable
  const tag=document.activeElement?.tagName;
  const inInput=tag==='INPUT'||tag==='TEXTAREA'||document.activeElement?.isContentEditable;

  // Escape — close menus, exit MS mode
  if(e.key==='Escape'){
    closeCtxMenu();
    if(msMode) exitMsMode();
    closeSearch();
    return;
  }

  if(inInput) return;

  // Undo/Redo
  if((e.ctrlKey||e.metaKey) && e.key==='z' && !e.shiftKey){ e.preventDefault(); applyUndo(); return; }
  if((e.ctrlKey||e.metaKey) && (e.key==='y' || (e.key==='z' && e.shiftKey))){ e.preventDefault(); applyRedo(); return; }

  // Delete/Backspace — remove focused card
  if((e.key==='Delete'||e.key==='Backspace') && currentCanvas){
    const focused=document.querySelector('#world .card.focus');
    if(focused && !msMode){
      const btn=focused.querySelector('.cbarx');
      if(btn) btn.click();
    }
  }
});

/* Spawn */
function spawnCard(type){
  const r=vp.getBoundingClientRect();
  let x=(r.width/2-wx)/ws-120, y=(r.height/2-wy)/ws-80;
  // Nudge until no existing card is perfectly overlapping this spot
  const NUDGE=32;
  let safe=false;
  while(!safe){
    safe=true;
    document.querySelectorAll('#world .card').forEach(c=>{
      const cx=parseFloat(c.style.left)||0, cy=parseFloat(c.style.top)||0;
      if(Math.abs(cx-x)<8 && Math.abs(cy-y)<8){ safe=false; }
    });
    if(!safe){ x+=NUDGE; y+=NUDGE; }
  }
  spawnAt(type,x,y);
}
function spawnAt(type,x,y){
  pushUndo();
  const card=document.createElement('div');
  card.className='card';card.dataset.type=type;
  card.dataset.cardId='c'+Date.now()+'_'+Math.random().toString(36).slice(2,7);
  card.style.left=x+'px';card.style.top=y+'px';card.style.zIndex=++ztop;
  card.innerHTML=buildCard(type,cid);
  // Sync --card-color from the dot color chosen in buildCard
  const dotC=card.querySelector('.cbardot')?.style.background;
  if(dotC) card.style.setProperty('--card-color',dotC);
  world.appendChild(card);makeDrag(card);makeResize(card,type);
  initCardTitles(card); initDotEvents(card);
  if(type==='note') initNoteScroll(card);
  if(type==='todo'){
    card.querySelectorAll('.todochip').forEach(attachChipEvents);
    card.querySelectorAll('.todocol').forEach(initTodoCol);
    fitTodoCard(card);
  }
  card.style.opacity='0';card.style.transform='scale(.9)';
  requestAnimationFrame(()=>{
    card.style.transition='opacity .18s,transform .18s';
    card.style.opacity='1';card.style.transform='scale(1)';
    setTimeout(()=>card.style.transition='',200);
  });
}

/* Card HTML */
const META={note:{l:'Note (Untitled)'},image:{l:'Image (Untitled)'},video:{l:'Video (Untitled)'},link:{l:'Link (Untitled)'},music:{l:'Music (Untitled)'},todo:{l:'To-Do (Untitled)'}};
function buildCard(type,id){
  const c=randColor();
  const bar=`<div class="cbar" data-drag><div class="cbardot" style="background:${c}"></div><div class="cbar-mid" data-drag><span class="cbarlbl" contenteditable="false" data-title onfocus="selectAll(this)" onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}" onblur="this.contentEditable='false';if(!this.textContent.trim())this.textContent='Untitled';window.getSelection()?.removeAllRanges();">${META[type].l}</span></div>${type==='todo'?`<button class="cbar-addcol" onclick="addTodoCol(this)" title="Add column">+</button>`:''}<button class="cbarx" onclick="closeCard(this)">✕</button></div>`;
  let body='';
  if(type==='note') body=`<div class="cbody"><div class="note-content" contenteditable="false" data-placeholder="Write something..."></div></div>`;
  else if(type==='todo') body=`<div class="cbody" style="padding:0"><div class="todocols">
    ${makeTodoCol('To Do',   [['Research topics','var(--amber)'],['Write outline','var(--amber)']])}
    ${makeTodoCol('Doing',   [['Build canvas','var(--blue)']])}
    ${makeTodoCol('Done',    [['Setup repo','var(--green)']])}
  </div></div>`;
  else if(type==='image') body=`<div class="media-wrap" id="mw${id}"><div class="media-placeholder"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="m21 15-5-5L5 21"/></svg><span>Add an image</span><button class="upload-btn" onclick="pick('img','mw${id}')">Choose from device</button></div></div>`;
  else if(type==='video') body=`<div class="media-wrap" id="mw${id}"><div class="media-placeholder"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="15" height="12" rx="2"/><path d="m17 10 5-3v10l-5-3V10z"/></svg><span>Add a video</span><button class="upload-btn" onclick="pick('vid','mw${id}')">Choose from device</button></div></div>`;
  else if(type==='link') body=`<div class="cbody" style="padding:0"><div class="link-wrap"><div class="link-input-row"><input class="link-inp" id="li${id}" type="url" placeholder="Paste a URL..." onkeydown="if(event.key==='Enter')loadLink('li${id}','lp${id}')"><button class="link-go" onclick="loadLink('li${id}','lp${id}')">Go</button></div><div class="link-preview" id="lp${id}"><div class="link-empty"><svg width="22" height="22" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg><span>Paste a link above</span></div></div></div>`;
  else if(type==='music') body=`<div class="music-add-area" id="mc${id}"><svg width="28" height="28" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5"><path d="M9 18V5l12-2v13"/><circle cx="6" cy="18" r="3"/><circle cx="18" cy="16" r="3"/></svg><span>Add music</span><button class="upload-btn" onclick="pick('mus','mc${id}')">Choose audio file</button><div class="music-or">or paste a URL</div><div class="music-url-row"><input class="music-url-inp" id="mui${id}" placeholder="Audio URL (.mp3 etc)"><button class="music-url-go" onclick="loadMusicUrl('mui${id}','mc${id}')">Load</button></div></div>`;
  const rh=`<div class="rh" data-rh style="--rh-color:${c}"></div>`;
  return `<div class="clip">${bar}${body}</div>${rh}`;
}

function closeCard(btn){
  const c=btn.closest('.card');
  const type=c.dataset.type;
  const title=c.querySelector('[data-title]')?.textContent||type;
  showConfirm('Remove Card', `Remove "${title}"? Any content inside will be lost.`, 'Remove', ()=>{
    pushUndo();
    const cid2=c.dataset.cardId;
    if(cid2){
      ribbonDB=ribbonDB.filter(r=>r.fromId!==cid2&&r.toId!==cid2);
      renderAllRibbons();
    }
    const a=c.querySelector('audio');if(a){a.pause();a.src='';}
    c.style.transition='opacity .15s,transform .15s';c.style.opacity='0';c.style.transform='scale(.88)';
    setTimeout(()=>{ c.remove(); saveCanvas(); },160);
  });
}

/* ── Todo helpers ── */
const CHIP_COLORS=['var(--t3)','var(--purple)','var(--pink)','var(--green)','var(--amber)','var(--blue)','var(--red)'];

function makeChipHTML(text, color='var(--t3)'){
  return `<div class="todochip" style="border-left-color:${color}" contenteditable="false">${text}</div>`;
}

function makeTodoCol(header, chips=[]){
  const chipsHTML = chips.map(([text,color])=>makeChipHTML(text,color)).join('');
  return `<div class="todocol">
    <div class="todocolbar" data-coldrag>
      <div class="todocolbar-mid" data-coldrag>
        <span class="todocolh" contenteditable="false" data-coltitle
          onkeydown="if(event.key==='Enter'){event.preventDefault();this.blur();}"
          onblur="if(!this.textContent.trim())this.textContent='Column';">${header}</span>
      </div>
      <button class="todocolx" onclick="removeTodoCol(this)" title="Remove column">✕</button>
    </div>
    <div class="todochips">${chipsHTML}</div>
    <div class="todoadd" onclick="addChip(this)">+ Add</div>
  </div>`;
}

/* Wire up column drag+tap — called after col is in DOM */
function initTodoCol(col){
  const bar=col.querySelector('[data-coldrag]');
  const titleEl=col.querySelector('[data-coltitle]');
  if(!bar||!titleEl||col._colDragInited) return;
  col._colDragInited=true;
  let on=false,moved=false,sx=0,sy=0,ghost=null,indicator=null;

  function start(cx,cy,t){
    if(t.tagName==='BUTTON') return;
    on=true; moved=false; sx=cx; sy=cy;
  }
  function move(cx,cy){
    if(!on) return;
    if(!moved && Math.hypot(cx-sx,cy-sy)>8){
      moved=true;
      dragging=true; pan=false;
      ghost=document.createElement('div');
      ghost.className='col-ghost';
      ghost.style.width=col.offsetWidth+'px';
      ghost.style.height=Math.min(col.offsetHeight,160)+'px';
      ghost.innerHTML=`<div style="padding:8px 10px;font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:.06em;color:var(--t2)">${titleEl.textContent}</div>`;
      document.body.appendChild(ghost);
      col.classList.add('col-dragging');
    }
    if(moved && ghost){
      ghost.style.left=(cx-ghost.offsetWidth/2)+'px';
      ghost.style.top=(cy-20)+'px';
      updateColIndicator(cx,cy,col,indicator);
      // remove old indicator, get new
      if(indicator){indicator.remove();indicator=null;}
      const t2=findColDropTarget(cx,cy,col);
      if(t2){indicator=document.createElement('div');indicator.className='col-drop-indicator';t2.parent.insertBefore(indicator,t2.before||null);}
    }
  }
  function end(cx,cy){
    on=false;
    if(moved){
      if(ghost){ghost.remove();ghost=null;}
      col.classList.remove('col-dragging');
      if(indicator){indicator.remove();indicator=null;}
      dragging=false;
      const tgt=findColDropTarget(cx,cy,col);
      if(tgt) tgt.parent.insertBefore(col,tgt.before||null);
      // refit both source and target cards (may be same)
      const cards=new Set([...document.querySelectorAll('.todocols')].map(c=>c.closest('.card')));
      cards.forEach(c=>{ if(c) fitTodoCard(c); });
      col._colDragInited=false; initTodoCol(col);
    } else {
      // tap — if on title text, edit
      const hit=document.elementFromPoint(sx,sy);
      if(hit===titleEl||titleEl.contains(hit)){
        titleEl.contentEditable='true'; titleEl.focus(); selectAll(titleEl);
        titleEl.onblur=()=>{titleEl.contentEditable='false';if(!titleEl.textContent.trim())titleEl.textContent='Column';};
      }
    }
  }

  bar.addEventListener('touchstart',e=>{e.stopPropagation();start(e.touches[0].clientX,e.touches[0].clientY,e.target);},{passive:true});
  document.addEventListener('touchmove',e=>{if(on)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchend',e=>{if(on)end(e.changedTouches[0].clientX,e.changedTouches[0].clientY);},{passive:true});
  bar.addEventListener('mousedown',e=>{if(e.button===0){e.stopPropagation();start(e.clientX,e.clientY,e.target);}});
  document.addEventListener('mousemove',e=>{if(on)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',e=>{if(on)end(e.clientX,e.clientY);});
}

function updateColIndicator(){}  // stub, logic inline above

function findColDropTarget(cx,cy,draggedCol){
  const containers=[...document.querySelectorAll('.todocols')];
  for(const container of containers){
    const cr=container.getBoundingClientRect();
    if(cx<cr.left-60||cx>cr.right+60||cy<cr.top-60||cy>cr.bottom+60) continue;
    const cols=[...container.children].filter(c=>c.classList.contains('todocol')&&c!==draggedCol&&!c.classList.contains('col-drop-indicator'));
    for(let i=0;i<cols.length;i++){
      const r=cols[i].getBoundingClientRect();
      if(cx<r.left+r.width/2) return {parent:container,before:cols[i]};
    }
    return {parent:container,before:null};
  }
  return null;
}

/* ── Fit todo card to content ──
   COL_W: fixed width per column (px in canvas space)
   GAP: gap between cols, PADX: left+right padding of todocols
   BAR_H: card title bar height
   COLBAR_H: column header bar height
   CHIP_H: height of one chip including margin
   CHIPS_PAD: top+bottom padding inside .todochips
   ADD_H: "+ Add" row height
   COLPAD_B: bottom padding of todocols container
*/
const TC = {
  COL_W:   120,   // each column width
  GAP:       8,   // gap between columns
  PADX:     10,   // todocols left+right padding (each side)
  BAR_H:    36,   // card title bar
  COLBAR_H: 30,   // column header
  CHIP_H:   34,   // one chip (padding 7+7 + font ~12 + margin-bottom 5)
  CHIPS_PAD: 0,   // .todochips has no vertical padding
  ADD_H:    28,   // "+ Add" row
  COLPAD_B: 10,   // todocols bottom padding
};

function fitTodoCard(card){
  const cols=[...card.querySelectorAll('.todocol')];
  if(!cols.length) return;
  const n=cols.length;
  const minW = TC.PADX*2 + n*TC.COL_W + (n-1)*TC.GAP;
  const maxChips = Math.max(...cols.map(c=>c.querySelectorAll('.todochip').length));
  const colH = TC.COLBAR_H + maxChips*TC.CHIP_H + TC.ADD_H + TC.COLPAD_B;
  const minH = TC.BAR_H + colH;

  const curW = parseFloat(card.style.width) || card.offsetWidth;
  const curH = parseFloat(card.style.height) || card.offsetHeight;

  const newW = Math.max(curW, minW);
  const newH = Math.max(curH, minH);

  card.style.width    = newW+'px';
  card.style.height   = newH+'px';
  card.style.minWidth = minW+'px';
  card.style.minHeight= minH+'px';
}

function addChip(btn){
  const col=btn.closest('.todocol');
  const chips=col.querySelector('.todochips');
  const div=document.createElement('div');
  div.innerHTML=makeChipHTML('New task','var(--t3)');
  const chip=div.firstElementChild;
  chips.appendChild(chip);
  attachChipEvents(chip);
  chip.contentEditable='true'; chip.focus(); selectAll(chip);
  chip.onblur=()=>{
    chip.contentEditable='false';
    if(!chip.textContent.trim()) chip.remove();
    fitTodoCard(col.closest('.card'));
  };
  fitTodoCard(col.closest('.card'));
}

/* ── Chip long-press / context menu ── */
let _chipTimer=null, _activeMenu=null;
const LONG_PRESS_MS=500;

function chipTouchStart(chip,e){
  e.stopPropagation();
  const t=e.touches[0];
  chip._csX=t.clientX; chip._csY=t.clientY; chip._cMoved=false;
  clearTimeout(_chipTimer);
  _chipTimer=setTimeout(()=>{ if(!chip._cMoved) showChipMenu(chip, chip._csX, chip._csY); }, LONG_PRESS_MS);
}
function chipTouchMove(chip,e){
  const t=e.touches[0];
  if(Math.hypot(t.clientX-chip._csX, t.clientY-chip._csY)>8){
    chip._cMoved=true; clearTimeout(_chipTimer);
  }
}
function chipTouchEnd(chip,e){
  clearTimeout(_chipTimer);
  if(!chip._cMoved && !_activeMenu){
    e.preventDefault();
    chip.contentEditable='true'; chip.focus(); selectAll(chip);
    chip.onblur=()=>{ chip.contentEditable='false'; if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);} };
  }
}
function chipMouseStart(chip,e){
  e.stopPropagation();
  chip._csX=e.clientX; chip._csY=e.clientY; chip._cMoved=false;
  clearTimeout(_chipTimer);
  _chipTimer=setTimeout(()=>{ if(!chip._cMoved) showChipMenu(chip, chip._csX, chip._csY); }, LONG_PRESS_MS);
}
function chipMouseMove(chip,e){
  if(Math.hypot(e.clientX-chip._csX, e.clientY-chip._csY)>8){
    chip._cMoved=true; clearTimeout(_chipTimer);
  }
}
function chipMouseEnd(chip,e){
  clearTimeout(_chipTimer);
  if(!chip._cMoved && !_activeMenu){
    chip.contentEditable='true'; chip.focus(); selectAll(chip);
    chip.onblur=()=>{ chip.contentEditable='false'; if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);} };
  }
}

function attachChipEvents(chip){
  chip.ontouchstart = e => chipTouchStart(chip, e);
  chip.ontouchmove  = e => chipTouchMove(chip, e);
  chip.ontouchend   = e => chipTouchEnd(chip, e);
  chip.onmousedown  = e => { if(e.button===2) return; chipMouseStart(chip, e); };
  chip.onmousemove  = e => chipMouseMove(chip, e);
  chip.onmouseup    = e => chipMouseEnd(chip, e);
  chip.oncontextmenu= e => { e.preventDefault(); e.stopPropagation(); showChipMenu(chip, e.clientX, e.clientY); };
}

function showChipMenu(chip, cx, cy){
  closeChipMenu();
  const menu=document.createElement('div');
  menu.className='chipmenu';
  const colorRow=document.createElement('div');
  colorRow.className='chipmenu-colors';
  CHIP_COLORS.forEach(c=>{
    const dot=document.createElement('div');
    dot.className='chipcolor';
    dot.style.background=c;
    dot.style.borderColor=chip.style.borderLeftColor===c?'#fff':'transparent';
    dot.ontouchend=dot.onclick=e=>{e.stopPropagation();chip.style.borderLeftColor=c;closeChipMenu();};
    colorRow.appendChild(dot);
  });
  menu.appendChild(colorRow);
  const actions=[
    {label:'Edit', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>`, fn:()=>{ chip.contentEditable='true'; chip.focus(); selectAll(chip); chip.onblur=()=>{chip.contentEditable='false';if(!chip.textContent.trim()){const c=chip.closest('.card');chip.remove();if(c)fitTodoCard(c);}};} },
    {label:'Add above', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="19" x2="12" y2="5"/><polyline points="5 12 12 5 19 12"/></svg>`,  fn:()=>insertChip(chip,'before')},
    {label:'Add below', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>`,  fn:()=>insertChip(chip,'after')},
    {label:'Remove', icon:`<svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>`, fn:()=>{ const c=chip.closest('.card'); chip.remove(); if(c)fitTodoCard(c); }, danger:true},
  ];
  actions.forEach(a=>{
    const item=document.createElement('div');
    item.className='chipmenu-item'+(a.danger?' danger':'');
    item.textContent=a.label;
    item.ontouchend=item.onclick=e=>{e.stopPropagation();closeChipMenu();a.fn();};
    menu.appendChild(item);
  });
  // position near touch point
  const x=Math.max(8, Math.min(cx, window.innerWidth-180));
  const y=Math.max(8, Math.min(cy+8, window.innerHeight-220));
  menu.style.left=x+'px';
  menu.style.top=y+'px';
  document.body.appendChild(menu);
  _activeMenu=menu;
  // Close only when tapping OUTSIDE the menu
  function onOutsideTouch(e){
    if(_activeMenu && !_activeMenu.contains(e.target)){
      closeChipMenu();
    } else if(_activeMenu){
      // tapped inside — let it propagate, re-arm listener
      setTimeout(()=>document.addEventListener('touchend',onOutsideTouch,{once:true,passive:true}),50);
    }
  }
  function onOutsideClick(e){
    if(_activeMenu && !_activeMenu.contains(e.target)) closeChipMenu();
    else if(_activeMenu) setTimeout(()=>document.addEventListener('click',onOutsideClick,{once:true}),50);
  }
  setTimeout(()=>{
    document.addEventListener('touchend',onOutsideTouch,{once:true,passive:true});
    document.addEventListener('click',onOutsideClick,{once:true});
  },300);
}

function closeChipMenu(){
  if(_activeMenu){_activeMenu.remove();_activeMenu=null;}
}

function insertChip(ref,where){
  const div=document.createElement('div');
  div.innerHTML=makeChipHTML('New task','var(--t3)');
  const chip=div.firstElementChild;
  attachChipEvents(chip);
  const chips=ref.closest('.todochips');
  if(where==='before') chips.insertBefore(chip,ref);
  else ref.after(chip);
  chip.contentEditable='true'; chip.focus(); selectAll(chip);
  chip.onblur=()=>{
    chip.contentEditable='false';
    if(!chip.textContent.trim()) chip.remove();
    fitTodoCard(chip.closest('.card'));
  };
  fitTodoCard(ref.closest('.card'));
}

document.getElementById('imgPicker').onchange=function(){if(!this.files[0])return;document.getElementById(_pid).innerHTML=`<img src="${URL.createObjectURL(this.files[0])}" onload="setAR(this)">`;this.value='';};

function pick(type,id){_pt=type;_pid=id;document.getElementById(type==='img'?'imgPicker':type==='vid'?'vidPicker':'musPicker').click();}
function setAR(el){
  const c=el.closest('.card');if(!c)return;
  const ar=el.tagName==='IMG'?el.naturalWidth/el.naturalHeight:(el.videoWidth/el.videoHeight||16/9);
  c.dataset.ar=ar.toFixed(4);
  const maxW=320, minW=180;
  const barH=36;
  let w=Math.min(maxW,Math.max(minW,parseFloat(c.style.width)||240));
  let h=Math.round(w/ar)+barH;
  if(h>420){h=420;w=Math.round((h-barH)*ar);}
  c.style.width=w+'px';c.style.height=h+'px';
}

/* Link */
function loadLink(inpId,previewId){
  let url=document.getElementById(inpId).value.trim();if(!url)return;
  if(!url.startsWith('http'))url='https://'+url;
  const p=document.getElementById(previewId);
  const yt=url.match(/(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/);
  if(yt){p.innerHTML=`<div class="lthumb"><img src="https://img.youtube.com/vi/${yt[1]}/mqdefault.jpg"><div class="ytbadge"><div class="ytbtn">▶</div></div><div class="lfoot"><div class="ldomain">youtube.com</div><div class="ltitle">YouTube Video</div></div>`;return;}
  let d='';try{d=new URL(url).hostname.replace('www.','');}catch(e){}
  p.innerHTML=`<div class="lfoot" style="padding:16px 12px"><div class="ldomain">${d}</div><div class="ltitle">${url}</div><button style="margin-top:10px;background:var(--purple);border:none;border-radius:8px;padding:8px 14px;color:#fff;font-size:12px;cursor:pointer" onclick="window.open('${url}','_blank')">Open link</button></div>`;
}

/* Music */
function loadMusicUrl(inpId,cid){const url=document.getElementById(inpId).value.trim();if(!url)return;let name='Track';try{name=new URL(url).pathname.split('/').pop().replace(/\.[^.]+$/,'');}catch(e){}loadMusicSrc(cid,url,name,'URL');}
function loadMusicSrc(cid,src,name,source){
  const el=document.getElementById(cid);if(!el)return;
  const audio=new Audio(src);audio.preload='metadata';
  el.className='music-player';

/* Drag */

function makeDrag(card){
  let on=false, sx=0, sy=0, ox=0, oy=0;
  let moved=false, longFired=false, lpTimer=null;
  let titleTouchTarget=null;
  let lastTapTime=0, lastTapTarget=null;
  // For MS multi-drag: snapshot of all selected card origins at drag start
  let msOrigins=null;
  // For cbar double-tap MS activation — track last PHYSICAL tap time on this card's cbar
  // We use a flag so mouse ghost-click after touchend doesn't count as second tap
  let _cbarTap1Time=0;
  let _cbarTapFromTouch=false; // was the first tap a touch event?

  function start(cx,cy,t,isTouch){
    _startedOnCbar = !!(t.closest('.cbar') && !t.closest('.cbarlbl') && !t.closest('.cbarx'));
    if(card.dataset.locked==='true') return;
    if(!t.closest('[data-drag]')||t.closest('[data-coldrag]')||t.tagName==='BUTTON'||t.tagName==='TEXTAREA') return;

    // In MS mode: allow interaction on ALL cards (selected or not)
    if(msMode){
      moved=false; longFired=false; on=true;
      sx=cx; sy=cy;
      ox=parseFloat(card.style.left)||0; oy=parseFloat(card.style.top)||0;
      if(msSelected.has(card)){
        // Selected card: snapshot all origins for multi-drag, arm long-press for menu
        msOrigins=new Map();
        msSelected.forEach(c=>msOrigins.set(c,{x:parseFloat(c.style.left)||0,y:parseFloat(c.style.top)||0}));
        clearTimeout(lpTimer);
        lpTimer=setTimeout(()=>{
          if(!moved){ longFired=true; on=false; dragging=false; showMsMenu(cx,cy); }
        },500);
      }
      // Unselected card: on=true so end() fires, no multi-drag origins
      return;
    }

    moved=false; longFired=false; on=true;
    sx=cx; sy=cy;
    ox=parseFloat(card.style.left)||0; oy=parseFloat(card.style.top)||0;
    // Track if touch started on the title label (for double-tap rename)
    titleTouchTarget = t.closest('.cbarlbl') ? t.closest('.cbarlbl') : null;
    pushUndo();
    bringUp(card);
    clearTimeout(lpTimer);
    lpTimer=setTimeout(()=>{
      if(!moved){ longFired=true; on=false; dragging=false; showCardMenu(card,sx,sy); }
    },500);
  }

  function move(cx,cy){
    if(!on) return;
    const dx=cx-sx, dy=cy-sy;
    if(!moved && Math.hypot(dx,dy)>8){
      moved=true; clearTimeout(lpTimer);
      dragging=true; pan=false;
    }
    if(moved){
      if(msMode && msOrigins){
        // Move all selected cards by the same delta
        msOrigins.forEach((orig,c)=>{
          c.style.left=snapVal(orig.x+dx/ws)+'px';
          c.style.top=snapVal(orig.y+dy/ws)+'px';
        });
        // Live ribbon update for all selected cards
        msOrigins.forEach((_,c)=>updateRibbonsForCard(c));
      } else {
        if(titleTouchTarget) titleTouchTarget.contentEditable='false';
        card.style.left=snapVal(ox+dx/ws)+'px'; card.style.top=snapVal(oy+dy/ws)+'px';
        updateRibbonsForCard(card);
      }
    }
  }

  function end(cx,cy,isTouch){
    clearTimeout(lpTimer);

    if(msMode){
      if(!moved && !longFired){
        // Any tap on any card in MS mode toggles it
        _msTapCard(card);
      }
      on=false; dragging=false; msOrigins=null;
      if(moved){ saveCanvas(); }
      moved=false; longFired=false;
      return;
    }

    if(!moved && !longFired && titleTouchTarget){
      // Double-tap on title label = rename
      const now=Date.now();
      if(lastTapTarget===titleTouchTarget && now-lastTapTime<300){
        titleTouchTarget.contentEditable='true';
        titleTouchTarget.focus();
        selectAll(titleTouchTarget);
        lastTapTime=0; lastTapTarget=null;
      } else {
        lastTapTime=now; lastTapTarget=titleTouchTarget;
      }
    }

    // Double-tap on cbar non-title zone = enter MS mode
    // Guard: only count same input type (touch vs mouse) to ignore ghost clicks
    if(!moved && !longFired && !titleTouchTarget && _startedOnCbar){
      const now=Date.now();
      const gap=now-_cbarTap1Time;
      // 50–500ms window: fast enough to be intentional, slow enough to not be accidental
      if(gap>50 && gap<500 && _cbarTapFromTouch===isTouch){
        enterMsMode(card);
        _cbarTap1Time=0;
      } else {
        _cbarTap1Time=now;
        _cbarTapFromTouch=isTouch;
      }
    }

    on=false; dragging=false; titleTouchTarget=null;
    if(moved){ saveCanvas(); _scheduleCull(); }
    moved=false; longFired=false;
  }

  // _startedOnCbar tracks whether the gesture began on the cbar non-title zone
  let _startedOnCbar=false;
  // Suppress ghost mouse events that fire after touch on mobile
  let _lastTouchEnd=0;

  card.addEventListener('touchstart',e=>start(e.touches[0].clientX,e.touches[0].clientY,e.target,true),{passive:true});
  document.addEventListener('touchmove',e=>{ if(on) move(e.touches[0].clientX,e.touches[0].clientY); },{passive:true});
  document.addEventListener('touchend',e=>{ if(on){ _lastTouchEnd=Date.now(); end(e.changedTouches[0].clientX,e.changedTouches[0].clientY,true); } },{passive:true});
  card.addEventListener('mousedown',e=>{ if(Date.now()-_lastTouchEnd<600) return; if(e.button===2) return; start(e.clientX,e.clientY,e.target,false); e.stopPropagation(); });
  document.addEventListener('mousemove',e=>{ if(on) move(e.clientX,e.clientY); });
  document.addEventListener('mouseup',e=>{ if(on) end(e.clientX,e.clientY,false); });
  // Right-click = card context menu (desktop equivalent of long-press)
  card.addEventListener('contextmenu',e=>{
    e.preventDefault(); e.stopPropagation();
    if(msMode){ showMsMenu(e.clientX,e.clientY); return; }
    showCardMenu(card,e.clientX,e.clientY);
  });
}

function makeResize(card,type){
  const handle=card.querySelector('[data-rh]');
  const arLocked=type==='image'||type==='video';
  let on=false,sx,sy,sw,sh,minW,minH,startAR,_moved=false;
  function start(cx,cy){
    pushUndo();
    on=true;_moved=false;dragging=true;pan=false;sx=cx;sy=cy;
    sw=card.offsetWidth;sh=card.offsetHeight;
    const cs=getComputedStyle(card);
    minW=parseFloat(cs.minWidth)||120;
    minH=parseFloat(cs.minHeight)||100;
    if(arLocked) startAR=card.dataset.ar?parseFloat(card.dataset.ar):sw/Math.max(sh,1);
  }
  function move(cx,cy){
    if(!on)return;
    _moved=true;
    const nw=Math.max(minW,sw+(cx-sx)/ws);
    const nh=Math.max(minH,sh+(cy-sy)/ws);
    card.style.width=nw+'px';
    card.style.height=(arLocked?Math.max(minH,nw/startAR):nh)+'px';
  }
  function end(){on=false;dragging=false;if(_moved){saveCanvas();_scheduleCull();}}
  handle.addEventListener('touchstart',e=>{e.stopPropagation();start(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchmove',e=>{if(on)move(e.touches[0].clientX,e.touches[0].clientY);},{passive:true});
  document.addEventListener('touchend',end);
  handle.addEventListener('mousedown',e=>{e.stopPropagation();start(e.clientX,e.clientY);});
  document.addEventListener('mousemove',e=>{if(on)move(e.clientX,e.clientY);});
  document.addEventListener('mouseup',end);
}

const _UK=()=>'su_'+currentCanvas;
const _RK=()=>'sr_'+currentCanvas;
const _lsGet=k=>{try{const s=localStorage.getItem(k);return s?JSON.parse(s):[];}catch(e){return[];}};
const _lsSet=(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch(e){}};

function _currentSnapshot(){
  return {
    cards: [...document.querySelectorAll('#world .card')].map(c=>({
      type:c.dataset.type, x:parseFloat(c.style.left)||0, y:parseFloat(c.style.top)||0,

function pushUndo(){
  if(!currentCanvas) return;
  const stack=_lsGet(_UK());
  stack.push(_currentSnapshot());
  if(stack.length>500) stack.shift();
  _lsSet(_UK(),stack);
  _lsSet(_RK(),[]);

  document.getElementById('redoBtn')?.classList.add('disabled');
}
function applyUndo(){
  if(!currentCanvas) return;
  const undos=_lsGet(_UK()); if(!undos.length) return;
  const redos=_lsGet(_RK());
  redos.push(_currentSnapshot()); _lsSet(_RK(),redos);
  const snap=undos.pop(); _lsSet(_UK(),undos);
  _applySnapshot(snap);
  document.getElementById('undoBtn')?.classList.toggle('disabled',!undos.length);
  document.getElementById('redoBtn')?.classList.remove('disabled');
}
function applyRedo(){
  if(!currentCanvas) return;
  const redos=_lsGet(_RK()); if(!redos.length) return;
  const undos=_lsGet(_UK());
  undos.push(_currentSnapshot()); _lsSet(_UK(),undos);
  const snap=redos.pop(); _lsSet(_RK(),redos);

  url=url.trim(); if(!url) return;
  _mediaUploadPending={type:_mediaUploadType,src:url};
  // auto-fill name from url
  try{ const n=new URL(url).pathname.split('/').pop().replace(/\.[^.]+$/,'').replace(/[-_]/g,' ')||'Media'; if(!document.getElementById('mediaUploadName').value) document.getElementById('mediaUploadName').value=n; }catch(e){}
  const prev=document.getElementById('mediaUploadPreview');
  if(_mediaUploadType==='image') prev.innerHTML=`<img src="${url}" style="width:100%;max-height:150px;object-fit:cover;display:block;" onerror="this.parentElement.style.display='none'">`;
  else if(_mediaUploadType==='video') prev.innerHTML=`<video src="${url}" controls playsinline style="width:100%;max-height:150px;display:block;"></video>`;
  else prev.innerHTML=`<audio src="${url}" controls style="width:100%;padding:10px;box-sizing:border-box;"></audio>`;
  prev.style.display='block';
  document.getElementById('mediaConfirmBtn').style.opacity='1';
  document.getElementById('mediaConfirmBtn').style.pointerEvents='auto';
}
function mediaHandleFile(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    _mediaUploadPending={type:_mediaUploadType,src:ev.target.result};
    const name=file.name.replace(/\.[^.]+$/,'');
    document.getElementById('mediaUploadName').value=name;
    const prev=document.getElementById('mediaUploadPreview');
    const type=_mediaUploadType;
    if(type==='image') prev.innerHTML=`<img src='${ev.target.result}' style="width:100%;max-height:150px;object-fit:cover;display:block;">`;
    else if(type==='video') prev.innerHTML=`<video src='${ev.target.result}' controls playsinline style="width:100%;max-height:150px;display:block;"></video>`;
    else prev.innerHTML=`<audio src='${ev.target.result}' controls style="width:100%;padding:10px;box-sizing:border-box;"></audio>`;
    prev.style.display='block';
    document.getElementById('mediaDropZone').style.display='none';
    document.getElementById('mediaConfirmBtn').style.opacity='1';
    document.getElementById('mediaConfirmBtn').style.pointerEvents='auto';
  };
  reader.readAsDataURL(file);
}
function mediaHandleDrop(e){
  e.preventDefault();
  document.getElementById('mediaDropZone').style.borderColor='rgba(255,255,255,0.1)';
  const file=e.dataTransfer.files[0]; if(!file) return;
  mediaHandleFile(file);
}
function closeMediaUpload(){
  const ov=document.getElementById('mediaUploadOverlay');
  const box=document.getElementById('mediaUploadBox');
  box.style.transition='transform .15s,opacity .15s'; box.style.transform='scale(.92)'; box.style.opacity='0';
  setTimeout(()=>{ ov.style.display='none'; box.style.transform=''; box.style.opacity=''; box.style.transition=''; },160);
  _mediaUploadPending=null; _mediaUploadType=null;
  document.getElementById('mediaFileInp').value='';
}
function confirmMediaUpload(){
  if(!_mediaUploadPending) return;
  const name=document.getElementById('mediaUploadName').value.trim()||'Media';
  const {type,src}=_mediaUploadPending;
  const id=qid();
  quickDB[id]={type,title:name,src,order:Object.keys(quickDB).length,lastEdited:Date.now()};
  persistDB(); renderHome(); closeMediaUpload();
}

function toggleQAudio(id,btn){
  const audio=document.getElementById('qaudio-'+id);
  if(!audio) return;
  if(audio.paused){ audio.play(); btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>'; }
  else { audio.pause(); btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>'; }
}
function resetQAudio(id){ const btn=document.querySelector(`#qaud-${id} .qaudio-btn`); if(btn) btn.innerHTML='<svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg>'; const fill=document.getElementById('qfill-'+id); if(fill) fill.style.width='0%'; }
function updateQAudioProgress(id){ const a=document.getElementById('qaudio-'+id); if(!a||!a.duration) return; document.getElementById('qfill-'+id).style.width=(a.currentTime/a.duration*100).toFixed(1)+'%'; document.getElementById('qtime-'+id).textContent=fmtTime(a.currentTime)+' / '+fmtTime(a.duration); }
function seekQAudio(id,e,bar){ const a=document.getElementById('qaudio-'+id); if(!a||!a.duration) return; const r=bar.getBoundingClientRect(); a.currentTime=((e.clientX-r.left)/r.width)*a.duration; }

/* ── Quick Note ── */
let _qneSavedRange=null;
let _qneStates={bold:false,italic:false,underline:false};
function qneSaveSelection(){ const sel=window.getSelection(); if(sel&&sel.rangeCount) _qneSavedRange=sel.getRangeAt(0).cloneRange(); }
function _qneRestoreSelection(){ if(_qneSavedRange){ const el=document.getElementById('qneContent'); el.focus(); const sel=window.getSelection(); sel.removeAllRanges(); sel.addRange(_qneSavedRange); _qneSavedRange=null; } else document.getElementById('qneContent').focus(); }
function qneExec(cmd){
  _qneRestoreSelection();
  _qneStates[cmd]=!_qneStates[cmd];
  const currentlyOn=document.queryCommandState(cmd);
  if(currentlyOn!==_qneStates[cmd]) document.execCommand(cmd,false,null);
  updateQneToolbar();
}
function qneExecBullet(cmd){
  _qneRestoreSelection();
  const other=cmd==='insertUnorderedList'?'insertOrderedList':'insertUnorderedList';
  if(document.queryCommandState(other)) document.execCommand(other,false,null);
  document.execCommand(cmd,false,null);
  updateQneToolbar();
}
function _qneEnforceStates(){ ['bold','italic','underline'].forEach(cmd=>{ const on=document.queryCommandState(cmd); if(on!==_qneStates[cmd]) document.execCommand(cmd,false,null); }); }
function updateQneToolbar(){
  document.getElementById('qneBold').classList.toggle('active',_qneStates.bold);
  document.getElementById('qneItalic').classList.toggle('active',_qneStates.italic);
  document.getElementById('qneUnderline').classList.toggle('active',_qneStates.underline);
  document.getElementById('qneBullet').classList.toggle('active',document.queryCommandState('insertUnorderedList'));
  document.getElementById('qneNumbered').classList.toggle('active',document.queryCommandState('insertOrderedList'));
}
function _qneResetStates(){ _qneStates={bold:false,italic:false,underline:false}; updateQneToolbar(); }
function updateQneWordCount(){ const text=document.getElementById('qneContent').innerText||''; const words=text.trim()?text.trim().split(/\s+/).length:0; document.getElementById('qneWordCount').textContent=words+' word'+(words!==1?'s':''); }

function openQuickNote(id){
  _currentQuickId=id;
  _expandedCanvasCard=null;
  const data=quickDB[id]||{};
  document.getElementById('qneTitle').value=data.title||'';
  document.getElementById('qneContent').innerHTML=data.content||'';
  document.getElementById('qneHeaderTitle').textContent='Quick Note';
  document.getElementById('home').style.display='none';
  document.getElementById('quickNoteEditor').style.display='flex';
  _qneResetStates(); updateQneWordCount();
}

/* ── Canvas note expanded view ── */
let _expandedCanvasCard=null;

function openNoteExpanded(card){
  _expandedCanvasCard=card;
  _currentQuickId=null;
  const title=card.querySelector('[data-title]')?.textContent||'';
  const content=card.querySelector('.note-content')?.innerHTML||'';
  document.getElementById('qneTitle').value=title;
  document.getElementById('qneContent').innerHTML=content;
  document.getElementById('qneHeaderTitle').textContent='Edit Note';
  document.getElementById('canvas').style.display='none';
  document.getElementById('quickNoteEditor').style.display='flex';
  _qneResetStates(); updateQneWordCount();
  document.getElementById('qneContent').focus();
}

function closeQuickNote(){
  if(_expandedCanvasCard){
    // Save back to canvas card
    const nc=_expandedCanvasCard.querySelector('.note-content');
    if(nc) nc.innerHTML=document.getElementById('qneContent').innerHTML;
    const titleEl=_expandedCanvasCard.querySelector('[data-title]');
    const newTitle=document.getElementById('qneTitle').value.trim();
    if(titleEl && newTitle) titleEl.textContent=newTitle;
    saveCanvas();
    document.getElementById('quickNoteEditor').style.display='none';
    document.getElementById('canvas').style.display='flex';
    _expandedCanvasCard=null;
    return;
  }
  saveQuickNote();
  document.getElementById('quickNoteEditor').style.display='none';
  document.getElementById('home').style.display='flex';
  _currentQuickId=null; renderHome();
}
function saveQuickNote(){
  if(_expandedCanvasCard) return; // canvas note — saved on close
  if(!_currentQuickId||!quickDB[_currentQuickId]) return;
  quickDB[_currentQuickId].title=document.getElementById('qneTitle').value;
  quickDB[_currentQuickId].content=document.getElementById('qneContent').innerHTML;
  quickDB[_currentQuickId].lastEdited=Date.now();
  persistDB();
}

/* ── Quick Todo ── */
function openQuickTodo(id){
  _currentQuickId=id;
  const data=quickDB[id]||{};
  document.getElementById('qteTitle').value=data.title||'';
  renderQteTasks();
  document.getElementById('home').style.display='none';
  document.getElementById('quickTodoEditor').style.display='flex';
}
function closeQuickTodo(){
  saveQuickTodo();
  document.getElementById('quickTodoEditor').style.display='none';
  document.getElementById('home').style.display='flex';
  _currentQuickId=null; renderHome();
}
function saveQuickTodo(){
  if(!_currentQuickId||!quickDB[_currentQuickId]) return;
  quickDB[_currentQuickId].title=document.getElementById('qteTitle').value;
  quickDB[_currentQuickId].lastEdited=Date.now();
  persistDB();
}
function renderQteTasks(){
  const data=quickDB[_currentQuickId]; if(!data) return;
  const tasks=data.content||[];
  const list=document.getElementById('qteList'); list.innerHTML='';
  tasks.forEach((t,i)=>{
    const row=document.createElement('div'); row.className='qte-item';
    const cb=document.createElement('div'); cb.className='qte-cb'+(t.done?' done':'');
    cb.onclick=()=>{ tasks[i].done=!tasks[i].done; persistDB(); renderQteTasks(); saveQuickTodo(); };
    const txt=document.createElement('div'); txt.className='qte-text'+(t.done?' done':'');
    txt.contentEditable='true'; txt.textContent=t.text;
    txt.onblur=()=>{ tasks[i].text=txt.textContent.trim(); persistDB(); };
    txt.onkeydown=e=>{ if(e.key==='Enter'){e.preventDefault();txt.blur();addQuickTodoItem();} };
    const del=document.createElement('button'); del.className='qte-del'; del.textContent='×';
    del.onclick=()=>{ tasks.splice(i,1); persistDB(); renderQteTasks(); };
    row.appendChild(cb); row.appendChild(txt); row.appendChild(del);
    list.appendChild(row);
  });
}
function addQuickTodoItem(){
  const inp=document.getElementById('qteAddInp');
  const text=inp.value.trim(); if(!text) return;
  const data=quickDB[_currentQuickId]; if(!data) return;
  data.content.push({text,done:false});
  inp.value=''; persistDB(); renderQteTasks(); saveQuickTodo();
}
</script>
